<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MatrixGrow - AI 智能助手</title>
  <link rel="stylesheet" href="/css/base.css">
  <style>
    .chat-layout {
      flex: 1;
      display: flex;
      flex-direction: column;
      height: 100vh;
    }

    .chat-header {
      padding: var(--space-5) var(--space-8);
      background: var(--color-bg-card);
      border-bottom: 1px solid var(--color-border);
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-shrink: 0;
    }
    .chat-header h1 { font-size: var(--text-xl); font-weight: var(--weight-semibold); }
    .chat-header .header-sub { color: var(--color-text-secondary); font-size: var(--text-sm); }

    .chat-messages {
      flex: 1;
      overflow-y: auto;
      padding: var(--space-8);
      display: flex;
      flex-direction: column;
      gap: var(--space-5);
    }

    .msg {
      max-width: 75%;
      padding: var(--space-4) var(--space-5);
      border-radius: var(--radius-xl);
      line-height: var(--leading-relaxed);
      font-size: var(--text-sm);
      animation: msgIn 0.25s cubic-bezier(0.16, 1, 0.3, 1);
    }

    @keyframes msgIn {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .msg.user {
      align-self: flex-end;
      background: var(--color-brand);
      color: var(--color-text-inverse);
      border-bottom-right-radius: var(--radius-sm);
    }
    .msg.agent {
      align-self: flex-start;
      background: var(--color-bg-card);
      border: 1px solid var(--color-border);
      border-bottom-left-radius: var(--radius-sm);
    }

    .msg .actions {
      margin-top: var(--space-3);
      padding-top: var(--space-3);
      border-top: 1px solid var(--color-border);
      display: flex;
      gap: var(--space-2);
      flex-wrap: wrap;
    }

    .msg-content p { margin-bottom: var(--space-2); }
    .msg-content p:last-child { margin-bottom: 0; }
    .msg-content code {
      background: rgba(0,0,0,0.2);
      padding: 1px 5px;
      border-radius: var(--radius-sm);
      font-family: var(--font-mono);
      font-size: 0.9em;
    }
    .msg-content pre {
      background: var(--color-bg-inset);
      padding: var(--space-3);
      border-radius: var(--radius-md);
      overflow-x: auto;
      margin: var(--space-2) 0;
      border: 1px solid var(--color-border);
    }
    .msg-content pre code { background: transparent; padding: 0; }

    .chat-input-area {
      padding: var(--space-5) var(--space-8);
      background: var(--color-bg-card);
      border-top: 1px solid var(--color-border);
      flex-shrink: 0;
    }
    .chat-input-wrapper { display: flex; gap: var(--space-3); align-items: flex-end; }
    .chat-input {
      flex: 1;
      padding: var(--space-3) var(--space-4);
      background: var(--color-bg-secondary);
      border: 1px solid var(--color-border);
      border-radius: var(--radius-lg);
      color: var(--color-text-primary);
      font-size: var(--text-sm);
      font-family: var(--font-sans);
      resize: none;
      min-height: 52px;
      max-height: 120px;
      transition: border-color var(--transition-fast);
    }
    .chat-input:focus { outline: none; border-color: var(--color-brand); box-shadow: 0 0 0 3px var(--color-brand-light); }

    @media (max-width: 768px) {
      .chat-messages { padding: var(--space-4); }
      .chat-input-area { padding: var(--space-4); }
      .chat-header { padding: var(--space-4); }
      .msg { max-width: 88%; }
    }
  </style>
</head>
<body>
  <div class="app-layout">
    <aside class="sidebar">
      <a href="/" class="sidebar-logo">MatrixGrow</a>
      <nav class="sidebar-nav">
        <a href="dashboard.html" class="nav-item"><span class="nav-icon">&#x1F4CA;</span>控制台</a>
        <a href="agent.html" class="nav-item active"><span class="nav-icon">&#x1F916;</span>AI 助手</a>
        <a href="workflows.html" class="nav-item"><span class="nav-icon">&#x1F4E6;</span>工作流商店</a>
        <a href="workflow-import.html" class="nav-item"><span class="nav-icon">&#x1F4E5;</span>导入工作流</a>
        <a href="webhooks.html" class="nav-item"><span class="nav-icon">&#x1F517;</span>Webhook</a>
        <a href="analytics.html" class="nav-item"><span class="nav-icon">&#x1F4C8;</span>分析面板</a>
        <a href="subscription.html" class="nav-item"><span class="nav-icon">&#x2B50;</span>订阅</a>
      </nav>
      <div class="sidebar-footer">
        <button class="nav-item" onclick="handleLogout()"><span class="nav-icon">&#x2192;</span>退出登录</button>
      </div>
    </aside>

    <div class="chat-layout">
      <div class="chat-header">
        <div>
          <h1>&#x1F916; AI 智能助手</h1>
          <span class="header-sub">帮你发布、改写、查询数据</span>
        </div>
        <button class="btn btn-ghost btn-sm" onclick="clearChat()">清空对话</button>
      </div>

      <div class="chat-messages" id="chat-messages"></div>

      <div class="chat-input-area">
        <div class="chat-input-wrapper">
          <textarea id="chat-input" class="chat-input" placeholder="输入你的问题，我可以帮你发布内容、改写文本、查询数据..." onkeydown="handleKeyDown(event)"></textarea>
          <button id="send-btn" class="btn btn-primary" onclick="sendMessage()" style="height:52px;">发送</button>
        </div>
      </div>
    </div>
  </div>

  <script src="/js/shared.js"></script>
  <script>
    (function() {
      const API_BASE = MatrixGrow.API_BASE || '/api';
      let sessionId = localStorage.getItem('agent-session-id') || 'default';
      let messages = JSON.parse(localStorage.getItem('agent-messages') || '[]');

      async function init() {
        if (!await MatrixGrow.checkAuth()) return;
        renderMessages();
        if (messages.length === 0) {
          addMessage('agent', '你好！我是 MatrixGrow 的 AI 智能助手。我可以帮你：\n\n- 发布内容到多个平台\n- 改写文本适应不同平台风格\n- 查询你的运营数据\n- 绑定平台账号\n- 管理订阅\n\n有什么需要帮助的吗？');
        }
      }

      function renderMessages() {
        const container = document.getElementById('chat-messages');
        container.innerHTML = messages.map(msg => `
          <div class="msg ${msg.role}">
            <div class="msg-content">${formatMessage(msg.content)}</div>
            ${msg.actions ? `<div class="actions">${msg.actions.map(action => `
              <button class="btn btn-sm ${action.primary ? 'btn-primary' : 'btn-secondary'}" onclick="executeAction('${action.name}', '${JSON.stringify(action.params).replace(/'/g, "\\'")}')">${action.label}</button>
            `).join('')}</div>` : ''}
          </div>
        `).join('');
        container.scrollTop = container.scrollHeight;
      }

      function formatMessage(content) {
        return content
          .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
          .replace(/`([^`]+)`/g, '<code>$1</code>')
          .replace(/```([\s\S]*?)```/g, '<pre><code>$1</code></pre>')
          .replace(/\n/g, '<br>');
      }

      function addMessage(role, content, actions) {
        messages.push({ role, content, actions, timestamp: Date.now() });
        localStorage.setItem('agent-messages', JSON.stringify(messages));
        renderMessages();
      }

      async function sendMessage() {
        const input = document.getElementById('chat-input');
        const content = input.value.trim();
        if (!content) return;

        addMessage('user', content);
        input.value = '';

        const sendBtn = document.getElementById('send-btn');
        sendBtn.disabled = true;

        // Show typing indicator
        const container = document.getElementById('chat-messages');
        const typingEl = document.createElement('div');
        typingEl.className = 'typing-indicator';
        typingEl.id = 'typing-indicator';
        typingEl.innerHTML = '<div class="typing-dot"></div><div class="typing-dot"></div><div class="typing-dot"></div>';
        container.appendChild(typingEl);
        container.scrollTop = container.scrollHeight;

        try {
          const res = await fetch(`${API_BASE}/agent`, {
            method: 'POST',
            headers: MatrixGrow.authHeaders({ 'Content-Type': 'application/json' }),
            body: JSON.stringify({ message: content, session_id: sessionId })
          });

          const indicator = document.getElementById('typing-indicator');
          if (indicator) indicator.remove();

          if (res.ok) {
            const data = await res.json();
            addMessage('agent', data.content || '抱歉，我暂时无法回复，请稍后再试。', data.actions);
          } else {
            addMessage('agent', '抱歉，发生了错误，请稍后再试。');
          }
        } catch {
          const indicator = document.getElementById('typing-indicator');
          if (indicator) indicator.remove();
          addMessage('agent', '抱歉，发生了错误，请稍后再试。');
        } finally {
          sendBtn.disabled = false;
        }
      }

      window.executeAction = function(actionName, paramsStr) {
        let params;
        try { params = JSON.parse(paramsStr); } catch { params = {}; }
        switch (actionName) {
          case 'publish':
            MatrixGrow.toast.info('发布功能：需要先创建内容');
            break;
          case 'rewrite':
            MatrixGrow.toast.info('改写功能：请在创建页面使用');
            break;
          case 'query_stats':
            MatrixGrow.toast.info('查询功能已触发');
            break;
          case 'bind_platform':
            window.location.href = 'dashboard.html#platforms';
            break;
          case 'upgrade':
            window.location.href = 'subscription.html';
            break;
          default:
            MatrixGrow.toast.info('执行操作: ' + actionName);
        }
      };

      async function clearChat() {
        const confirmed = await MatrixGrow.confirm('清空对话', '确定要清空对话历史吗？', { icon: 'warning', confirmText: '清空' });
        if (!confirmed) return;

        messages = [];
        localStorage.removeItem('agent-messages');

        try {
          await fetch(`${API_BASE}/agent/clear-session`, {
            method: 'POST',
            headers: MatrixGrow.authHeaders({ 'Content-Type': 'application/json' }),
            body: JSON.stringify({ session_id: sessionId })
          });
        } catch {}

        renderMessages();
        addMessage('agent', '对话已清空。有什么可以帮你的？');
      }

      function handleKeyDown(event) {
        if (event.key === 'Enter' && !event.shiftKey) {
          event.preventDefault();
          sendMessage();
        }
      }

      function handleLogout() {
        MatrixGrow.logout();
      }

      init();
    })();
  </script>
</body>
</html>
