version: '3.8'

services:
  matrixgrow:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: matrixgrow-server
    ports:
      - "3000:3000"
    env_file: .env
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
      - ./cookies:/app/cookies
    networks:
      - matrixgrow-network
    depends_on:
      - n8n
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  n8n:
    image: n8nio/n8n:latest
    container_name: matrixgrow-n8n
    ports:
      - "5678:5678"
    env_file: .env
    volumes:
      - ./n8n-data:/home/node/.n8n
      - ./n8n-workflows:/app/workflows
    networks:
      - matrixgrow-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5678/healthz"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

networks:
  matrixgrow-network:
    driver: bridge

volumes:
  n8n-data:
    driver: local
