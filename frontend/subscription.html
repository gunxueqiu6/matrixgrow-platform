<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MatrixGrow - 订阅与支付</title>
  <link rel="stylesheet" href="/css/base.css">
  <style>
    .tier-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: var(--space-5);
    }

    .tier-card {
      background: var(--color-bg-card);
      border: 1px solid var(--color-border);
      border-radius: var(--radius-xl);
      padding: var(--space-6);
      position: relative;
      display: flex;
      flex-direction: column;
      transition: transform var(--transition-normal), border-color var(--transition-normal);
    }

    .tier-card:hover {
      transform: translateY(-4px);
    }

    .tier-card.recommended {
      border-color: var(--color-brand);
      box-shadow: 0 0 30px rgba(0, 212, 255, 0.15);
      transform: scale(1.03);
      z-index: 1;
    }

    .tier-card.recommended:hover {
      transform: scale(1.03) translateY(-4px);
    }

    .tier-card .recommended-badge {
      position: absolute;
      top: -12px;
      right: var(--space-5);
      background: var(--gradient-brand);
      color: #000;
      padding: var(--space-1) var(--space-4);
      border-radius: var(--radius-full);
      font-size: var(--text-xs);
      font-weight: var(--weight-bold);
    }

    .tier-card h3 {
      font-size: var(--text-xl);
      font-weight: var(--weight-bold);
      margin-bottom: var(--space-2);
    }

    .tier-card .tier-subtitle {
      color: var(--color-text-secondary);
      font-size: var(--text-sm);
      margin-bottom: var(--space-4);
    }

    .tier-card .tier-price {
      font-size: 2.5rem;
      font-weight: var(--weight-bold);
      margin-bottom: var(--space-1);
    }

    .tier-card .tier-price .currency {
      font-size: var(--text-lg);
      color: var(--color-text-secondary);
    }

    .tier-card .tier-price .period {
      font-size: var(--text-sm);
      color: var(--color-text-muted);
      font-weight: var(--weight-normal);
    }

    .tier-card .tier-features {
      flex: 1;
      margin: var(--space-5) 0;
      list-style: none;
    }

    .tier-card .tier-features li {
      padding: var(--space-2) 0;
      font-size: var(--text-sm);
      color: var(--color-text-secondary);
      display: flex;
      align-items: flex-start;
      gap: var(--space-2);
    }

    .tier-card .tier-features li .feat-icon {
      color: var(--color-success);
      flex-shrink: 0;
      margin-top: 2px;
    }

    .tier-card .tier-features li .feat-icon.missing {
      color: var(--color-text-muted);
    }

    .tier-card .tier-features li .feat-icon.highlight {
      color: var(--color-brand);
    }

    .tier-card .tier-btn {
      width: 100%;
    }

    /* Current plan info */
    .current-plan-card {
      background: var(--color-bg-card);
      border: 1px solid var(--color-border);
      border-radius: var(--radius-xl);
      padding: var(--space-6);
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: var(--space-6);
    }

    .current-plan-info h3 {
      font-size: var(--text-lg);
      margin-bottom: var(--space-1);
    }

    .current-plan-info p {
      color: var(--color-text-secondary);
      font-size: var(--text-sm);
    }

    .current-plan-info .plan-stats {
      display: flex;
      gap: var(--space-4);
      margin-top: var(--space-3);
    }

    .current-plan-info .plan-stat-item {
      text-align: center;
    }

    .current-plan-info .plan-stat-value {
      font-size: var(--text-xl);
      font-weight: var(--weight-bold);
      color: var(--color-brand);
    }

    .current-plan-info .plan-stat-label {
      font-size: var(--text-xs);
      color: var(--color-text-muted);
    }

    /* Payment methods */
    .payment-methods {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: var(--space-3);
      margin-bottom: var(--space-5);
    }

    .payment-method {
      padding: var(--space-4);
      background: var(--color-bg-secondary);
      border: 2px solid var(--color-border);
      border-radius: var(--radius-lg);
      cursor: pointer;
      text-align: center;
      transition: all var(--transition-fast);
    }

    .payment-method:hover {
      border-color: var(--color-brand);
    }

    .payment-method.selected {
      border-color: var(--color-brand);
      background: rgba(0, 212, 255, 0.08);
    }

    .payment-method .pay-icon {
      font-size: 28px;
      margin-bottom: var(--space-1);
    }

    .payment-method .pay-name {
      font-size: var(--text-sm);
      font-weight: var(--weight-medium);
    }

    /* Order history */
    .order-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: var(--space-3) var(--space-4);
      border-bottom: 1px solid var(--color-border);
      font-size: var(--text-sm);
    }

    .order-row:last-child {
      border-bottom: none;
    }

    .order-row .order-id {
      color: var(--color-text-muted);
      font-family: monospace;
    }

    .order-row .order-tier {
      font-weight: var(--weight-medium);
    }

    .order-row .order-amount {
      font-weight: var(--weight-bold);
    }

    .order-row .order-date {
      color: var(--color-text-muted);
    }

    /* Tabs inside */
    .section-tabs {
      display: flex;
      gap: var(--space-2);
      margin-bottom: var(--space-5);
      border-bottom: 1px solid var(--color-border);
      padding-bottom: 0;
    }

    .section-tab {
      padding: var(--space-2) var(--space-4);
      cursor: pointer;
      color: var(--color-text-muted);
      border-bottom: 2px solid transparent;
      transition: all var(--transition-fast);
      font-size: var(--text-sm);
      background: none;
      border-top: none;
      border-left: none;
      border-right: none;
    }

    .section-tab:hover {
      color: var(--color-text-secondary);
    }

    .section-tab.active {
      color: var(--color-brand);
      border-bottom-color: var(--color-brand);
    }

    @media (max-width: 900px) {
      .tier-grid {
        grid-template-columns: 1fr;
      }
      .tier-card.recommended {
        transform: none;
      }
      .tier-card.recommended:hover {
        transform: translateY(-4px);
      }
      .current-plan-card {
        flex-direction: column;
        text-align: center;
      }
      .current-plan-info .plan-stats {
        justify-content: center;
      }
      .payment-methods {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <div class="app-layout">
    <aside class="sidebar">
      <div class="sidebar-logo">MatrixGrow</div>
      <nav class="sidebar-nav">
        <a href="dashboard.html" class="nav-item">控制台</a>
        <a href="agent.html" class="nav-item">AI 助手</a>
        <a href="workflows.html" class="nav-item">工作流商店</a>
        <a href="workflow-import.html" class="nav-item">导入工作流</a>
        <a href="webhooks.html" class="nav-item">Webhook</a>
        <a href="subscription.html" class="nav-item active">订阅</a>
      </nav>
      <div style="margin-top: auto; padding-top: var(--space-4); border-top: 1px solid var(--color-border);">
        <a href="dashboard.html#settings" class="nav-item">设置</a>
        <button class="nav-item" onclick="handleLogout()">退出登录</button>
      </div>
    </aside>

    <main class="main-content">
      <div class="page-header">
        <h1>&#x1F4B0; 订阅管理</h1>
      </div>

      <!-- Current Plan -->
      <div id="current-subscription">
        <div class="loading-state">
          <div class="spinner"></div>
          <p>加载订阅信息...</p>
        </div>
      </div>

      <!-- Section Tabs -->
      <div class="section-tabs">
        <button class="section-tab active" data-tab="plans">套餐对比</button>
        <button class="section-tab" data-tab="orders">订单历史</button>
      </div>

      <!-- Plans Tab -->
      <div id="plans-tab">
        <div class="tier-grid" id="tier-grid">
          <div class="loading-state" style="grid-column: 1 / -1;">
            <div class="spinner"></div>
            <p>加载套餐信息...</p>
          </div>
        </div>
      </div>

      <!-- Orders Tab -->
      <div id="orders-tab" style="display:none;">
        <div class="card">
          <h2>订单历史</h2>
          <div id="orders-list">
            <div class="loading-state">
              <div class="spinner"></div>
              <p>加载订单记录...</p>
            </div>
          </div>
        </div>
      </div>
    </main>
  </div>

  <!-- Payment Modal -->
  <div class="modal-backdrop" id="payment-modal">
    <div class="modal-panel" style="max-width: 520px;">
      <h2 style="margin-bottom: var(--space-5);">确认支付</h2>
      <div id="payment-details" style="margin-bottom: var(--space-5);"></div>

      <h3 style="margin-bottom: var(--space-3); font-size: var(--text-sm);">选择支付方式</h3>
      <div class="payment-methods">
        <div class="payment-method selected" data-method="alipay">
          <div class="pay-icon">&#x1F41C;</div>
          <div class="pay-name">支付宝</div>
        </div>
        <div class="payment-method" data-method="wechat">
          <div class="pay-icon">&#x1F4AC;</div>
          <div class="pay-name">微信支付</div>
        </div>
        <div class="payment-method" data-method="paypal">
          <div class="pay-icon">&#x1F17F;&#xFE0F;</div>
          <div class="pay-name">PayPal</div>
        </div>
      </div>

      <div style="display: flex; gap: var(--space-3);">
        <button class="btn btn-primary" style="flex:1;" id="pay-confirm-btn" onclick="confirmPayment()">确认支付</button>
        <button class="btn btn-secondary" onclick="closePaymentModal()">取消</button>
      </div>
    </div>
  </div>

  <script src="/js/shared.js"></script>
  <script>
    (function() {
      const API_BASE = '/api';
      let currentSubscription = null;
      let selectedPaymentMethod = 'alipay';
      let pendingOrder = null;

      async function init() {
        if (!await MatrixGrow.checkAuth()) return;
        await loadSubscription();
        setupTabs();
        setupPaymentMethods();
      }

      function setupTabs() {
        document.querySelectorAll('.section-tab').forEach(tab => {
          tab.addEventListener('click', () => {
            document.querySelectorAll('.section-tab').forEach(t => t.classList.remove('active'));
            tab.classList.add('active');
            const target = tab.dataset.tab;
            document.getElementById('plans-tab').style.display = target === 'plans' ? 'block' : 'none';
            document.getElementById('orders-tab').style.display = target === 'orders' ? 'block' : 'none';
            if (target === 'orders') loadOrders();
          });
        });
      }

      function setupPaymentMethods() {
        document.querySelectorAll('.payment-method').forEach(el => {
          el.addEventListener('click', () => {
            document.querySelectorAll('.payment-method').forEach(m => m.classList.remove('selected'));
            el.classList.add('selected');
            selectedPaymentMethod = el.dataset.method;
          });
        });
      }

      const TIER_META = {
        free: {
          name: 'Free',
          subtitle: '适合个人开发者体验',
          price: 0,
          features: [
            { text: '最多 3 个平台绑定', highlight: false },
            { text: '每平台 1 个账号', highlight: false },
            { text: '基础文本改写', highlight: false },
            { text: '社区支持', highlight: false },
            { text: 'AI 智能截流', missing: true },
            { text: '高级分析面板', missing: true },
            { text: '自定义工作流', missing: true },
            { text: '优先技术支持', missing: true }
          ]
        },
        pro: {
          name: 'Pro',
          subtitle: '适合独立开发者和初创团队',
          price: 99,
          features: [
            { text: '最多 10 个平台绑定', highlight: false },
            { text: '每平台 3 个账号', highlight: false },
            { text: '高级 AI 改写 + 多风格', highlight: false },
            { text: 'AI 智能截流 (100次/月)', highlight: true },
            { text: '高级分析面板', highlight: false },
            { text: '自定义工作流 (最多 3 个)', highlight: false },
            { text: '优先技术支持', highlight: false },
            { text: 'API 访问', missing: true }
          ]
        },
        promax: {
          name: 'ProMax',
          subtitle: '适合增长团队和重度用户',
          price: 299,
          features: [
            { text: '无限平台绑定', highlight: false },
            { text: '每平台不限账号', highlight: false },
            { text: '全功能 AI 改写引擎', highlight: false },
            { text: 'AI 智能截流 (无限次)', highlight: true },
            { text: '完整分析面板 + 导出', highlight: false },
            { text: '自定义工作流 (无限)', highlight: false },
            { text: '7x24 专属技术支持', highlight: false },
            { text: '完整 API 访问 + Webhook', highlight: false }
          ]
        }
      };

      async function loadSubscription() {
        try {
          const sub = await MatrixGrow.fetchJSON(`${API_BASE}/subscription`);
          currentSubscription = sub;

          let html = `<div class="current-plan-card">
            <div class="current-plan-info">
              <h3>${TIER_META[sub.tier]?.name || sub.tier} 套餐</h3>
              <p>${TIER_META[sub.tier]?.subtitle || ''}</p>
              <div class="plan-stats">
                <div class="plan-stat-item">
                  <div class="plan-stat-value">${sub.platformsUsed || 0}/${sub.platformLimit || '-'}</div>
                  <div class="plan-stat-label">已用平台</div>
                </div>
                <div class="plan-stat-item">
                  <div class="plan-stat-value">${sub.accountsPerPlatform || 0}</div>
                  <div class="plan-stat-label">每平台账号</div>
                </div>
                <div class="plan-stat-item">
                  <div class="plan-stat-value">${sub.tier === 'free' ? '-' : 'Active'}</div>
                  <div class="plan-stat-label">状态</div>
                </div>
              </div>
            </div>
          </div>`;

          document.getElementById('current-subscription').innerHTML = html;

          // Fetch tiers
          const tiersData = await MatrixGrow.fetchJSON(`${API_BASE}/subscription/tiers`).catch(() => null);

          const tierKeys = ['free', 'pro', 'promax'];
          let gridHtml = '';

          for (const key of tierKeys) {
            const meta = TIER_META[key];
            const isRecommended = key === 'pro';
            const isCurrent = sub.tier === key;
            let featuresHtml = '';
            for (const f of meta.features) {
              if (f.missing) {
                featuresHtml += `<li><span class="feat-icon missing">&#x2717;</span> ${f.text}</li>`;
              } else if (f.highlight) {
                featuresHtml += `<li><span class="feat-icon highlight">&#x2728;</span> ${f.text}</li>`;
              } else {
                featuresHtml += `<li><span class="feat-icon">&#x2713;</span> ${f.text}</li>`;
              }
            }

            let btnHtml;
            if (isCurrent) {
              btnHtml = `<button class="btn btn-secondary tier-btn" disabled>当前套餐</button>`;
            } else if (key === 'free') {
              btnHtml = '';
            } else {
              btnHtml = `<button class="btn ${isRecommended ? 'btn-primary' : 'btn-secondary'} tier-btn" onclick="window.showUpgrade('${key}')">
                ${sub.tier === 'free' ? '立即购买' : '升级'}
              </button>`;
            }

            gridHtml += `
              <div class="tier-card ${isRecommended ? 'recommended' : ''}">
                ${isRecommended ? '<div class="recommended-badge">推荐</div>' : ''}
                <h3>${meta.name}</h3>
                <div class="tier-subtitle">${meta.subtitle}</div>
                <div class="tier-price">
                  <span class="currency">¥</span>${meta.price}
                  <span class="period">/月</span>
                </div>
                <ul class="tier-features">
                  ${featuresHtml}
                </ul>
                <div class="tier-btn">
                  ${btnHtml}
                </div>
              </div>
            `;
          }

          document.getElementById('tier-grid').innerHTML = gridHtml;
        } catch (e) {
          document.getElementById('current-subscription').innerHTML =
            MatrixGrow.renderError('加载订阅信息失败', loadSubscription);
          MatrixGrow.toast.error('加载失败: ' + e.message);
        }
      }

      window.showUpgrade = function(tier) {
        const meta = TIER_META[tier];
        if (!meta) return;
        pendingOrder = { tier };

        document.getElementById('payment-details').innerHTML = `
          <div style="display: flex; align-items: center; gap: var(--space-4); padding: var(--space-4); background: var(--color-bg-secondary); border-radius: var(--radius-lg); margin-bottom: var(--space-4);">
            <div style="font-size: 32px;">${tier === 'pro' ? '&#x1F31F;' : '&#x1F451;'}</div>
            <div>
              <div style="font-weight: var(--weight-semibold);">${meta.name} 套餐</div>
              <div style="font-size: var(--text-sm); color: var(--color-text-secondary);">${meta.subtitle}</div>
            </div>
            <div style="margin-left: auto; font-size: 1.5rem; font-weight: var(--weight-bold); color: var(--color-brand);">
              ¥${meta.price}<span style="font-size: var(--text-xs); color: var(--color-text-muted); font-weight: var(--weight-normal);">/月</span>
            </div>
          </div>
        `;

        document.getElementById('payment-modal').classList.add('open');
      };

      async function confirmPayment() {
        if (!pendingOrder) return;
        const btn = document.getElementById('pay-confirm-btn');
        btn.disabled = true;
        btn.textContent = '处理中...';

        try {
          const data = await MatrixGrow.fetchJSON(`${API_BASE}/payment/create`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
              tier: pendingOrder.tier,
              channel: selectedPaymentMethod
            })
          });

          MatrixGrow.toast.success('订单创建成功！');

          // Get payment URL
          const urlData = await MatrixGrow.fetchJSON(`${API_BASE}/payment/url?orderNo=${data.orderNo}&channel=${selectedPaymentMethod}`);

          if (urlData.url) {
            window.location.href = urlData.url;
          } else if (urlData.codeUrl) {
            showModal(`
              <div style="text-align: center; padding: var(--space-5);">
                <p style="margin-bottom: var(--space-4);">请使用手机扫描下方二维码支付</p>
                <div style="background: #fff; padding: var(--space-4); border-radius: var(--radius-lg); display: inline-block;">
                  <p style="color: #000; font-family: monospace;">${urlData.codeUrl}</p>
                </div>
              </div>
            `, '扫码支付');
          }
        } catch (e) {
          MatrixGrow.toast.error(e.message || '支付失败');
        } finally {
          btn.disabled = false;
          btn.textContent = '确认支付';
        }
      }

      function closePaymentModal() {
        document.getElementById('payment-modal').classList.remove('open');
        pendingOrder = null;
      }

      async function loadOrders() {
        const container = document.getElementById('orders-list');
        container.innerHTML = '<div class="loading-state"><div class="spinner"></div><p>加载订单记录...</p></div>';

        try {
          const data = await MatrixGrow.fetchJSON(`${API_BASE}/payment/orders`);

          if (!data.orders || data.orders.length === 0) {
            container.innerHTML = MatrixGrow.renderEmpty('&#x1F4CB;', '暂无订单记录', '购买套餐后，订单记录将显示在这里');
            return;
          }

          const statusLabels = { pending: '待支付', paid: '已支付', failed: '支付失败', refunded: '已退款' };
          const statusClasses = { pending: 'tag', paid: 'tag', failed: 'tag', refunded: 'tag' };
          const statusColors = {
            pending: 'style="background: rgba(245, 158, 11, 0.15); color: #f59e0b;"',
            paid: 'style="background: rgba(74, 222, 128, 0.15); color: #4ade80;"',
            failed: 'style="background: rgba(255, 68, 68, 0.15); color: #ff4444;"',
            refunded: 'style="background: rgba(167, 139, 250, 0.15); color: #a78bfa;"'
          };

          container.innerHTML = data.orders.map(o => `
            <div class="order-row">
              <span class="order-id">${o.order_no}</span>
              <span class="order-tier">${o.tier === 'pro' ? 'Pro' : 'ProMax'}</span>
              <span class="order-amount">¥${o.amount}</span>
              <span class="tag" ${statusColors[o.status] || ''}>${statusLabels[o.status] || o.status}</span>
              <span class="order-date">${MatrixGrow.formatDateTime(o.created_at)}</span>
            </div>
          `).join('');
        } catch (e) {
          container.innerHTML = MatrixGrow.renderError('加载订单失败', loadOrders);
        }
      }

      async function handleLogout() {
        const confirmed = await MatrixGrow.confirm.confirm('退出登录', '确定要退出登录吗？', {
          confirmText: '退出',
          danger: true
        });
        if (confirmed) {
          MatrixGrow.logout();
        }
      }

      window.confirmPayment = confirmPayment;
      window.closePaymentModal = closePaymentModal;
      window.handleLogout = handleLogout;

      init();
    })();
  </script>
</body>
</html>
