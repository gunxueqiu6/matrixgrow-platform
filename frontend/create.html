<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MatrixGrow - 创作中心</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #0f0f23; color: #fff; }
    .app { display: flex; min-height: 100vh; }
    .sidebar { width: 260px; background: #1a1a2e; padding: 20px; display: flex; flex-direction: column; }
    .logo { font-size: 24px; font-weight: bold; margin-bottom: 40px; color: #00d4ff; }
    .nav-item { padding: 12px 16px; margin: 4px 0; border-radius: 8px; cursor: pointer; transition: background 0.2s; color: #888; }
    .nav-item:hover, .nav-item.active { background: #16213e; color: #fff; }
    .main { flex: 1; padding: 30px; overflow-y: auto; }
    .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; }
    .header h1 { font-size: 28px; }
    .card { background: #1a1a2e; padding: 24px; border-radius: 16px; margin-bottom: 20px; }
    .card h2 { margin-bottom: 16px; font-size: 18px; }
    .btn { padding: 10px 20px; border: none; border-radius: 8px; cursor: pointer; font-size: 14px; font-weight: bold; transition: all 0.2s; }
    .btn-primary { background: #00d4ff; color: #000; }
    .btn-primary:hover { background: #00b8e6; transform: translateY(-1px); }
    .btn-secondary { background: #333; color: #fff; }
    .btn-secondary:hover { background: #444; }
    .btn-danger { background: #ff4444; color: #fff; }
    .btn-danger:hover { background: #e03333; }
    .input { width: 100%; padding: 12px; border: 1px solid #333; border-radius: 8px; background: #0f0f23; color: #fff; margin-bottom: 12px; }
    .input:focus { outline: none; border-color: #00d4ff; }
    textarea.input { min-height: 120px; resize: vertical; }
    select.input { appearance: none; }
    .tabs { display: flex; gap: 10px; margin-bottom: 20px; flex-wrap: wrap; }
    .tab { padding: 10px 20px; background: #0f0f23; border: none; border-radius: 8px; color: #888; cursor: pointer; font-size: 14px; }
    .tab.active { background: #00d4ff; color: #000; }
    .tab-badge { background: #ff4444; color: #fff; font-size: 10px; padding: 2px 6px; border-radius: 8px; margin-left: 6px; }
    .hidden { display: none !important; }
    .loading { text-align: center; padding: 40px; color: #888; }
    .message { padding: 12px; border-radius: 8px; margin-bottom: 16px; }
    .message.success { background: rgba(0, 212, 255, 0.1); border: 1px solid #00d4ff; color: #00d4ff; }
    .message.error { background: rgba(255, 0, 0, 0.1); border: 1px solid #ff4444; color: #ff4444; }
    .two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
    .template-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 16px; }
    .template-card { background: #0f0f23; padding: 20px; border-radius: 12px; border: 1px solid #333; cursor: pointer; transition: all 0.2s; }
    .template-card:hover { border-color: #00d4ff; transform: translateY(-2px); }
    .template-card h3 { margin-bottom: 8px; font-size: 16px; }
    .template-card p { color: #888; font-size: 13px; margin-bottom: 12px; }
    .template-card .meta { display: flex; justify-content: space-between; align-items: center; }
    .template-card .price { color: #00d4ff; font-weight: bold; }
    .template-card .price.free { color: #4ade80; }
    .template-card .category { font-size: 11px; background: #333; padding: 3px 8px; border-radius: 6px; color: #aaa; }
    .progress-bar { width: 100%; height: 6px; background: #333; border-radius: 3px; margin: 12px 0; overflow: hidden; }
    .progress-fill { height: 100%; background: #00d4ff; border-radius: 3px; transition: width 0.5s; }
    .workflow-list { display: flex; flex-direction: column; gap: 10px; }
    .workflow-item { background: #0f0f23; padding: 16px; border-radius: 10px; display: flex; justify-content: space-between; align-items: center; }
    .workflow-item .info h3 { font-size: 15px; margin-bottom: 4px; }
    .workflow-item .info p { color: #888; font-size: 12px; }
    .workflow-item .actions { display: flex; gap: 8px; }
    .status-dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; margin-right: 6px; }
    .status-active { background: #4ade80; }
    .status-draft { background: #888; }
    .modal { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.8); justify-content: center; align-items: center; z-index: 1000; }
    .modal-content { background: #1a1a2e; padding: 30px; border-radius: 16px; width: 600px; max-height: 80vh; overflow-y: auto; }
    .modal-content h2 { margin-bottom: 20px; }
    .platform-checkboxes { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-bottom: 16px; }
    .platform-check { display: flex; align-items: center; gap: 6px; padding: 8px; background: #0f0f23; border-radius: 6px; cursor: pointer; }
    .platform-check input { accent-color: #00d4ff; }
  </style>
</head>
<body>
  <div class="app">
    <div class="sidebar">
      <div class="logo">MatrixGrow</div>
      <nav>
        <div class="nav-item" onclick="window.location.href='dashboard.html'">控制台</div>
        <div class="nav-item" onclick="window.location.href='dashboard.html'">内容发布</div>
        <div class="nav-item active">创作中心</div>
        <div class="nav-item" onclick="window.location.href='agent.html'">AI 助手</div>
        <div class="nav-item" onclick="window.location.href='workflow-import.html'">工作流导入</div>
        <div class="nav-item" onclick="window.location.href='workflows.html'">模板商店</div>
        <div class="nav-item" onclick="window.location.href='dashboard.html'">平台管理</div>
        <div class="nav-item" onclick="window.location.href='webhooks.html'">Webhook</div>
        <div class="nav-item" onclick="window.location.href='subscription.html'">订阅</div>
        <div class="nav-item" onclick="window.location.href='dashboard.html#settings'">设置</div>
      </nav>
      <div style="margin-top: auto; padding-top: 20px; border-top: 1px solid #333;">
        <div class="nav-item" onclick="logout()">退出登录</div>
      </div>
    </div>

    <div class="main">
      <div class="header">
        <h1>创作中心</h1>
        <div>
          <button class="btn btn-secondary" onclick="window.location.href='workflow-import.html'" style="margin-right: 8px;">导入工作流</button>
          <button class="btn btn-primary" onclick="showQuickCreate()">快速创建</button>
        </div>
      </div>

      <div id="message-container"></div>

      <div class="tabs">
        <button class="tab active" onclick="switchTab('overview', event)">概览</button>
        <button class="tab" onclick="switchTab('templates', event)">模板库 <span id="template-count" class="tab-badge" style="display:none;"></span></button>
        <button class="tab" onclick="switchTab('workflows', event)">我的工作流</button>
        <button class="tab" onclick="switchTab('publish', event)">内容发布</button>
      </div>

      <!-- 概览 -->
      <div id="tab-overview">
        <div class="stats-grid" style="display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-bottom: 30px;">
          <div class="stat-card" style="background: #1a1a2e; padding: 24px; border-radius: 16px;">
            <h3 style="color: #888; font-size: 14px; margin-bottom: 8px;">我的工作流</h3>
            <div class="value" id="my-workflow-count" style="font-size: 32px; font-weight: bold; color: #00d4ff;">-</div>
          </div>
          <div class="stat-card" style="background: #1a1a2e; padding: 24px; border-radius: 16px;">
            <h3 style="color: #888; font-size: 14px; margin-bottom: 8px;">可用模板</h3>
            <div class="value" id="template-total" style="font-size: 32px; font-weight: bold; color: #00d4ff;">-</div>
          </div>
          <div class="stat-card" style="background: #1a1a2e; padding: 24px; border-radius: 16px;">
            <h3 style="color: #888; font-size: 14px; margin-bottom: 8px;">本月发布</h3>
            <div class="value" id="publish-count" style="font-size: 32px; font-weight: bold; color: #00d4ff;">-</div>
          </div>
          <div class="stat-card" style="background: #1a1a2e; padding: 24px; border-radius: 16px;">
            <h3 style="color: #888; font-size: 14px; margin-bottom: 8px;">AI 调用</h3>
            <div class="value" id="ai-calls" style="font-size: 32px; font-weight: bold; color: #00d4ff;">-</div>
          </div>
        </div>

        <div class="two-col">
          <div class="card">
            <h2>快速操作</h2>
            <div style="display: flex; flex-direction: column; gap: 10px;">
              <button class="btn btn-primary" onclick="window.location.href='workflow-import.html'">
                导入 Coze / Dify 工作流
              </button>
              <button class="btn btn-secondary" onclick="switchTab('templates')">
                浏览模板商店
              </button>
              <button class="btn btn-secondary" onclick="window.location.href='agent.html'">
                打开 AI 助手
              </button>
            </div>
          </div>
          <div class="card">
            <h2>创作统计</h2>
            <div id="usage-stats">
              <div class="loading">加载中...</div>
            </div>
          </div>
        </div>
      </div>

      <!-- 模板库 -->
      <div id="tab-templates" class="hidden">
        <div style="display: flex; gap: 10px; margin-bottom: 20px;">
          <select class="input" style="width: auto; margin-bottom: 0;" id="category-filter" onchange="loadTemplates()">
            <option value="">全部分类</option>
            <option value="content">内容创作</option>
            <option value="social">社交媒体</option>
            <option value="data">数据处理</option>
            <option value="automation">自动化</option>
            <option value="ai">AI 工具</option>
          </select>
          <label class="platform-check" style="margin-bottom: 0; padding: 8px 16px;">
            <input type="checkbox" id="free-only" onchange="loadTemplates()"> 仅免费
          </label>
        </div>
        <div class="template-grid" id="template-grid">
          <div class="loading" style="grid-column: 1 / -1;">加载中...</div>
        </div>
      </div>

      <!-- 我的工作流 -->
      <div id="tab-workflows" class="hidden">
        <div class="card">
          <div class="workflow-list" id="workflow-list">
            <div class="loading">加载中...</div>
          </div>
        </div>
      </div>

      <!-- 内容发布 -->
      <div id="tab-publish" class="hidden">
        <div class="two-col">
          <div class="card">
            <h2>发布内容</h2>
            <div>
              <label style="color: #888; font-size: 13px; display: block; margin-bottom: 4px;">标题</label>
              <input class="input" id="publish-title" placeholder="输入标题...">
            </div>
            <div>
              <label style="color: #888; font-size: 13px; display: block; margin-bottom: 4px;">内容</label>
              <textarea class="input" id="publish-content" placeholder="输入内容..."></textarea>
            </div>
            <div>
              <label style="color: #888; font-size: 13px; display: block; margin-bottom: 4px;">选择平台</label>
              <div class="platform-checkboxes" id="platform-list">
                <div class="loading">加载平台列表...</div>
              </div>
            </div>
            <button class="btn btn-primary" onclick="publishContent()" style="width: 100%;">发布内容</button>
          </div>
          <div class="card">
            <h2>发布记录</h2>
            <div id="publish-history">
              <p style="color: #888; text-align: center; padding: 40px;">暂无发布记录</p>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Quick Create Modal -->
  <div class="modal" id="quick-create-modal">
    <div class="modal-content">
      <h2>快速创建内容</h2>
      <div>
        <label style="color: #888; font-size: 13px; display: block; margin-bottom: 4px;">主题 / 关键词</label>
        <input class="input" id="quick-topic" placeholder="输入创作主题...">
      </div>
      <div>
        <label style="color: #888; font-size: 13px; display: block; margin-bottom: 4px;">内容类型</label>
        <select class="input" id="quick-type">
          <option value="article">文章</option>
          <option value="social">社交媒体帖子</option>
          <option value="video-script">视频脚本</option>
          <option value="newsletter">邮件推送</option>
        </select>
      </div>
      <div>
        <label style="color: #888; font-size: 13px; display: block; margin-bottom: 4px;">AI 风格</label>
        <select class="input" id="quick-style">
          <option value="professional">专业正式</option>
          <option value="casual">轻松活泼</option>
          <option value="technical">技术深度</option>
          <option value="marketing">营销推广</option>
        </select>
      </div>
      <div style="display: flex; gap: 12px; margin-top: 20px;">
        <button class="btn btn-primary" style="flex: 1;" onclick="generateContent()">AI 生成</button>
        <button class="btn btn-secondary" onclick="closeQuickCreate()">取消</button>
      </div>
    </div>
  </div>

  <script>
    const API_BASE = '/api';
    const token = localStorage.getItem('token');

    async function checkAuth() {
      if (!token) { window.location.href = '/login.html'; return false; }
      try {
        const res = await fetch(`${API_BASE}/auth/me`, { headers: { Authorization: `Bearer ${token}` } });
        if (!res.ok) throw new Error('Unauthorized');
        return true;
      } catch {
        localStorage.removeItem('token');
        window.location.href = '/login.html';
        return false;
      }
    }

    function showMessage(text, type = 'success') {
      const container = document.getElementById('message-container');
      container.innerHTML = `<div class="message ${type}">${text}</div>`;
      setTimeout(() => container.innerHTML = '', 3000);
    }

    function switchTab(tab, e) {
      document.querySelectorAll('[id^="tab-"]').forEach(el => el.classList.add('hidden'));
      document.getElementById(`tab-${tab}`).classList.remove('hidden');
      document.querySelectorAll('.tab').forEach(el => el.classList.remove('active'));
      if (e && e.target) e.target.classList.add('active');

      if (tab === 'templates') loadTemplates();
      if (tab === 'workflows') loadMyWorkflows();
      if (tab === 'publish') loadPlatforms();
    }

    async function loadOverview() {
      try {
        const [wfRes, tplRes] = await Promise.all([
          fetch(`${API_BASE}/workflows/my`, { headers: { Authorization: `Bearer ${token}` } }),
          fetch(`${API_BASE}/workflows/templates?limit=1`, { headers: { Authorization: `Bearer ${token}` } })
        ]);
        const wf = await wfRes.json();
        const tpl = await tplRes.json();

        document.getElementById('my-workflow-count').textContent = wf.total || 0;
        document.getElementById('template-total').textContent = tpl.total || 0;
        document.getElementById('publish-count').textContent = '-';
        document.getElementById('ai-calls').textContent = '-';

        const usageEl = document.getElementById('usage-stats');
        usageEl.innerHTML = `
          <div style="display: flex; justify-content: space-around; text-align: center;">
            <div><div style="font-size: 28px; font-weight: bold; color: #00d4ff;">${wf.total || 0}</div><div style="color: #888; font-size: 12px;">工作流</div></div>
            <div><div style="font-size: 28px; font-weight: bold; color: #4ade80;">${tpl.total || 0}</div><div style="color: #888; font-size: 12px;">模板</div></div>
            <div><div style="font-size: 28px; font-weight: bold; color: #f59e0b;">0</div><div style="color: #888; font-size: 12px;">本月发布</div></div>
          </div>
        `;
      } catch (e) {
        console.error('Failed to load overview:', e);
      }
    }

    async function loadTemplates() {
      const category = document.getElementById('category-filter').value;
      const freeOnly = document.getElementById('free-only').checked;
      let url = `${API_BASE}/workflows/templates?limit=20`;
      if (category) url += `&category=${encodeURIComponent(category)}`;
      if (freeOnly) url += '&free_only=true';

      try {
        const res = await fetch(url, { headers: { Authorization: `Bearer ${token}` } });
        const data = await res.json();

        if (!data.templates || data.templates.length === 0) {
          document.getElementById('template-grid').innerHTML = '<p style="color: #888; text-align: center; padding: 40px;">暂无模板</p>';
          return;
        }

        document.getElementById('template-grid').innerHTML = data.templates.map(t => `
          <div class="template-card" onclick="installTemplate(${t.id}, '${(t.name || '').replace(/'/g, "\\'")}')">
            <h3>${t.name}</h3>
            <p>${t.description || '无描述'}</p>
            <div class="meta">
              <span class="category">${t.category || '通用'}</span>
              <span class="price ${t.price === 0 ? 'free' : ''}">${t.price === 0 ? '免费' : '¥' + t.price}</span>
            </div>
            <div style="color: #888; font-size: 11px; margin-top: 8px;">
              ${t.install_count || 0} 次安装 · ${t.source_format || 'n8n'}
            </div>
          </div>
        `).join('');
      } catch (e) {
        console.error('Failed to load templates:', e);
        document.getElementById('template-grid').innerHTML = '<p style="color: #ff4444;">加载失败</p>';
      }
    }

    async function installTemplate(id, name) {
      try {
        const res = await fetch(`${API_BASE}/workflows/templates/${id}/install`, {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            Authorization: `Bearer ${token}`
          },
          body: JSON.stringify({ name: name })
        });
        const data = await res.json();
        if (res.ok) {
          showMessage(`模板 "${name}" 安装成功！`);
          loadMyWorkflows();
        } else {
          showMessage(data.error || '安装失败', 'error');
        }
      } catch (e) {
        showMessage('操作失败', 'error');
      }
    }

    async function loadMyWorkflows() {
      try {
        const res = await fetch(`${API_BASE}/workflows/my`, { headers: { Authorization: `Bearer ${token}` } });
        const data = await res.json();

        if (!data.workflows || data.workflows.length === 0) {
          document.getElementById('workflow-list').innerHTML = `
            <div style="text-align: center; padding: 40px; color: #888;">
              <p style="margin-bottom: 12px;">还没有工作流</p>
              <button class="btn btn-primary" onclick="window.location.href='workflow-import.html'">导入第一个工作流</button>
            </div>`;
          return;
        }

        document.getElementById('workflow-list').innerHTML = data.workflows.map(w => `
          <div class="workflow-item">
            <div class="info">
              <h3><span class="status-dot ${w.status === 'active' ? 'status-active' : 'status-draft'}"></span>${w.name}</h3>
              <p>来源: ${w.source_format || '未知'} · 创建于 ${new Date(w.created_at).toLocaleDateString()}</p>
            </div>
            <div class="actions">
              <button class="btn btn-secondary" style="padding: 6px 12px; font-size: 12px;" onclick="window.location.href='workflow-import.html'">编辑</button>
              <button class="btn btn-danger" style="padding: 6px 12px; font-size: 12px;" onclick="deleteWorkflow(${w.id})">删除</button>
            </div>
          </div>
        `).join('');
      } catch (e) {
        console.error('Failed to load workflows:', e);
        document.getElementById('workflow-list').innerHTML = '<p style="color: #ff4444;">加载失败</p>';
      }
    }

    async function deleteWorkflow(id) {
      if (!confirm('确认删除此工作流？')) return;
      try {
        const res = await fetch(`${API_BASE}/workflows/my/${id}`, {
          method: 'DELETE',
          headers: { Authorization: `Bearer ${token}` }
        });
        if (res.ok) {
          showMessage('工作流已删除');
          loadMyWorkflows();
          loadOverview();
        } else {
          const err = await res.json();
          showMessage(err.error || '删除失败', 'error');
        }
      } catch (e) {
        showMessage('操作失败', 'error');
      }
    }

    async function loadPlatforms() {
      try {
        const res = await fetch(`${API_BASE}/platforms`, { headers: { Authorization: `Bearer ${token}` } });
        const data = await res.json();

        const platforms = data.platforms || [];
        document.getElementById('platform-list').innerHTML = platforms.map(p => `
          <label class="platform-check">
            <input type="checkbox" value="${p.id}"> ${p.name || p.platform}
          </label>
        `).join('') || '<p style="color: #888;">暂无已绑定平台</p>';
      } catch (e) {
        document.getElementById('platform-list').innerHTML = '<p style="color: #888;">加载失败</p>';
      }
    }

    async function publishContent() {
      const title = document.getElementById('publish-title').value.trim();
      const content = document.getElementById('publish-content').value.trim();
      const checked = document.querySelectorAll('#platform-list input:checked');
      const platforms = Array.from(checked).map(cb => cb.value);

      if (!title) return showMessage('请输入标题', 'error');
      if (!content) return showMessage('请输入内容', 'error');
      if (platforms.length === 0) return showMessage('请选择至少一个平台', 'error');

      try {
        const res = await fetch(`${API_BASE}/publish`, {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            Authorization: `Bearer ${token}`
          },
          body: JSON.stringify({ title, content, platforms })
        });

        if (res.ok) {
          showMessage(`已成功发布到 ${platforms.length} 个平台`);
          document.getElementById('publish-title').value = '';
          document.getElementById('publish-content').value = '';
        } else {
          const err = await res.json();
          showMessage(err.error || '发布失败', 'error');
        }
      } catch (e) {
        showMessage('操作失败', 'error');
      }
    }

    function showQuickCreate() {
      document.getElementById('quick-create-modal').style.display = 'flex';
    }

    function closeQuickCreate() {
      document.getElementById('quick-create-modal').style.display = 'none';
    }

    async function generateContent() {
      const topic = document.getElementById('quick-topic').value.trim();
      const type = document.getElementById('quick-type').value;
      const style = document.getElementById('quick-style').value;

      if (!topic) return showMessage('请输入创作主题', 'error');

      try {
        const res = await fetch(`${API_BASE}/ai/generate`, {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            Authorization: `Bearer ${token}`
          },
          body: JSON.stringify({ prompt: `创作一篇${type === 'article' ? '文章' : type === 'social' ? '社交媒体帖子' : type === 'video-script' ? '视频脚本' : '邮件推送'}，主题：${topic}，风格：${style}`, type: 'text' })
        });

        if (res.ok) {
          const data = await res.json();
          closeQuickCreate();
          switchTab('publish');
          document.getElementById('publish-title').value = topic;
          document.getElementById('publish-content').value = data.text || data.content || '';
          showMessage('AI 内容已生成，可选择平台发布');
        } else {
          showMessage('AI 生成失败，请重试', 'error');
        }
      } catch (e) {
        showMessage('操作失败', 'error');
      }
    }

    function logout() {
      localStorage.removeItem('token');
      window.location.href = '/login.html';
    }

    checkAuth().then(auth => {
      if (auth) {
        loadOverview();
      }
    });
  </script>
</body>
</html>
