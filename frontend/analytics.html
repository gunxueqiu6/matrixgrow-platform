<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MatrixGrow - 分析面板</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
            color: #fff;
        }

        .container { max-width: 1100px; margin: 0 auto; padding: 30px 20px; }

        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
        }

        .top-bar h1 {
            font-size: 1.8rem;
            background: linear-gradient(90deg, #4ECDC4, #44A8D4);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .back-link { color: rgba(255,255,255,0.5); text-decoration: none; }
        .back-link:hover { color: #4ECDC4; }

        .kpi-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 16px;
            margin-bottom: 30px;
        }

        .kpi-card {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 16px;
            padding: 24px;
            text-align: center;
        }

        .kpi-value {
            font-size: 2.2rem;
            font-weight: 700;
            background: linear-gradient(90deg, #4ECDC4, #44A8D4);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .kpi-label { font-size: 0.85rem; color: rgba(255,255,255,0.5); margin-top: 4px; }

        .panel-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 30px;
        }

        .panel {
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 16px;
            padding: 24px;
        }

        .panel.full { grid-column: 1 / -1; }

        .panel-title {
            font-size: 1rem;
            font-weight: 600;
            margin-bottom: 20px;
            color: rgba(255,255,255,0.8);
        }

        .funnel { display: flex; flex-direction: column; gap: 10px; }

        .funnel-step {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .funnel-label {
            width: 100px;
            font-size: 0.85rem;
            color: rgba(255,255,255,0.7);
            text-align: right;
        }

        .funnel-bar-wrap {
            flex: 1;
            height: 32px;
            background: rgba(255,255,255,0.05);
            border-radius: 6px;
            overflow: hidden;
        }

        .funnel-bar {
            height: 100%;
            border-radius: 6px;
            display: flex;
            align-items: center;
            padding-left: 12px;
            font-size: 0.85rem;
            font-weight: 600;
            transition: width 0.5s ease;
        }

        .funnel-step:nth-child(1) .funnel-bar { background: linear-gradient(90deg, #4ECDC4, #44A8D4); }
        .funnel-step:nth-child(2) .funnel-bar { background: linear-gradient(90deg, #6C5CE7, #A29BFE); }
        .funnel-step:nth-child(3) .funnel-bar { background: linear-gradient(90deg, #FDCB6E, #FFEAA7); color: #333; }
        .funnel-step:nth-child(4) .funnel-bar { background: linear-gradient(90deg, #E17055, #FAB1A0); }

        .funnel-value { min-width: 50px; font-size: 0.85rem; color: rgba(255,255,255,0.6); }

        .chart {
            width: 100%;
            height: 200px;
            display: flex;
            align-items: flex-end;
            gap: 4px;
        }

        .chart-bar {
            flex: 1;
            background: linear-gradient(180deg, #4ECDC4, #44A8D4);
            border-radius: 4px 4px 0 0;
            min-height: 2px;
            transition: height 0.3s;
            position: relative;
        }

        .chart-bar:hover { opacity: 0.8; }

        .chart-bar .tooltip {
            display: none;
            position: absolute;
            top: -24px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.8);
            color: #fff;
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 0.7rem;
            white-space: nowrap;
        }

        .chart-bar:hover .tooltip { display: block; }

        .platform-list { display: flex; flex-direction: column; gap: 10px; }

        .platform-row {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .platform-name {
            width: 80px;
            font-size: 0.85rem;
            color: rgba(255,255,255,0.7);
        }

        .platform-bar-wrap {
            flex: 1;
            height: 24px;
            background: rgba(255,255,255,0.05);
            border-radius: 4px;
            overflow: hidden;
        }

        .platform-bar {
            height: 100%;
            background: linear-gradient(90deg, #4ECDC4, #44A8D4);
            border-radius: 4px;
            transition: width 0.5s;
        }

        .platform-count {
            font-size: 0.85rem;
            color: rgba(255,255,255,0.6);
            min-width: 40px;
        }

        .activity-list { max-height: 200px; overflow-y: auto; }

        .activity-item {
            display: flex;
            justify-content: space-between;
            padding: 10px 0;
            border-bottom: 1px solid rgba(255,255,255,0.05);
            font-size: 0.85rem;
        }

        .activity-name { color: rgba(255,255,255,0.8); }
        .activity-status {
            padding: 2px 10px;
            border-radius: 20px;
            font-size: 0.75rem;
        }

        .activity-status.pending { background: rgba(253,203,110,0.2); color: #FDCB6E; }
        .activity-status.completed { background: rgba(78,205,196,0.2); color: #4ECDC4; }
        .activity-status.failed { background: rgba(255,107,107,0.2); color: #FF6B6B; }

        .loading-text { text-align: center; color: rgba(255,255,255,0.4); padding: 40px; }

        @media (max-width: 768px) {
            .kpi-grid { grid-template-columns: repeat(2, 1fr); }
            .panel-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="top-bar">
            <h1>分析面板</h1>
            <a href="/" class="back-link">← 返回首页</a>
        </div>

        <div class="kpi-grid">
            <div class="kpi-card">
                <div class="kpi-value" id="kpiPosts">-</div>
                <div class="kpi-label">发布内容</div>
            </div>
            <div class="kpi-card">
                <div class="kpi-value" id="kpiIntercepts">-</div>
                <div class="kpi-label">截流回复</div>
            </div>
            <div class="kpi-card">
                <div class="kpi-value" id="kpiDms">-</div>
                <div class="kpi-label">私信</div>
            </div>
            <div class="kpi-card">
                <div class="kpi-value" id="kpiWorkflows">-</div>
                <div class="kpi-label">工作流执行</div>
            </div>
        </div>

        <div class="panel-grid">
            <div class="panel">
                <div class="panel-title">转化漏斗</div>
                <div class="funnel" id="funnelChart">
                    <div class="loading-text">加载中...</div>
                </div>
            </div>

            <div class="panel">
                <div class="panel-title">平台分布</div>
                <div class="platform-list" id="platformBreakdown">
                    <div class="loading-text">加载中...</div>
                </div>
            </div>

            <div class="panel full">
                <div class="panel-title">每日趋势（近30天）</div>
                <div class="chart" id="dailyChart">
                    <div class="loading-text">加载中...</div>
                </div>
            </div>

            <div class="panel">
                <div class="panel-title">最近工作流执行</div>
                <div class="activity-list" id="activityStream">
                    <div class="loading-text">加载中...</div>
                </div>
            </div>
        </div>
    </div>

    <script src="/js/auth.js"></script>
    <script>
        async function fetchJSON(url) {
            const headers = Auth.authHeaders();
            headers['Content-Type'] = 'application/json';
            const res = await fetch(url, { headers });
            if (!res.ok) throw new Error(`HTTP ${res.status}`);
            return res.json();
        }

        function renderFunnel(data) {
            const steps = [
                { label: '内容创建', value: data.total_posts || 0 },
                { label: '截流发现', value: data.total_intercepts || 0 },
                { label: '成功回复', value: Math.round((data.total_intercepts || 0) * 0.7) },
                { label: '转化线索', value: data.total_dms || 0 }
            ];
            const maxVal = Math.max(...steps.map(s => s.value), 1);

            document.getElementById('funnelChart').innerHTML = steps.map(s => `
                <div class="funnel-step">
                    <div class="funnel-label">${s.label}</div>
                    <div class="funnel-bar-wrap">
                        <div class="funnel-bar" style="width:${(s.value / maxVal) * 100}%">${s.value}</div>
                    </div>
                    <div class="funnel-value">${s.value}</div>
                </div>
            `).join('');
        }

        function renderPlatforms(data) {
            const maxCount = Math.max(...data.map(d => d.count), 1);
            document.getElementById('platformBreakdown').innerHTML = data.map(d => `
                <div class="platform-row">
                    <div class="platform-name">${d.platform}</div>
                    <div class="platform-bar-wrap">
                        <div class="platform-bar" style="width:${(d.count / maxCount) * 100}%"></div>
                    </div>
                    <div class="platform-count">${d.count}</div>
                </div>
            `).join('') || '<div class="loading-text">暂无数据</div>';
        }

        function renderDailyChart(data) {
            const maxVal = Math.max(...data.map(d => Math.max(d.posts || 0, d.intercepts || 0)), 1);
            document.getElementById('dailyChart').innerHTML = data.map(d => `
                <div class="chart-bar" style="height:${((d.posts || 0) / maxVal) * 160 + 4}px">
                    <span class="tooltip">${d.day}: ${d.posts || 0} 发布</span>
                </div>
            `).join('') || '<div class="loading-text">暂无数据</div>';
        }

        function renderActivity(data) {
            document.getElementById('activityStream').innerHTML = data.slice(0, 15).map(d => `
                <div class="activity-item">
                    <span class="activity-name">${d.workflow_name}</span>
                    <span class="activity-status ${d.status}">${d.status}</span>
                </div>
            `).join('') || '<div class="loading-text">暂无数据</div>';
        }

        async function loadAll() {
            try {
                const [overview, platforms, daily, workflows] = await Promise.all([
                    fetchJSON('/api/analytics/overview'),
                    fetchJSON('/api/analytics/platforms'),
                    fetchJSON('/api/analytics/daily?days=30'),
                    fetchJSON('/api/workflow/executions?limit=50')
                ]);

                const od = overview.data || {};
                document.getElementById('kpiPosts').textContent = od.total_posts || 0;
                document.getElementById('kpiIntercepts').textContent = od.total_intercepts || 0;
                document.getElementById('kpiDms').textContent = od.total_dms || 0;
                document.getElementById('kpiWorkflows').textContent = od.total_workflows || 0;

                renderFunnel(od);
                renderPlatforms(platforms.data || []);
                renderDailyChart(daily.data || []);
                renderActivity(workflows.data || []);
            } catch (e) {
                document.querySelectorAll('.loading-text').forEach(el => {
                    el.textContent = '加载失败: ' + e.message;
                });
            }
        }

        loadAll();
    </script>
</body>
</html>
