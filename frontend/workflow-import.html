<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MatrixGrow - 工作流导入</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #0f0f23; color: #fff; }
    .app { display: flex; min-height: 100vh; }
    .sidebar { width: 260px; background: #1a1a2e; padding: 20px; display: flex; flex-direction: column; }
    .logo { font-size: 24px; font-weight: bold; margin-bottom: 40px; color: #00d4ff; text-decoration: none; }
    .nav-item { padding: 12px 16px; margin: 4px 0; border-radius: 8px; cursor: pointer; transition: background 0.2s; color: #888; }
    .nav-item:hover, .nav-item.active { background: #16213e; color: #fff; }
    .main { flex: 1; padding: 30px; overflow-y: auto; }
    .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; }
    .header h1 { font-size: 28px; }
    .tier-badge { padding: 6px 16px; border-radius: 20px; font-size: 14px; font-weight: bold; }
    .tier-free { background: #333; color: #888; }
    .tier-pro { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: #fff; }
    .tier-promax { background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%); color: #fff; }
    .tier-studio { background: linear-gradient(135deg, #ffd700 0%, #ff8c00 100%); color: #000; }
    .card { background: #1a1a2e; padding: 24px; border-radius: 16px; margin-bottom: 20px; }
    .card h2 { margin-bottom: 20px; font-size: 18px; }
    .btn { padding: 10px 20px; border: none; border-radius: 8px; cursor: pointer; font-size: 14px; transition: all 0.2s; }
    .btn-primary { background: #00d4ff; color: #000; }
    .btn-primary:hover { background: #00b8e6; }
    .btn-secondary { background: #333; color: #fff; }
    .btn-secondary:hover { background: #444; }
    .input { width: 100%; padding: 12px; border: 1px solid #333; border-radius: 8px; background: #0f0f23; color: #fff; margin-bottom: 12px; }
    .input:focus { outline: none; border-color: #00d4ff; }
    textarea.input { min-height: 150px; resize: vertical; font-family: monospace; }
    .upload-zone { border: 2px dashed #333; border-radius: 16px; padding: 40px; text-align: center; cursor: pointer; transition: all 0.2s; }
    .upload-zone:hover, .upload-zone.dragover { border-color: #00d4ff; background: rgba(0, 212, 255, 0.05); }
    .upload-zone .icon { font-size: 48px; margin-bottom: 16px; }
    .upload-zone p { color: #888; }
    .node-group { margin-bottom: 20px; padding: 16px; background: #0f0f23; border-radius: 12px; }
    .node-group h3 { margin-bottom: 12px; font-size: 16px; }
    .node-item { display: flex; justify-content: space-between; align-items: center; padding: 12px; background: #1a1a2e; border-radius: 8px; margin-bottom: 8px; }
    .node-info { flex: 1; }
    .node-name { font-weight: 500; margin-bottom: 4px; }
    .node-type { font-size: 12px; color: #888; }
    .node-select { width: 200px; }
    select.input { width: auto; margin-bottom: 0; }
    .warning { padding: 12px; background: rgba(255, 193, 7, 0.1); border: 1px solid #ffc107; color: #ffc107; border-radius: 8px; margin-bottom: 16px; }
    .message { padding: 12px; border-radius: 8px; margin-bottom: 16px; }
    .message.success { background: rgba(0, 212, 255, 0.1); border: 1px solid #00d4ff; color: #00d4ff; }
    .message.error { background: rgba(255, 0, 0, 0.1); border: 1px solid #ff4444; color: #ff4444; }
    .loading { text-align: center; padding: 40px; color: #888; }
    .hidden { display: none; }
    .workflow-preview { background: #0f0f23; border-radius: 12px; padding: 20px; font-family: monospace; font-size: 12px; max-height: 300px; overflow-y: auto; }
  </style>
</head>
<body>
  <div class="app">
    <div class="sidebar">
      <a href="dashboard.html" class="logo">MatrixGrow</a>
      <nav>
        <div class="nav-item" onclick="window.location.href='dashboard.html'">控制台</div>
        <div class="nav-item" onclick="window.location.href='agent.html'">AI 助手</div>
        <div class="nav-item" onclick="window.location.href='workflows.html'">工作流商店</div>
        <div class="nav-item active">导入工作流</div>
        <div class="nav-item" onclick="window.location.href='webhooks.html'">Webhook</div>
        <div class="nav-item" onclick="window.location.href='subscription.html'">订阅</div>
      </nav>
      <div style="margin-top: auto; padding-top: 20px; border-top: 1px solid #333;">
        <div class="nav-item" onclick="logout()">退出登录</div>
      </div>
    </div>

    <div class="main">
      <div class="header">
        <h1>导入工作流</h1>
        <span id="tier-badge" class="tier-badge tier-free">免费版</span>
      </div>

      <!-- Step 1: 上传 -->
      <div id="step-upload" class="card">
        <h2>第一步：上传或粘贴工作流</h2>
        <div class="upload-zone" id="upload-zone" onclick="document.getElementById('file-input').click()">
          <div class="icon">📁</div>
          <p>拖拽文件到此处，或点击选择</p>
          <p style="margin-top: 8px; font-size: 12px;">支持 Coze (.json) 或 Dify (.json) 格式</p>
        </div>
        <input type="file" id="file-input" accept=".json" style="display: none;">
        <div style="margin-top: 16px;">
          <p style="color: #888; margin-bottom: 8px;">或直接粘贴 JSON 内容：</p>
          <textarea class="input" id="json-input" placeholder="粘贴工作流 JSON 内容..."></textarea>
          <button class="btn btn-primary" onclick="parseJson()">解析</button>
        </div>
      </div>

      <!-- Step 2: 节点映射 -->
      <div id="step-mapping" class="card hidden">
        <h2>第二步：配置节点映射</h2>
        <div id="mapping-content">
          <div class="loading">加载中...</div>
        </div>
        <div style="display: flex; gap: 12px; margin-top: 20px;">
          <button class="btn btn-secondary" onclick="goBack()">返回</button>
          <button class="btn btn-primary" onclick="convertWorkflow()">转换并预览</button>
        </div>
      </div>

      <!-- Step 3: 预览并安装 -->
      <div id="step-preview" class="card hidden">
        <h2>第三步：预览并安装</h2>
        <div id="preview-content">
          <div class="loading">加载中...</div>
        </div>
        <div style="display: flex; gap: 12px; margin-top: 20px;">
          <button class="btn btn-secondary" onclick="goBackToMapping()">返回映射</button>
          <button class="btn btn-primary" onclick="installWorkflow()">安装到我的工作流</button>
        </div>
      </div>
    </div>
  </div>

  <script>
    const API_BASE = '/api';
    let token = localStorage.getItem('token');
    let currentImportId = null;
    let detectedNodes = {};
    let nodeMappings = {};

    async function checkAuth() {
      if (!token) {
        window.location.href = '/login.html';
        return false;
      }
      try {
        const res = await fetch(`${API_BASE}/auth/me`, { headers: { Authorization: `Bearer ${token}` } });
        if (!res.ok) throw new Error('Unauthorized');
        return true;
      } catch {
        localStorage.removeItem('token');
        window.location.href = '/login.html';
        return false;
      }
    }

    async function loadUserInfo() {
      if (!await checkAuth()) return;
      try {
        const res = await fetch(`${API_BASE}/subscription`, { headers: { Authorization: `Bearer ${token}` } });
        if (res.ok) {
          const sub = await res.json();
          const badge = document.getElementById('tier-badge');
          badge.className = `tier-badge tier-${sub.tier}`;
          const tierNames = { free: '免费版', pro: 'Pro', promax: 'ProMax', studio: 'Studio' };
          badge.textContent = tierNames[sub.tier];
        }
      } catch (e) {
        console.error('Failed to load user info:', e);
      }
    }

    const uploadZone = document.getElementById('upload-zone');
    const fileInput = document.getElementById('file-input');

    uploadZone.addEventListener('dragover', (e) => {
      e.preventDefault();
      uploadZone.classList.add('dragover');
    });
    uploadZone.addEventListener('dragleave', () => {
      uploadZone.classList.remove('dragover');
    });
    uploadZone.addEventListener('drop', (e) => {
      e.preventDefault();
      uploadZone.classList.remove('dragover');
      const file = e.dataTransfer.files[0];
      if (file) handleFile(file);
    });
    fileInput.addEventListener('change', (e) => {
      if (e.target.files[0]) handleFile(e.target.files[0]);
    });

    async function handleFile(file) {
      const reader = new FileReader();
      reader.onload = async (e) => {
        try {
          const content = e.target.result;
          await submitImport(content);
        } catch (err) {
          showMessage('文件解析失败: ' + err.message, 'error');
        }
      };
      reader.readAsText(file);
    }

    async function parseJson() {
      const content = document.getElementById('json-input').value.trim();
      if (!content) {
        showMessage('请输入 JSON 内容', 'error');
        return;
      }
      await submitImport(content);
    }

    async function submitImport(content) {
      try {
        const res = await fetch(`${API_BASE}/workflow/import`, {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'Authorization': `Bearer ${token}`
          },
          body: JSON.stringify({ content, auto_detect: true })
        });

        if (!res.ok) {
          const err = await res.json();
          throw new Error(err.error || '导入失败');
        }

        const data = await res.json();
        currentImportId = data.importId;
        detectedNodes = data.detectedNodes || {};
        renderMapping(data);
      } catch (e) {
        showMessage(e.message, 'error');
      }
    }

    function renderMapping(data) {
      document.getElementById('step-upload').classList.add('hidden');
      document.getElementById('step-preview').classList.add('hidden');
      document.getElementById('step-mapping').classList.remove('hidden');

      let html = '';
      const nodeTypes = [
        { key: 'llm', title: '🤖 LLM 节点' },
        { key: 'image_gen', title: '🎨 图像生成节点' },
        { key: 'video_gen', title: '🎬 视频生成节点' },
        { key: 'http', title: '🌐 HTTP 请求节点' },
        { key: 'knowledge', title: '📚 知识库节点' },
        { key: 'plugin', title: '🔌 插件节点' },
        { key: 'unsupported', title: '⚠️ 不支持的节点' }
      ];

      let hasNodes = false;
      for (const { key, title } of nodeTypes) {
        const nodes = detectedNodes[key];
        if (nodes && nodes.length > 0) {
          hasNodes = true;
          html += `<div class="node-group">
            <h3>${title}</h3>`;
          
          for (const node of nodes) {
            html += `<div class="node-item">
              <div class="node-info">
                <div class="node-name">${node.label || '未命名节点'}</div>
                <div class="node-type">原始类型: ${node.original_type || key}</div>
              </div>
              ${key === 'llm' ? `
              <select class="input node-select" data-node-id="${node.id}" data-type="provider">
                <option value="deepseek">DeepSeek</option>
                <option value="claude">Claude</option>
                <option value="openai">OpenAI</option>
                <option value="qwen">Qwen</option>
              </select>
              ` : key === 'image_gen' ? `
              <select class="input node-select" data-node-id="${node.id}" data-type="provider">
                <option value="fal">Fal.ai</option>
                <option value="replicate">Replicate</option>
              </select>
              ` : key === 'video_gen' ? `
              <select class="input node-select" data-node-id="${node.id}" data-type="provider">
                <option value="heygen">HeyGen</option>
              </select>
              ` : key !== 'unsupported' ? `<span style="color: #888;">自动映射</span>` : `<span style="color: #ff4444;">需手动配置</span>`}
            </div>`;
          }
          
          html += `</div>`;
        }
      }

      if (!hasNodes) {
        html = '<p style="color: #888;">未检测到需要配置的节点，可直接转换</p>';
      }

      document.getElementById('mapping-content').innerHTML = html;
    }

    function collectMappings() {
      const mappings = {};
      document.querySelectorAll('.node-select').forEach(select => {
        const nodeId = select.dataset.nodeId;
        if (!mappings[nodeId]) mappings[nodeId] = {};
        mappings[nodeId].provider = select.value;
      });
      return mappings;
    }

    async function convertWorkflow() {
      nodeMappings = collectMappings();
      
      try {
        const res = await fetch(`${API_BASE}/workflow/import/${currentImportId}/mapping`, {
          method: 'PUT',
          headers: {
            'Content-Type': 'application/json',
            'Authorization': `Bearer ${token}`
          },
          body: JSON.stringify({ nodeMappings })
        });

        if (!res.ok) {
          const err = await res.json();
          throw new Error(err.error || '转换失败');
        }

        const data = await res.json();
        renderPreview(data);
      } catch (e) {
        showMessage(e.message, 'error');
      }
    }

    function renderPreview(data) {
      document.getElementById('step-mapping').classList.add('hidden');
      document.getElementById('step-preview').classList.remove('hidden');

      let html = '';

      if (data.warnings && data.warnings.length > 0) {
        html += `<div class="warning">
          <strong>注意事项：</strong>
          <ul style="margin-top: 8px; margin-left: 20px;">
            ${data.warnings.map(w => `<li>${w}</li>`).join('')}
          </ul>
        </div>`;
      }

      html += `<h3 style="margin-bottom: 16px;">转换后的工作流预览</h3>`;
      
      if (data.n8nWorkflow) {
        html += `<div class="workflow-preview">
          <pre>${JSON.stringify(data.n8nWorkflow, null, 2)}</pre>
        </div>`;
      }

      html += `<div style="margin-top: 16px;">
        <input type="text" class="input" id="workflow-name" placeholder="工作流名称" value="导入的工作流">
      </div>`;

      document.getElementById('preview-content').innerHTML = html;
    }

    async function installWorkflow() {
      const name = document.getElementById('workflow-name').value || '导入的工作流';
      
      try {
        const res = await fetch(`${API_BASE}/workflow/import/${currentImportId}/install`, {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'Authorization': `Bearer ${token}`
          },
          body: JSON.stringify({ name })
        });

        if (!res.ok) {
          const err = await res.json();
          throw new Error(err.error || '安装失败');
        }

        showMessage('工作流安装成功！', 'success');
        setTimeout(() => {
          window.location.href = 'workflows.html';
        }, 1500);
      } catch (e) {
        showMessage(e.message, 'error');
      }
    }

    function goBack() {
      document.getElementById('step-mapping').classList.add('hidden');
      document.getElementById('step-upload').classList.remove('hidden');
      currentImportId = null;
    }

    function goBackToMapping() {
      document.getElementById('step-preview').classList.add('hidden');
      document.getElementById('step-mapping').classList.remove('hidden');
    }

    function showMessage(text, type = 'success') {
      const msg = document.createElement('div');
      msg.className = `message ${type}`;
      msg.textContent = text;
      document.querySelector('.main').insertBefore(msg, document.querySelector('.card'));
      setTimeout(() => msg.remove(), 5000);
    }

    function logout() {
      localStorage.removeItem('token');
      window.location.href = '/login.html';
    }

    loadUserInfo();
  </script>
</body>
</html>
