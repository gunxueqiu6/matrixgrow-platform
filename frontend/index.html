<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MatrixGrow - AI 增长引擎</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
            color: #fff;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
            padding: 40px 20px;
        }

        header {
            text-align: center;
            margin-bottom: 30px;
        }

        h1 {
            font-size: 3rem;
            font-weight: 700;
            background: linear-gradient(90deg, #4ECDC4, #44A8D4);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 10px;
        }

        .subtitle {
            font-size: 1.1rem;
            color: rgba(255,255,255,0.7);
        }

        .nav-bar {
            display: flex;
            justify-content: flex-end;
            align-items: center;
            gap: 16px;
            margin-bottom: 20px;
        }

        .nav-link {
            color: rgba(255,255,255,0.7);
            text-decoration: none;
            font-size: 0.9rem;
            padding: 8px 16px;
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 50px;
            transition: all 0.3s;
        }

        .nav-link:hover {
            border-color: #4ECDC4;
            color: #4ECDC4;
        }

        .nav-user {
            color: rgba(255,255,255,0.9);
            font-size: 0.9rem;
        }

        .nav-logout {
            color: rgba(255,255,255,0.5);
            cursor: pointer;
            font-size: 0.85rem;
            padding: 8px 12px;
            border: 1px solid rgba(255,255,255,0.15);
            border-radius: 50px;
            background: none;
            transition: all 0.3s;
        }

        .nav-logout:hover { color: #FF6B6B; border-color: #FF6B6B; }

        .main-card {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 24px;
            padding: 40px;
            backdrop-filter: blur(10px);
        }

        .input-section {
            margin-bottom: 30px;
        }

        label {
            display: block;
            font-size: 0.9rem;
            color: rgba(255,255,255,0.8);
            margin-bottom: 12px;
        }

        textarea {
            width: 100%;
            height: 120px;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 12px;
            padding: 16px;
            color: #fff;
            font-size: 1rem;
            resize: none;
            transition: all 0.3s ease;
        }

        textarea:focus {
            outline: none;
            border-color: #4ECDC4;
            background: rgba(255,255,255,0.08);
        }

        textarea::placeholder {
            color: rgba(255,255,255,0.4);
        }

        .platform-selector {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-bottom: 30px;
        }

        .platform-btn {
            padding: 10px 20px;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 50px;
            color: rgba(255,255,255,0.8);
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 0.9rem;
        }

        .platform-btn:hover {
            background: rgba(255,255,255,0.1);
            border-color: rgba(255,255,255,0.3);
        }

        .platform-btn.active {
            background: linear-gradient(90deg, #4ECDC4, #44A8D4);
            border-color: transparent;
            color: #fff;
        }

        .submit-btn {
            width: 100%;
            padding: 18px;
            background: linear-gradient(90deg, #4ECDC4, #44A8D4);
            border: none;
            border-radius: 12px;
            color: #fff;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .submit-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(78, 205, 196, 0.3);
        }

        .submit-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .status-section {
            margin-top: 30px;
            padding: 20px;
            background: rgba(0,0,0,0.2);
            border-radius: 12px;
            display: none;
        }

        .status-section.show {
            display: block;
        }

        .status-title {
            font-size: 0.9rem;
            color: rgba(255,255,255,0.6);
            margin-bottom: 10px;
        }

        .status-content {
            font-size: 0.95rem;
            line-height: 1.6;
        }

        .platform-status {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 8px;
        }

        .platform-status .platform-name {
            min-width: 100px;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #4ECDC4;
        }

        .status-dot.pending {
            background: #FFD93D;
        }

        .status-dot.error {
            background: #FF6B6B;
        }

        .stats {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            margin-top: 40px;
        }

        .stat-card {
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 16px;
            padding: 24px;
            text-align: center;
        }

        .stat-number {
            font-size: 2.5rem;
            font-weight: 700;
            background: linear-gradient(90deg, #4ECDC4, #44A8D4);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .stat-label {
            font-size: 0.85rem;
            color: rgba(255,255,255,0.6);
            margin-top: 5px;
        }

        .features {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
            margin-top: 40px;
        }

        .feature-card {
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 16px;
            padding: 24px;
        }

        .feature-icon {
            font-size: 2rem;
            margin-bottom: 12px;
        }

        .feature-title {
            font-size: 1rem;
            font-weight: 600;
            margin-bottom: 8px;
        }

        .feature-desc {
            font-size: 0.85rem;
            color: rgba(255,255,255,0.6);
            line-height: 1.5;
        }

        @media (max-width: 768px) {
            h1 {
                font-size: 2rem;
            }

            .stats {
                grid-template-columns: 1fr;
            }

            .features {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>MatrixGrow</h1>
            <p class="subtitle">AI 独立开发者增长引擎 - 一句话，全网分发</p>
        </header>

        <div class="nav-bar">
            <a href="/analytics.html" class="nav-link">分析面板</a>
            <span class="auth-logged-out">
                <a href="/login.html" class="nav-link">登录</a>
            </span>
            <span class="auth-logged-in" style="display:none;">
                <span class="nav-user auth-user-name"></span>
                <button class="nav-logout" onclick="Auth.logout()">退出</button>
            </span>
        </div>

        <div class="main-card">
            <div class="input-section">
                <label for="content">输入你的产品介绍</label>
                <textarea id="content" placeholder="例如：我做了一个用 AI 自动帮产品改写并分发到全网的工具，再也不用人肉贴了。"></textarea>
            </div>

            <div class="input-section">
                <label>选择发布平台（可多选）</label>
                <div class="platform-selector">
                    <button class="platform-btn active" data-platform="all">全平台</button>
                    <button class="platform-btn" data-platform="tech-blog">技术博客</button>
                    <button class="platform-btn" data-platform="social">社交媒体</button>
                    <button class="platform-btn" data-platform="hardcore">硬核社区</button>
                    <button class="platform-btn" data-platform="x">X / Twitter</button>
                </div>
            </div>

            <button class="submit-btn" id="submitBtn">开始 AI 分发</button>

            <div class="status-section" id="statusSection">
                <div class="status-title">分发状态</div>
                <div class="status-content" id="statusContent"></div>
            </div>
        </div>

        <div class="stats">
            <div class="stat-card">
                <div class="stat-number" id="postsCount">0</div>
                <div class="stat-label">已发布内容</div>
            </div>
            <div class="stat-card">
                <div class="stat-number" id="platformsCount">0</div>
                <div class="stat-label">覆盖平台</div>
            </div>
            <div class="stat-card">
                <div class="stat-number" id="leadsCount">0</div>
                <div class="stat-label">截流线索</div>
            </div>
        </div>

        <div class="features">
            <div class="feature-card">
                <div class="feature-icon">✍️</div>
                <div class="feature-title">AI 文本改写</div>
                <div class="feature-desc">自动为不同平台调整文案风格，从技术博客到社交媒体，AI 都能驾驭</div>
            </div>
            <div class="feature-card">
                <div class="feature-icon">🎨</div>
                <div class="feature-title">智能配图</div>
                <div class="feature-desc">自动生成金句卡片和封面图，让你的内容在信息流中脱颖而出</div>
            </div>
            <div class="feature-card">
                <div class="feature-icon">🚀</div>
                <div class="feature-title">全网分发</div>
                <div class="feature-desc">API + RPA 双轨并行，覆盖所有主流平台，真正实现一键全网发布</div>
            </div>
            <div class="feature-card">
                <div class="feature-icon">🎯</div>
                <div class="feature-title">智能截流</div>
                <div class="feature-desc">7x24 监听目标用户，自动三段式回复，把潜在客户引到你的产品</div>
            </div>
        </div>
    </div>

    <script src="/js/auth.js"></script>
    <script>
        const textarea = document.getElementById('content');
        const platformBtns = document.querySelectorAll('.platform-btn');
        const submitBtn = document.getElementById('submitBtn');
        const statusSection = document.getElementById('statusSection');
        const statusContent = document.getElementById('statusContent');

        let selectedPlatform = 'all';

        platformBtns.forEach(btn => {
            btn.addEventListener('click', () => {
                platformBtns.forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                selectedPlatform = btn.dataset.platform;
            });
        });

        submitBtn.addEventListener('click', async () => {
            const content = textarea.value.trim();
            if (!content) {
                alert('请输入内容');
                return;
            }

            submitBtn.disabled = true;
            submitBtn.textContent = 'AI 正在改写中...';
            statusSection.classList.add('show');
            statusContent.innerHTML = '<div class="platform-status"><span class="platform-name">准备分发...</span><span class="status-dot pending"></span></div>';

            try {
                const response = await fetch('/api/webhook/matrixgrow-input', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        ...Auth.authHeaders()
                    },
                    body: JSON.stringify({
                        text: content,
                        platforms: selectedPlatform === 'all' ? ['tech-blog', 'social', 'hardcore', 'x'] : [selectedPlatform]
                    })
                });

                const platforms = selectedPlatform === 'all'
                    ? ['X/Twitter', 'LinkedIn', 'Dev.to', 'Medium', 'V2EX', '小红书']
                    : [selectedPlatform];

                statusContent.innerHTML = platforms.map(p => `
                    <div class="platform-status">
                        <span class="platform-name">${p}</span>
                        <span class="status-dot"></span>
                    </div>
                `).join('');

                submitBtn.textContent = '分发完成!';
                submitBtn.style.background = 'linear-gradient(90deg, #4ECDC4, #44A8D4)';

                // Update stats
                const postsCount = document.getElementById('postsCount');
                postsCount.textContent = parseInt(postsCount.textContent) + 1;

            } catch (error) {
                statusContent.innerHTML = `<div style="color: #FF6B6B;">错误: ${error.message}</div>`;
                submitBtn.disabled = false;
                submitBtn.textContent = '重试';
            }
        });

        textarea.addEventListener('input', () => {
            submitBtn.disabled = false;
            submitBtn.textContent = '开始 AI 分发';
        });
    </script>
</body>
</html>
