<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MatrixGrow - 登录</title>
  <link rel="stylesheet" href="/css/base.css">
  <style>
    .auth-page {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: var(--space-4);
      background: var(--color-bg-primary);
    }

    .auth-box {
      width: 100%;
      max-width: 420px;
    }

    .auth-logo {
      text-align: center;
      margin-bottom: var(--space-8);
    }

    .auth-logo h1 {
      font-size: var(--text-3xl);
      background: var(--gradient-brand);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .auth-logo p {
      color: var(--color-text-secondary);
      font-size: var(--text-sm);
      margin-top: var(--space-2);
    }

    .auth-card {
      background: var(--color-bg-card);
      border: 1px solid var(--color-border);
      border-radius: var(--radius-xl);
      padding: var(--space-8);
    }

    .auth-tabs {
      display: flex;
      margin-bottom: var(--space-6);
      border-bottom: 1px solid var(--color-border);
    }

    .auth-tab {
      flex: 1;
      text-align: center;
      padding: var(--space-3);
      cursor: pointer;
      color: var(--color-text-muted);
      border-bottom: 2px solid transparent;
      transition: all var(--transition-fast);
      background: none;
      border-top: none;
      border-left: none;
      border-right: none;
      font-size: var(--text-sm);
      font-weight: var(--weight-medium);
    }

    .auth-tab:hover {
      color: var(--color-text-secondary);
    }

    .auth-tab.active {
      color: var(--color-brand);
      border-bottom-color: var(--color-brand);
    }

    .auth-error {
      color: var(--color-error);
      font-size: var(--text-sm);
      margin-top: var(--space-3);
      display: none;
      text-align: center;
    }

    .auth-error.show {
      display: block;
    }

    .auth-footer {
      text-align: center;
      margin-top: var(--space-5);
    }

    .auth-footer a {
      color: var(--color-text-muted);
      text-decoration: none;
      font-size: var(--text-sm);
    }

    .auth-footer a:hover {
      color: var(--color-brand);
    }

    .auth-divider {
      display: flex;
      align-items: center;
      gap: var(--space-3);
      margin: var(--space-5) 0;
      color: var(--color-text-muted);
      font-size: var(--text-xs);
    }

    .auth-divider::before,
    .auth-divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--color-border);
    }
  </style>
</head>
<body>
  <div class="auth-page">
    <div class="auth-box">
      <div class="auth-logo">
        <h1>MatrixGrow</h1>
        <p>AI 独立开发者增长引擎</p>
      </div>

      <div class="auth-card">
        <div class="auth-tabs">
          <button class="auth-tab active" data-tab="login">登录</button>
          <button class="auth-tab" data-tab="register">注册</button>
        </div>

        <form id="loginForm">
          <div class="input-group">
            <label class="label" for="loginEmail">邮箱</label>
            <input type="email" class="input" id="loginEmail" placeholder="your@email.com" required>
          </div>
          <div class="input-group">
            <label class="label" for="loginPassword">密码</label>
            <input type="password" class="input" id="loginPassword" placeholder="至少 6 位" required>
          </div>
          <div class="auth-error" id="loginError"></div>
          <button type="submit" class="btn btn-primary btn-lg btn-block" id="loginBtn" style="margin-top:var(--space-2);">登录</button>
        </form>

        <form id="registerForm" style="display:none;">
          <div class="input-group">
            <label class="label" for="regEmail">邮箱</label>
            <input type="email" class="input" id="regEmail" placeholder="your@email.com" required>
          </div>
          <div class="input-group">
            <label class="label" for="regName">昵称（可选）</label>
            <input type="text" class="input" id="regName" placeholder="怎么称呼你">
          </div>
          <div class="input-group">
            <label class="label" for="regPassword">密码</label>
            <input type="password" class="input" id="regPassword" placeholder="至少 6 位" required>
          </div>
          <div class="auth-error" id="regError"></div>
          <button type="submit" class="btn btn-primary btn-lg btn-block" id="regBtn" style="margin-top:var(--space-2);">注册</button>
        </form>
      </div>

      <div class="auth-footer">
        <a href="/">&#x2190; 返回首页</a>
      </div>
    </div>
  </div>

  <script src="/js/shared.js"></script>
  <script>
    (function() {
      if (MatrixGrow.getToken()) {
        window.location.href = '/';
        return;
      }

      const tabs = document.querySelectorAll('.auth-tab');
      const loginForm = document.getElementById('loginForm');
      const registerForm = document.getElementById('registerForm');

      tabs.forEach(tab => {
        tab.addEventListener('click', () => {
          tabs.forEach(t => t.classList.remove('active'));
          tab.classList.add('active');
          const target = tab.dataset.tab;
          loginForm.style.display = target === 'login' ? 'block' : 'none';
          registerForm.style.display = target === 'register' ? 'block' : 'none';
          document.querySelectorAll('.auth-error').forEach(e => e.classList.remove('show'));
        });
      });

      loginForm.addEventListener('submit', async (e) => {
        e.preventDefault();
        const btn = document.getElementById('loginBtn');
        const err = document.getElementById('loginError');
        btn.disabled = true;
        btn.textContent = '登录中...';
        err.classList.remove('show');

        try {
          const res = await fetch('/api/auth/login', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
              email: document.getElementById('loginEmail').value,
              password: document.getElementById('loginPassword').value
            })
          });
          if (!res.ok) {
            const data = await res.json().catch(() => ({}));
            throw new Error(data.error || '登录失败');
          }
          const data = await res.json();
          localStorage.setItem('token', data.token);
          window.location.href = '/';
        } catch (ex) {
          err.textContent = ex.message;
          err.classList.add('show');
          btn.disabled = false;
          btn.textContent = '登录';
        }
      });

      registerForm.addEventListener('submit', async (e) => {
        e.preventDefault();
        const btn = document.getElementById('regBtn');
        const err = document.getElementById('regError');
        btn.disabled = true;
        btn.textContent = '注册中...';
        err.classList.remove('show');

        try {
          const res = await fetch('/api/auth/register', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
              email: document.getElementById('regEmail').value,
              password: document.getElementById('regPassword').value,
              name: document.getElementById('regName').value
            })
          });
          if (!res.ok) {
            const data = await res.json().catch(() => ({}));
            throw new Error(data.error || '注册失败');
          }
          const data = await res.json();
          localStorage.setItem('token', data.token);
          window.location.href = '/';
        } catch (ex) {
          err.textContent = ex.message;
          err.classList.add('show');
          btn.disabled = false;
          btn.textContent = '注册';
        }
      });
    })();
  </script>
</body>
</html>
