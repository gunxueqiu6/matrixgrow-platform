<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MatrixGrow - 创作中心</title>
  <link rel="stylesheet" href="/css/base.css">
  <style>
    /* Side-by-side rewrite preview */
    .rewrite-compare {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: var(--space-4);
      margin-bottom: var(--space-4);
    }

    .rewrite-pane {
      background: var(--color-bg-secondary);
      border: 1px solid var(--color-border);
      border-radius: var(--radius-lg);
      overflow: hidden;
    }

    .rewrite-pane .pane-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: var(--space-2) var(--space-3);
      background: var(--color-bg-card);
      border-bottom: 1px solid var(--color-border);
      font-size: var(--text-xs);
      color: var(--color-text-muted);
    }

    .rewrite-pane .pane-header .pane-label {
      font-weight: var(--weight-medium);
      color: var(--color-text-secondary);
    }

    .rewrite-pane .pane-body {
      padding: var(--space-3);
      font-size: var(--text-sm);
      line-height: var(--leading-relaxed);
      max-height: 300px;
      overflow-y: auto;
      white-space: pre-wrap;
    }

    .rewrite-pane.original .pane-body {
      color: var(--color-text-muted);
    }

    .rewrite-pane.rewritten .pane-body {
      color: var(--color-text-primary);
    }

    .rewrite-pane .diff-added {
      background: rgba(74, 222, 128, 0.15);
      color: var(--color-success);
    }

    .rewrite-pane .diff-removed {
      background: rgba(255, 68, 68, 0.15);
      color: var(--color-error);
      text-decoration: line-through;
    }

    /* Publish progress */
    .publish-progress {
      margin: var(--space-4) 0;
    }

    .publish-platform-row {
      display: flex;
      align-items: center;
      gap: var(--space-3);
      padding: var(--space-2) var(--space-3);
      background: var(--color-bg-secondary);
      border-radius: var(--radius-md);
      margin-bottom: var(--space-2);
      transition: all var(--transition-fast);
    }

    .publish-platform-row .pp-icon {
      width: 28px;
      height: 28px;
      border-radius: var(--radius-md);
      background: var(--color-bg-card);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      flex-shrink: 0;
    }

    .publish-platform-row .pp-name {
      flex: 1;
      font-size: var(--text-sm);
      font-weight: var(--weight-medium);
    }

    .publish-platform-row .pp-status {
      font-size: var(--text-xs);
      display: flex;
      align-items: center;
      gap: var(--space-1);
    }

    .publish-platform-row .pp-status .status-dot-sm {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      display: inline-block;
    }

    .publish-platform-row.pending {
      opacity: 0.6;
    }

    .publish-platform-row.pending .pp-status {
      color: var(--color-text-muted);
    }

    .publish-platform-row.publishing .pp-status {
      color: var(--color-brand);
    }
    .publish-platform-row.publishing .status-dot-sm {
      background: var(--color-brand);
      animation: pulse 1s infinite;
    }

    .publish-platform-row.done .pp-status {
      color: var(--color-success);
    }
    .publish-platform-row.done .status-dot-sm {
      background: var(--color-success);
    }

    .publish-platform-row.failed .pp-status {
      color: var(--color-error);
    }
    .publish-platform-row.failed .status-dot-sm {
      background: var(--color-error);
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }

    /* Platform checkboxes grid */
    .platform-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
      gap: var(--space-2);
      margin-bottom: var(--space-4);
    }

    .platform-check-card {
      display: flex;
      align-items: center;
      gap: var(--space-2);
      padding: var(--space-2) var(--space-3);
      background: var(--color-bg-secondary);
      border: 1px solid var(--color-border);
      border-radius: var(--radius-md);
      cursor: pointer;
      transition: all var(--transition-fast);
      font-size: var(--text-sm);
    }

    .platform-check-card:hover {
      border-color: var(--color-brand);
    }

    .platform-check-card.checked {
      border-color: var(--color-brand);
      background: rgba(0, 212, 255, 0.08);
    }

    .platform-check-card input {
      accent-color: var(--color-brand);
    }

    /* Stats overview cards */
    .create-stats {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
      gap: var(--space-4);
      margin-bottom: var(--space-5);
    }

    .create-stat {
      background: var(--color-bg-card);
      border: 1px solid var(--color-border);
      border-radius: var(--radius-lg);
      padding: var(--space-4);
      text-align: center;
    }

    .create-stat .cs-value {
      font-size: var(--text-2xl);
      font-weight: var(--weight-bold);
      color: var(--color-brand);
    }

    .create-stat .cs-label {
      font-size: var(--text-xs);
      color: var(--color-text-muted);
      margin-top: var(--space-1);
    }

    /* Quick action cards */
    .quick-actions {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: var(--space-3);
    }

    .quick-action-btn {
      display: flex;
      align-items: center;
      gap: var(--space-3);
      padding: var(--space-4);
      background: var(--color-bg-secondary);
      border: 1px solid var(--color-border);
      border-radius: var(--radius-lg);
      cursor: pointer;
      transition: all var(--transition-fast);
      text-decoration: none;
      color: inherit;
    }

    .quick-action-btn:hover {
      border-color: var(--color-brand);
      transform: translateY(-2px);
    }

    .quick-action-btn .qa-icon {
      width: 40px;
      height: 40px;
      border-radius: var(--radius-md);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      flex-shrink: 0;
    }

    .quick-action-btn .qa-icon.blue { background: rgba(0, 212, 255, 0.15); }
    .quick-action-btn .qa-icon.purple { background: rgba(102, 126, 234, 0.15); }
    .quick-action-btn .qa-icon.green { background: rgba(74, 222, 128, 0.15); }
    .quick-action-btn .qa-icon.orange { background: rgba(245, 158, 11, 0.15); }

    .quick-action-btn .qa-text h4 {
      font-size: var(--text-sm);
      font-weight: var(--weight-medium);
      margin-bottom: 2px;
    }

    .quick-action-btn .qa-text p {
      font-size: var(--text-xs);
      color: var(--color-text-muted);
    }

    /* Style selector */
    .style-selector {
      display: flex;
      flex-wrap: wrap;
      gap: var(--space-2);
      margin-bottom: var(--space-4);
    }

    .style-pill {
      padding: var(--space-1) var(--space-3);
      border: 1px solid var(--color-border);
      border-radius: var(--radius-full);
      font-size: var(--text-xs);
      cursor: pointer;
      transition: all var(--transition-fast);
      background: var(--color-bg-secondary);
      color: var(--color-text-secondary);
    }

    .style-pill:hover {
      border-color: var(--color-brand);
      color: var(--color-brand);
    }

    .style-pill.active {
      background: var(--color-brand);
      border-color: var(--color-brand);
      color: #000;
      font-weight: var(--weight-medium);
    }

    @media (max-width: 768px) {
      .rewrite-compare {
        grid-template-columns: 1fr;
      }
      .quick-actions {
        grid-template-columns: 1fr;
      }
      .platform-grid {
        grid-template-columns: repeat(2, 1fr);
      }
    }
  </style>
</head>
<body>
  <div class="app-layout">
    <aside class="sidebar">
      <div class="sidebar-logo">MatrixGrow</div>
      <nav class="sidebar-nav">
        <a href="dashboard.html" class="nav-item">控制台</a>
        <a href="create.html" class="nav-item active">创作中心</a>
        <a href="agent.html" class="nav-item">AI 助手</a>
        <a href="workflows.html" class="nav-item">工作流商店</a>
        <a href="workflow-import.html" class="nav-item">导入工作流</a>
        <a href="webhooks.html" class="nav-item">Webhook</a>
        <a href="subscription.html" class="nav-item">订阅</a>
      </nav>
      <div style="margin-top: auto; padding-top: var(--space-4); border-top: 1px solid var(--color-border);">
        <a href="dashboard.html#settings" class="nav-item">设置</a>
        <button class="nav-item" onclick="handleLogout()">退出登录</button>
      </div>
    </aside>

    <main class="main-content">
      <div class="page-header">
        <h1>创作中心</h1>
        <div>
          <button class="btn btn-secondary btn-sm" onclick="window.location.href='workflow-import.html'" style="margin-right: var(--space-2);">导入工作流</button>
          <button class="btn btn-primary btn-sm" id="quick-create-btn" onclick="showQuickCreate()">快速创作</button>
        </div>
      </div>

      <!-- Tabs -->
      <div class="tabs" style="margin-bottom: var(--space-5);">
        <button class="tab active" data-tab="overview">概览</button>
        <button class="tab" data-tab="templates">模板库 <span id="template-count-badge" class="badge" style="display:none;"></span></button>
        <button class="tab" data-tab="workflows">我的工作流</button>
        <button class="tab" data-tab="publish">内容发布</button>
      </div>

      <!-- Overview Tab -->
      <div id="tab-overview">
        <div class="create-stats" id="overview-stats">
          <div class="create-stat"><div class="cs-value">-</div><div class="cs-label">我的工作流</div></div>
          <div class="create-stat"><div class="cs-value">-</div><div class="cs-label">可用模板</div></div>
          <div class="create-stat"><div class="cs-value">-</div><div class="cs-label">本月发布</div></div>
          <div class="create-stat"><div class="cs-value">-</div><div class="cs-label">AI 调用</div></div>
        </div>

        <div class="two-col">
          <div class="card">
            <h2>快速操作</h2>
            <div class="quick-actions">
              <a href="workflow-import.html" class="quick-action-btn">
                <div class="qa-icon blue">&#x1F4E5;</div>
                <div class="qa-text">
                  <h4>导入工作流</h4>
                  <p>从 Coze / Dify 导入</p>
                </div>
              </a>
              <button class="quick-action-btn" onclick="switchTab('templates')">
                <div class="qa-icon purple">&#x1F3A8;</div>
                <div class="qa-text">
                  <h4>模板商店</h4>
                  <p>浏览精选模板</p>
                </div>
              </button>
              <button class="quick-action-btn" onclick="window.location.href='agent.html'">
                <div class="qa-icon green">&#x1F916;</div>
                <div class="qa-text">
                  <h4>AI 助手</h4>
                  <p>智能写作辅助</p>
                </div>
              </button>
              <button class="quick-action-btn" onclick="switchTab('publish')">
                <div class="qa-icon orange">&#x1F4E4;</div>
                <div class="qa-text">
                  <h4>发布内容</h4>
                  <p>一键分发多平台</p>
                </div>
              </button>
            </div>
          </div>
          <div class="card">
            <h2>创作统计</h2>
            <div id="usage-stats">
              <div class="loading-state"><div class="spinner"></div><p>加载中...</p></div>
            </div>
          </div>
        </div>
      </div>

      <!-- Templates Tab -->
      <div id="tab-templates" style="display:none;">
        <div class="card">
          <h2>模板库</h2>
          <div style="display: flex; gap: var(--space-3); margin-bottom: var(--space-4); flex-wrap: wrap;">
            <select class="input" id="category-filter" style="width: auto; margin-bottom: 0;">
              <option value="">全部分类</option>
              <option value="content">内容创作</option>
              <option value="social">社交媒体</option>
              <option value="data">数据处理</option>
              <option value="automation">自动化</option>
              <option value="ai">AI 工具</option>
            </select>
            <label class="checkbox-item" style="margin-bottom: 0;">
              <input type="checkbox" id="free-only"> 仅免费
            </label>
          </div>
          <div id="template-grid" class="card-grid" style="grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));">
            <div class="loading-state" style="grid-column: 1 / -1;">
              <div class="spinner"></div>
              <p>加载模板...</p>
            </div>
          </div>
        </div>
      </div>

      <!-- Workflows Tab -->
      <div id="tab-workflows" style="display:none;">
        <div class="card">
          <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: var(--space-4);">
            <h2>我的工作流</h2>
            <a href="workflow-import.html" class="btn btn-primary btn-sm">导入工作流</a>
          </div>
          <div id="workflow-list">
            <div class="loading-state"><div class="spinner"></div><p>加载中...</p></div>
          </div>
        </div>
      </div>

      <!-- Publish Tab -->
      <div id="tab-publish" style="display:none;">
        <div class="two-col">
          <div class="card">
            <h2>发布内容</h2>
            <div class="input-group">
              <label class="label">标题</label>
              <input class="input" id="publish-title" placeholder="输入标题...">
            </div>
            <div class="input-group">
              <label class="label">内容</label>
              <textarea class="input" id="publish-content" placeholder="输入内容..." style="min-height:140px;"></textarea>
            </div>
            <div class="input-group">
              <label class="label">AI 改写风格</label>
              <div class="style-selector" id="style-selector">
                <span class="style-pill active" data-style="professional">专业</span>
                <span class="style-pill" data-style="casual">轻松</span>
                <span class="style-pill" data-style="technical">技术</span>
                <span class="style-pill" data-style="marketing">营销</span>
                <span class="style-pill" data-style="story">故事</span>
              </div>
            </div>
            <div class="btn-group" style="display: flex; gap: var(--space-2);">
              <button class="btn btn-secondary" style="flex:1;" onclick="aiRewrite()">AI 改写 &nbsp;&#x1F916;</button>
              <button class="btn btn-primary" style="flex:1;" onclick="showPublishOptions()">选择平台发布 &nbsp;&#x1F4E4;</button>
            </div>

            <!-- AI Rewrite Preview (hidden until rewrite) -->
            <div id="rewrite-preview" style="display:none; margin-top: var(--space-4);">
              <h3 style="margin-bottom: var(--space-3); font-size: var(--text-sm);">AI 改写预览</h3>
              <div class="rewrite-compare">
                <div class="rewrite-pane original">
                  <div class="pane-header">
                    <span class="pane-label">原文</span>
                    <span style="font-size: 11px;">原始内容</span>
                  </div>
                  <div class="pane-body" id="original-text"></div>
                </div>
                <div class="rewrite-pane rewritten">
                  <div class="pane-header">
                    <span class="pane-label">改写后</span>
                    <span id="rewrite-style-label" style="font-size: 11px;"></span>
                  </div>
                  <div class="pane-body" id="rewritten-text"></div>
                </div>
              </div>
              <button class="btn btn-secondary btn-sm" onclick="applyRewrite()">使用改写结果</button>
            </div>

            <div class="input-group" style="margin-top: var(--space-3);">
              <label class="label">选择发布平台</label>
              <div class="platform-grid" id="platform-list">
                <div class="loading-state"><div class="spinner"></div><p>加载平台...</p></div>
              </div>
            </div>

            <div id="publish-controls" style="display:none;">
              <button class="btn btn-primary btn-lg btn-block" id="publish-btn" onclick="publishContent()">发布到所选平台</button>
            </div>

            <!-- Publish Progress (hidden until publishing) -->
            <div id="publish-progress" class="publish-progress" style="display:none; margin-top: var(--space-4);">
              <h3 style="margin-bottom: var(--space-3); font-size: var(--text-sm);">发布进度</h3>
              <div id="progress-rows"></div>
              <div style="margin-top: var(--space-3);">
                <div class="progress-bar">
                  <div class="progress-fill" id="publish-progress-fill" style="width:0%;"></div>
                </div>
                <div style="text-align: right; font-size: var(--text-xs); color: var(--color-text-muted); margin-top: var(--space-1);">
                  <span id="publish-progress-text">0%</span>
                </div>
              </div>
            </div>
          </div>

          <div class="card">
            <h2>发布记录</h2>
            <div id="publish-history">
              <div class="empty-state">
                <div class="empty-icon">&#x1F4E4;</div>
                <h3>暂无发布记录</h3>
                <p>发布内容后记录将显示在这里</p>
              </div>
            </div>
          </div>
        </div>
      </div>
    </main>
  </div>

  <!-- Quick Create Modal -->
  <div class="modal-backdrop" id="quick-create-modal">
    <div class="modal-panel" style="max-width: 480px;">
      <h2 style="margin-bottom: var(--space-5);">快速创作</h2>
      <div class="input-group">
        <label class="label">主题 / 关键词</label>
        <input class="input" id="quick-topic" placeholder="输入创作主题...">
      </div>
      <div class="input-group">
        <label class="label">内容类型</label>
        <select class="input" id="quick-type">
          <option value="article">文章</option>
          <option value="social">社交媒体帖子</option>
          <option value="video-script">视频脚本</option>
          <option value="newsletter">邮件推送</option>
        </select>
      </div>
      <div class="input-group">
        <label class="label">AI 风格</label>
        <select class="input" id="quick-style">
          <option value="professional">专业正式</option>
          <option value="casual">轻松活泼</option>
          <option value="technical">技术深度</option>
          <option value="marketing">营销推广</option>
        </select>
      </div>
      <div style="display: flex; gap: var(--space-3); margin-top: var(--space-5);">
        <button class="btn btn-primary" style="flex:1;" id="quick-gen-btn" onclick="generateContent()">AI 生成</button>
        <button class="btn btn-secondary" onclick="closeQuickCreate()">取消</button>
      </div>
    </div>
  </div>

  <!-- Publish Platform Selection Modal -->
  <div class="modal-backdrop" id="publish-platform-modal">
    <div class="modal-panel" style="max-width: 480px;">
      <h2 style="margin-bottom: var(--space-5);">选择发布平台</h2>
      <div class="platform-grid" id="modal-platform-list">
        <div class="loading-state"><div class="spinner"></div></div>
      </div>
      <div style="display: flex; gap: var(--space-3); margin-top: var(--space-5);">
        <button class="btn btn-primary" style="flex:1;" onclick="confirmPublishPlatforms()">开始发布</button>
        <button class="btn btn-secondary" onclick="closePublishPlatformModal()">取消</button>
      </div>
    </div>
  </div>

  <script src="/js/shared.js"></script>
  <script>
    (function() {
      const API_BASE = '/api';
      let selectedStyle = 'professional';
      let currentRewriteContent = null;

      async function init() {
        if (!await MatrixGrow.checkAuth()) return;
        setupTabs();
        setupStyleSelector();
        await loadOverview();
      }

      function setupTabs() {
        document.querySelectorAll('.tabs .tab').forEach(tab => {
          tab.addEventListener('click', () => {
            document.querySelectorAll('.tabs .tab').forEach(t => t.classList.remove('active'));
            tab.classList.add('active');
            const target = tab.dataset.tab;
            ['overview', 'templates', 'workflows', 'publish'].forEach(id => {
              document.getElementById(`tab-${id}`).style.display = id === target ? 'block' : 'none';
            });
            if (target === 'templates') loadTemplates();
            if (target === 'workflows') loadMyWorkflows();
            if (target === 'publish') loadPlatforms();
          });
        });
      }

      function setupStyleSelector() {
        document.querySelectorAll('.style-pill').forEach(pill => {
          pill.addEventListener('click', () => {
            document.querySelectorAll('.style-pill').forEach(p => p.classList.remove('active'));
            pill.classList.add('active');
            selectedStyle = pill.dataset.style;
          });
        });
      }

      function switchTab(tab) {
        document.querySelectorAll('.tabs .tab').forEach(t => {
          t.classList.toggle('active', t.dataset.tab === tab);
        });
        ['overview', 'templates', 'workflows', 'publish'].forEach(id => {
          document.getElementById(`tab-${id}`).style.display = id === tab ? 'block' : 'none';
        });
        if (tab === 'templates') loadTemplates();
        if (tab === 'workflows') loadMyWorkflows();
        if (tab === 'publish') loadPlatforms();
      }

      async function loadOverview() {
        try {
          const [wf, tpl] = await Promise.all([
            MatrixGrow.fetchJSON(`${API_BASE}/workflows/my`).catch(() => ({ total: 0 })),
            MatrixGrow.fetchJSON(`${API_BASE}/workflows/templates?limit=1`).catch(() => ({ total: 0 }))
          ]);

          const stats = document.getElementById('overview-stats');
          stats.innerHTML = `
            <div class="create-stat"><div class="cs-value">${wf.total || 0}</div><div class="cs-label">我的工作流</div></div>
            <div class="create-stat"><div class="cs-value">${tpl.total || 0}</div><div class="cs-label">可用模板</div></div>
            <div class="create-stat"><div class="cs-value">-</div><div class="cs-label">本月发布</div></div>
            <div class="create-stat"><div class="cs-value">-</div><div class="cs-label">AI 调用</div></div>
          `;

          document.getElementById('usage-stats').innerHTML = `
            <div style="display: flex; justify-content: space-around; text-align: center;">
              <div>
                <div style="font-size: 28px; font-weight: bold; color: var(--color-brand);">${wf.total || 0}</div>
                <div style="color: var(--color-text-muted); font-size: var(--text-xs);">工作流</div>
              </div>
              <div>
                <div style="font-size: 28px; font-weight: bold; color: var(--color-success);">${tpl.total || 0}</div>
                <div style="color: var(--color-text-muted); font-size: var(--text-xs);">模板</div>
              </div>
              <div>
                <div style="font-size: 28px; font-weight: bold; color: #f59e0b;">0</div>
                <div style="color: var(--color-text-muted); font-size: var(--text-xs);">本月发布</div>
              </div>
            </div>
          `;
        } catch (e) {
          MatrixGrow.toast.error('加载概览失败');
        }
      }

      async function loadTemplates() {
        const category = document.getElementById('category-filter').value;
        const freeOnly = document.getElementById('free-only').checked;
        let url = `${API_BASE}/workflows/templates?limit=20`;
        if (category) url += `&category=${encodeURIComponent(category)}`;
        if (freeOnly) url += '&free_only=true';

        const grid = document.getElementById('template-grid');
        grid.innerHTML = '<div class="loading-state" style="grid-column: 1 / -1;"><div class="spinner"></div><p>加载模板...</p></div>';

        try {
          const data = await MatrixGrow.fetchJSON(url);

          if (!data.templates || data.templates.length === 0) {
            grid.innerHTML = MatrixGrow.renderEmpty('&#x1F3A8;', '暂无模板', '没有符合条件的模板');
            return;
          }

          grid.innerHTML = data.templates.map(t => `
            <div class="feature-card" style="cursor: pointer;" onclick="installTemplate(${t.id}, '${(t.name || '').replace(/'/g, "\\'")}')">
              <div class="feature-icon" style="font-size: 2rem;">${t.preview || '&#x1F4E6;'}</div>
              <h3>${t.name}</h3>
              <p>${t.description || '无描述'}</p>
              <div style="display: flex; justify-content: space-between; align-items: center; margin-top: var(--space-3);">
                <span class="tag">${t.category || '通用'}</span>
                <span style="font-weight: var(--weight-bold); ${t.price === 0 ? 'color: var(--color-success);' : 'color: var(--color-brand);'}">
                  ${t.price === 0 ? '免费' : '¥' + t.price}
                </span>
              </div>
              <div style="color: var(--color-text-muted); font-size: var(--text-xs); margin-top: var(--space-2);">
                ${t.install_count || 0} 次安装
              </div>
            </div>
          `).join('');
        } catch (e) {
          grid.innerHTML = MatrixGrow.renderError('加载模板失败', loadTemplates);
        }
      }

      async function installTemplate(id, name) {
        try {
          await MatrixGrow.fetchJSON(`${API_BASE}/workflows/templates/${id}/install`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ name })
          });
          MatrixGrow.toast.success(`模板 "${name}" 安装成功！`);
          switchTab('workflows');
          loadMyWorkflows();
        } catch (e) {
          MatrixGrow.toast.error(e.message || '安装失败');
        }
      }

      async function loadMyWorkflows() {
        const list = document.getElementById('workflow-list');
        list.innerHTML = '<div class="loading-state"><div class="spinner"></div><p>加载中...</p></div>';

        try {
          const data = await MatrixGrow.fetchJSON(`${API_BASE}/workflows/my`);

          if (!data.workflows || data.workflows.length === 0) {
            list.innerHTML = MatrixGrow.renderEmpty('&#x1F4CB;', '还没有工作流', '导入第一个工作流开始使用', '<a href="workflow-import.html" class="btn btn-primary">导入工作流</a>');
            return;
          }

          list.innerHTML = data.workflows.map(w => `
            <div class="workflow-item" style="display: flex; justify-content: space-between; align-items: center; padding: var(--space-3) var(--space-4); background: var(--color-bg-secondary); border-radius: var(--radius-md); margin-bottom: var(--space-2);">
              <div>
                <h4 style="font-size: var(--text-sm); margin-bottom: var(--space-1);">
                  <span class="status-dot ${w.status === 'active' ? 'active' : 'inactive'}"></span>
                  ${w.name}
                </h4>
                <p style="color: var(--color-text-muted); font-size: var(--text-xs);">
                  来源: ${w.source_format || '未知'} · ${MatrixGrow.formatDate(w.created_at)}
                </p>
              </div>
              <div style="display: flex; gap: var(--space-2);">
                <button class="btn btn-ghost btn-sm" onclick="MatrixGrow.toast.info('编辑功能开发中')">编辑</button>
                <button class="btn btn-ghost btn-sm" style="color: var(--color-error);" onclick="deleteWorkflow(${w.id})">删除</button>
              </div>
            </div>
          `).join('');
        } catch (e) {
          list.innerHTML = MatrixGrow.renderError('加载失败', loadMyWorkflows);
        }
      }

      async function deleteWorkflow(id) {
        const confirmed = await MatrixGrow.confirm.confirm('删除工作流', '确定要删除此工作流吗？此操作不可撤销。', {
          confirmText: '删除',
          danger: true
        });
        if (!confirmed) return;

        try {
          await MatrixGrow.fetchJSON(`${API_BASE}/workflows/my/${id}`, { method: 'DELETE' });
          MatrixGrow.toast.success('工作流已删除');
          loadMyWorkflows();
          loadOverview();
        } catch (e) {
          MatrixGrow.toast.error(e.message || '删除失败');
        }
      }

      async function loadPlatforms() {
        const container = document.getElementById('platform-list');
        container.innerHTML = '<div class="loading-state"><div class="spinner"></div><p>加载平台...</p></div>';

        try {
          const data = await MatrixGrow.fetchJSON(`${API_BASE}/platforms`);
          const platforms = data.platforms || [];

          if (platforms.length === 0) {
            container.innerHTML = '<p style="color: var(--color-text-muted); font-size: var(--text-sm);">暂无已绑定的平台，请先在控制台绑定</p>';
            return;
          }

          container.innerHTML = platforms.map(p => `
            <label class="platform-check-card">
              <input type="checkbox" value="${p.id}" class="platform-cb">
              ${p.name || p.platform}
            </label>
          `).join('');

          // Toggle visual check state
          container.querySelectorAll('.platform-check-card').forEach(card => {
            const cb = card.querySelector('input');
            cb.addEventListener('change', () => {
              card.classList.toggle('checked', cb.checked);
            });
          });

          document.getElementById('publish-controls').style.display = 'block';
        } catch (e) {
          container.innerHTML = '<p style="color: var(--color-text-muted);">加载失败</p>';
        }
      }

      async function aiRewrite() {
        const content = document.getElementById('publish-content').value.trim();
        if (!content) {
          MatrixGrow.toast.warning('请先输入要改写的内容');
          return;
        }

        const styleLabels = {
          professional: '专业正式',
          casual: '轻松活泼',
          technical: '技术深度',
          marketing: '营销推广',
          story: '故事叙述'
        };

        const preview = document.getElementById('rewrite-preview');
        preview.style.display = 'block';
        preview.querySelector('#original-text').textContent = content;
        preview.querySelector('#rewritten-text').textContent = 'AI 正在改写...';
        preview.querySelector('#rewrite-style-label').textContent = styleLabels[selectedStyle] || selectedStyle;

        try {
          const data = await MatrixGrow.fetchJSON(`${API_BASE}/ai/generate`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
              prompt: `Rewrite the following content in a ${selectedStyle} style:\n\n${content}`,
              type: 'rewrite',
              style: selectedStyle
            })
          });

          const rewritten = data.text || data.content || 'AI 改写完成，但未返回结果';
          preview.querySelector('#rewritten-text').textContent = rewritten;
          currentRewriteContent = rewritten;
          MatrixGrow.toast.success('AI 改写完成');
        } catch (e) {
          preview.querySelector('#rewritten-text').textContent = 'AI 改写失败，请重试';
          MatrixGrow.toast.error('AI 改写失败: ' + (e.message || '未知错误'));
        }
      }

      function applyRewrite() {
        if (currentRewriteContent) {
          document.getElementById('publish-content').value = currentRewriteContent;
          document.getElementById('rewrite-preview').style.display = 'none';
          MatrixGrow.toast.success('已应用改写结果');
        }
      }

      function showPublishOptions() {
        const content = document.getElementById('publish-content').value.trim();
        if (!content) {
          MatrixGrow.toast.warning('请先输入内容');
          return;
        }

        const modalList = document.getElementById('modal-platform-list');
        const existingCards = document.querySelectorAll('#platform-list .platform-check-card');

        if (existingCards.length > 0) {
          modalList.innerHTML = '';
          existingCards.forEach(card => {
            const clone = card.cloneNode(true);
            const cb = clone.querySelector('input');
            cb.addEventListener('change', () => {
              clone.classList.toggle('checked', cb.checked);
            });
            modalList.appendChild(clone);
          });
        } else {
          modalList.innerHTML = '<p style="color: var(--color-text-muted);">暂无可用平台</p>';
        }

        document.getElementById('publish-platform-modal').classList.add('open');
      }

      function closePublishPlatformModal() {
        document.getElementById('publish-platform-modal').classList.remove('open');
      }

      function confirmPublishPlatforms() {
        document.getElementById('publish-platform-modal').classList.remove('open');
        publishContent();
      }

      async function publishContent() {
        const title = document.getElementById('publish-title').value.trim();
        const content = document.getElementById('publish-content').value.trim();
        const checkboxes = document.querySelectorAll('#platform-list .platform-cb:checked, #modal-platform-list .platform-cb:checked');
        const platforms = Array.from(checkboxes).map(cb => cb.value);

        if (!title) { MatrixGrow.toast.warning('请输入标题'); return; }
        if (!content) { MatrixGrow.toast.warning('请输入内容'); return; }
        if (platforms.length === 0) { MatrixGrow.toast.warning('请选择至少一个发布平台'); return; }

        // Show progress
        const progressSection = document.getElementById('publish-progress');
        progressSection.style.display = 'block';
        const progressRows = document.getElementById('progress-rows');

        const platformNames = {
          'xiaohongshu': '小红书', 'weibo': '微博', 'toutiao': '头条号',
          'juejin': '掘金', 'csdn': 'CSDN', 'segmentfault': '思否',
          'devto': 'Dev.to', 'medium': 'Medium', 'linkedin': 'LinkedIn',
          'x': 'X/Twitter', 'zhihu': '知乎', 'wechat': '公众号',
          'bilibili': 'B站', 'douyin': '抖音'
        };

        progressRows.innerHTML = platforms.map(p => `
          <div class="publish-platform-row pending" data-platform="${p}">
            <div class="pp-icon">&#x1F4E4;</div>
            <span class="pp-name">${platformNames[p] || p}</span>
            <span class="pp-status"><span class="status-dot-sm"></span> 等待发布</span>
          </div>
        `).join('');

        const fill = document.getElementById('publish-progress-fill');
        const text = document.getElementById('publish-progress-text');
        fill.style.width = '0%';
        text.textContent = '0%';

        const btn = document.getElementById('publish-btn');
        btn.disabled = true;
        btn.textContent = '发布中...';

        // Publish to each platform sequentially with progress
        let completed = 0;
        for (const p of platforms) {
          const row = progressRows.querySelector(`[data-platform="${p}"]`);
          if (row) {
            row.className = 'publish-platform-row publishing';
            row.querySelector('.pp-status').innerHTML = '<span class="status-dot-sm"></span> 发布中...';
          }

          try {
            await MatrixGrow.fetchJSON(`${API_BASE}/publish`, {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({ title, content, platforms: [p] })
            });

            if (row) {
              row.className = 'publish-platform-row done';
              row.querySelector('.pp-status').innerHTML = '<span class="status-dot-sm"></span> &#x2713; 已发布';
            }
          } catch (e) {
            if (row) {
              row.className = 'publish-platform-row failed';
              row.querySelector('.pp-status').innerHTML = '<span class="status-dot-sm"></span> &#x2717; 发布失败';
            }
          }

          completed++;
          const pct = Math.round((completed / platforms.length) * 100);
          fill.style.width = pct + '%';
          text.textContent = pct + '%';
        }

        btn.disabled = false;
        btn.textContent = '发布到所选平台';

        if (completed === platforms.length) {
          MatrixGrow.toast.success(`已发布到 ${platforms.length} 个平台`);
          document.getElementById('publish-title').value = '';
          document.getElementById('publish-content').value = '';
          document.getElementById('rewrite-preview').style.display = 'none';

          // Add to history
          const history = document.getElementById('publish-history');
          const time = new Date().toLocaleString();
          history.innerHTML = `
            <div style="padding: var(--space-3); background: var(--color-bg-secondary); border-radius: var(--radius-md); margin-bottom: var(--space-2);">
              <div style="font-size: var(--text-sm); font-weight: var(--weight-medium); margin-bottom: var(--space-1);">${title}</div>
              <div style="font-size: var(--text-xs); color: var(--color-text-muted);">
                发布到 ${platforms.length} 个平台 · ${time}
              </div>
            </div>
            ${history.querySelector('.empty-state') ? '' : history.innerHTML}
          `;
        } else {
          MatrixGrow.toast.warning(`${completed}/${platforms.length} 个平台发布完成，部分平台可能失败`);
        }
      }

      async function generateContent() {
        const topic = document.getElementById('quick-topic').value.trim();
        const type = document.getElementById('quick-type').value;
        const style = document.getElementById('quick-style').value;

        if (!topic) { MatrixGrow.toast.warning('请输入创作主题'); return; }

        const typeNames = {
          article: '文章', social: '社交媒体帖子',
          video_script: '视频脚本', newsletter: '邮件推送'
        };
        const styleNames = {
          professional: '专业正式', casual: '轻松活泼',
          technical: '技术深度', marketing: '营销推广'
        };

        const btn = document.getElementById('quick-gen-btn');
        btn.disabled = true;
        btn.textContent = '生成中...';

        try {
          const data = await MatrixGrow.fetchJSON(`${API_BASE}/ai/generate`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
              prompt: `创作一篇${typeNames[type] || type}，主题：${topic}，风格：${styleNames[style] || style}`,
              type: 'text'
            })
          });

          closeQuickCreate();
          switchTab('publish');
          document.getElementById('publish-title').value = topic;
          document.getElementById('publish-content').value = data.text || data.content || '';
          MatrixGrow.toast.success('AI 内容已生成，可选择平台发布或 AI 改写');
        } catch (e) {
          MatrixGrow.toast.error('AI 生成失败: ' + (e.message || '请重试'));
        } finally {
          btn.disabled = false;
          btn.textContent = 'AI 生成';
        }
      }

      function showQuickCreate() {
        document.getElementById('quick-create-modal').classList.add('open');
      }

      function closeQuickCreate() {
        document.getElementById('quick-create-modal').classList.remove('open');
      }

      async function handleLogout() {
        const confirmed = await MatrixGrow.confirm.confirm('退出登录', '确定要退出登录吗？', {
          confirmText: '退出',
          danger: true
        });
        if (confirmed) MatrixGrow.logout();
      }

      // Export functions for onclick use
      window.switchTab = switchTab;
      window.loadTemplates = loadTemplates;
      window.installTemplate = installTemplate;
      window.loadMyWorkflows = loadMyWorkflows;
      window.deleteWorkflow = deleteWorkflow;
      window.loadPlatforms = loadPlatforms;
      window.aiRewrite = aiRewrite;
      window.applyRewrite = applyRewrite;
      window.showPublishOptions = showPublishOptions;
      window.confirmPublishPlatforms = confirmPublishPlatforms;
      window.closePublishPlatformModal = closePublishPlatformModal;
      window.publishContent = publishContent;
      window.generateContent = generateContent;
      window.showQuickCreate = showQuickCreate;
      window.closeQuickCreate = closeQuickCreate;
      window.handleLogout = handleLogout;

      init();
    })();
  </script>
</body>
</html>
