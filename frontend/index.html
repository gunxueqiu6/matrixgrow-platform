<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MatrixGrow - AI 独立开发者增长引擎</title>
  <link rel="stylesheet" href="/css/base.css">
  <style>
    .landing {
      max-width: 960px;
      margin: 0 auto;
      padding: var(--space-10) var(--space-5);
    }

    .landing-header {
      text-align: center;
      margin-bottom: var(--space-10);
    }

    .landing-header h1 {
      font-size: clamp(2.5rem, 5vw, 4rem);
      font-weight: var(--weight-bold);
      background: var(--gradient-brand);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: var(--space-3);
      line-height: 1.1;
    }

    .landing-header .tagline {
      font-size: var(--text-lg);
      color: var(--color-text-secondary);
      max-width: 600px;
      margin: 0 auto var(--space-6);
      line-height: var(--leading-relaxed);
    }

    .landing-nav {
      display: flex;
      justify-content: flex-end;
      align-items: center;
      gap: var(--space-3);
      margin-bottom: var(--space-8);
    }

    .cta-buttons {
      display: flex;
      gap: var(--space-3);
      justify-content: center;
      flex-wrap: wrap;
    }

    .hero-input {
      max-width: 700px;
      margin: 0 auto;
    }

    .hero-input textarea {
      min-height: 110px;
    }

    .stats-row {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: var(--space-5);
      margin-top: var(--space-10);
    }

    .features-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: var(--space-5);
      margin-top: var(--space-10);
    }

    .feature-card {
      background: var(--color-bg-card);
      border: 1px solid var(--color-border);
      border-radius: var(--radius-xl);
      padding: var(--space-6);
      transition: border-color var(--transition-normal), transform var(--transition-normal);
    }

    .feature-card:hover {
      border-color: var(--color-brand);
      transform: translateY(-2px);
    }

    .feature-icon {
      font-size: 1.75rem;
      margin-bottom: var(--space-3);
    }

    .feature-card h3 {
      font-size: var(--text-lg);
      font-weight: var(--weight-semibold);
      margin-bottom: var(--space-2);
    }

    .feature-card p {
      color: var(--color-text-secondary);
      font-size: var(--text-sm);
      line-height: var(--leading-relaxed);
    }

    .platform-status {
      display: flex;
      align-items: center;
      gap: var(--space-3);
      margin-bottom: var(--space-2);
      padding: var(--space-2) var(--space-3);
      background: var(--color-bg-secondary);
      border-radius: var(--radius-md);
    }

    .platform-status .platform-name {
      min-width: 100px;
      font-size: var(--text-sm);
    }

    @media (max-width: 768px) {
      .stats-row {
        grid-template-columns: 1fr;
      }
      .features-grid {
        grid-template-columns: 1fr;
      }
      .landing {
        padding: var(--space-5) var(--space-4);
      }
    }
  </style>
</head>
<body>
  <div class="landing">
    <div class="landing-nav">
      <a href="/analytics.html" class="btn btn-ghost btn-sm">分析面板</a>
      <span class="auth-logged-out">
        <a href="/login.html" class="btn btn-ghost btn-sm">登录</a>
        <a href="/login.html" class="btn btn-primary btn-sm">注册</a>
      </span>
      <span class="auth-logged-in" style="display:none;">
        <a href="/dashboard.html" class="btn btn-primary btn-sm">控制台</a>
        <button class="btn btn-ghost btn-sm" onclick="MatrixGrow.logout()">退出</button>
      </span>
    </div>

    <div class="landing-header">
      <h1>MatrixGrow</h1>
      <p class="tagline">AI 独立开发者增长引擎。一句话输入产品介绍，AI 自动改写适配各平台风格，全网一键分发 + 7x24 智能截流。</p>
      <div class="cta-buttons">
        <a href="/login.html" class="btn btn-primary btn-lg">开始使用</a>
        <a href="/workflows.html" class="btn btn-secondary btn-lg">浏览模板</a>
      </div>
    </div>

    <div class="card hero-input">
      <div class="input-group">
        <label class="label" for="content">输入你的产品介绍</label>
        <textarea class="input" id="content" placeholder="例如：我做了一个用 AI 自动帮产品改写并分发到全网的工具，再也不用人肉贴了。"></textarea>
      </div>

      <div class="input-group">
        <label class="label">选择发布平台</label>
        <div style="display:flex; flex-wrap:wrap; gap:var(--space-2);">
          <button class="btn btn-sm platform-btn active" data-platform="all">全平台</button>
          <button class="btn btn-sm btn-ghost platform-btn" data-platform="tech-blog">技术博客</button>
          <button class="btn btn-sm btn-ghost platform-btn" data-platform="social">社交媒体</button>
          <button class="btn btn-sm btn-ghost platform-btn" data-platform="hardcore">硬核社区</button>
          <button class="btn btn-sm btn-ghost platform-btn" data-platform="x">X / Twitter</button>
        </div>
      </div>

      <button class="btn btn-primary btn-lg btn-block" id="submitBtn">开始 AI 分发</button>

      <div id="statusSection" style="display:none; margin-top:var(--space-5);">
        <div id="statusContent"></div>
      </div>
    </div>

    <div class="stats-row">
      <div class="stat-card">
        <div class="stat-value" id="postsCount">0</div>
        <div class="stat-sub">已发布内容</div>
      </div>
      <div class="stat-card">
        <div class="stat-value" id="platformsCount">0</div>
        <div class="stat-sub">覆盖平台</div>
      </div>
      <div class="stat-card">
        <div class="stat-value" id="leadsCount">0</div>
        <div class="stat-sub">截流线索</div>
      </div>
    </div>

    <div class="features-grid">
      <div class="feature-card">
        <div class="feature-icon">&#x270D;&#xFE0F;</div>
        <h3>AI 文本改写</h3>
        <p>自动为不同平台调整文案风格，从技术博客到社交媒体，AI 都能驾驭</p>
      </div>
      <div class="feature-card">
        <div class="feature-icon">&#x1F3A8;</div>
        <h3>智能配图</h3>
        <p>自动生成金句卡片和封面图，让你的内容在信息流中脱颖而出</p>
      </div>
      <div class="feature-card">
        <div class="feature-icon">&#x1F680;</div>
        <h3>全网分发</h3>
        <p>API + RPA 双轨并行，覆盖所有主流平台，真正实现一键全网发布</p>
      </div>
      <div class="feature-card">
        <div class="feature-icon">&#x1F3AF;</div>
        <h3>智能截流</h3>
        <p>7x24 监听目标用户，自动三段式回复，把潜在客户引到你的产品</p>
      </div>
    </div>
  </div>

  <script src="/js/shared.js"></script>
  <script>
    // Login state
    if (MatrixGrow.getToken()) {
      document.querySelector('.auth-logged-out').style.display = 'none';
      document.querySelector('.auth-logged-in').style.display = '';
    }

    // Platform buttons
    const platformBtns = document.querySelectorAll('.platform-btn');
    let selectedPlatform = 'all';

    platformBtns.forEach(btn => {
      btn.addEventListener('click', () => {
        platformBtns.forEach(b => { b.className = 'btn btn-sm btn-ghost platform-btn'; });
        btn.className = 'btn btn-sm platform-btn active';
        selectedPlatform = btn.dataset.platform;
      });
    });

    // Submit
    document.getElementById('submitBtn').addEventListener('click', async () => {
      const content = document.getElementById('content').value.trim();
      if (!content) {
        MatrixGrow.toast.warning('请输入内容');
        return;
      }

      const btn = document.getElementById('submitBtn');
      btn.disabled = true;
      btn.textContent = 'AI 正在改写中...';
      const section = document.getElementById('statusSection');
      section.style.display = 'block';
      document.getElementById('statusContent').innerHTML = '<div class="loading-state"><div class="spinner"></div><p>正在分发到各平台...</p></div>';

      try {
        const res = await fetch('/api/webhook/matrixgrow-input', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json', ...MatrixGrow.authHeaders() },
          body: JSON.stringify({
            text: content,
            platforms: selectedPlatform === 'all' ? ['tech-blog', 'social', 'hardcore', 'x'] : [selectedPlatform]
          })
        });

        const platforms = selectedPlatform === 'all'
          ? ['X/Twitter', 'LinkedIn', 'Dev.to', 'Medium', 'V2EX', '小红书']
          : [selectedPlatform];

        document.getElementById('statusContent').innerHTML = platforms.map(p => `
          <div class="platform-status">
            <span class="platform-name">${p}</span>
            <span class="status-dot active"></span>
            <span style="font-size:var(--text-xs);color:var(--color-text-muted);">已发布</span>
          </div>
        `).join('');

        btn.textContent = '分发完成!';
        const postsCount = document.getElementById('postsCount');
        postsCount.textContent = parseInt(postsCount.textContent) + 1;
        MatrixGrow.toast.success('内容已分发到各平台');
      } catch (error) {
        document.getElementById('statusContent').innerHTML =
          `<div class="message message-error">错误: ${MatrixGrow._escape ? '' : ''}${error.message}</div>`;
        btn.disabled = false;
        btn.textContent = '重试';
        MatrixGrow.toast.error('分发失败: ' + error.message);
      }
    });

    document.getElementById('content').addEventListener('input', () => {
      document.getElementById('submitBtn').disabled = false;
      document.getElementById('submitBtn').textContent = '开始 AI 分发';
    });
  </script>
</body>
</html>
