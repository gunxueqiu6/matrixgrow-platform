<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MatrixGrow - 分析面板</title>
  <link rel="stylesheet" href="/css/base.css">
  <style>
    .kpi-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: var(--space-4);
      margin-bottom: var(--space-6);
    }

    .kpi-card {
      background: var(--color-bg-card);
      border: 1px solid var(--color-border);
      border-radius: var(--radius-xl);
      padding: var(--space-5);
      text-align: center;
      transition: border-color var(--transition-normal);
    }
    .kpi-card:hover { border-color: var(--color-border-hover); }

    .kpi-value {
      font-size: var(--text-3xl);
      font-weight: var(--weight-bold);
      background: var(--gradient-brand);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .kpi-label {
      font-size: var(--text-sm);
      color: var(--color-text-secondary);
      margin-top: var(--space-1);
    }

    .analytics-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: var(--space-5);
      margin-bottom: var(--space-6);
    }

    .analytics-panel {
      background: var(--color-bg-card);
      border: 1px solid var(--color-border);
      border-radius: var(--radius-xl);
      padding: var(--space-6);
    }
    .analytics-panel.full { grid-column: 1 / -1; }

    .panel-title {
      font-size: var(--text-base);
      font-weight: var(--weight-semibold);
      margin-bottom: var(--space-5);
      color: var(--color-text-primary);
    }

    /* Funnel */
    .funnel { display: flex; flex-direction: column; gap: var(--space-3); }
    .funnel-step {
      display: flex;
      align-items: center;
      gap: var(--space-3);
    }
    .funnel-label {
      width: 80px;
      font-size: var(--text-sm);
      color: var(--color-text-secondary);
      text-align: right;
      flex-shrink: 0;
    }
    .funnel-bar-wrap {
      flex: 1;
      height: 36px;
      background: var(--color-bg-secondary);
      border-radius: var(--radius-md);
      overflow: hidden;
    }
    .funnel-bar {
      height: 100%;
      border-radius: var(--radius-md);
      display: flex;
      align-items: center;
      padding-left: var(--space-3);
      font-size: var(--text-sm);
      font-weight: var(--weight-semibold);
      transition: width 0.6s cubic-bezier(0.16, 1, 0.3, 1);
      color: #000;
    }
    .funnel-step:nth-child(1) .funnel-bar { background: linear-gradient(90deg, #4ECDC4, #44A8D4); }
    .funnel-step:nth-child(2) .funnel-bar { background: linear-gradient(90deg, #6C5CE7, #A29BFE); }
    .funnel-step:nth-child(3) .funnel-bar { background: linear-gradient(90deg, #FDCB6E, #FFEAA7); }
    .funnel-step:nth-child(4) .funnel-bar { background: linear-gradient(90deg, #E17055, #FAB1A0); color: #fff; }
    .funnel-value { min-width: 40px; font-size: var(--text-sm); color: var(--color-text-muted); text-align: right; }

    /* Platform bars */
    .platform-list { display: flex; flex-direction: column; gap: var(--space-3); }
    .platform-row { display: flex; align-items: center; gap: var(--space-3); }
    .platform-name { width: 80px; font-size: var(--text-sm); color: var(--color-text-secondary); flex-shrink: 0; }
    .platform-bar-wrap { flex: 1; height: 28px; background: var(--color-bg-secondary); border-radius: var(--radius-sm); overflow: hidden; }
    .platform-bar { height: 100%; background: var(--gradient-brand); border-radius: var(--radius-sm); transition: width 0.5s; }
    .platform-count { font-size: var(--text-sm); color: var(--color-text-muted); min-width: 40px; text-align: right; }

    /* Daily chart */
    .chart { width: 100%; height: 200px; display: flex; align-items: flex-end; gap: 3px; }
    .chart-bar { flex: 1; background: var(--gradient-brand); border-radius: var(--radius-sm) var(--radius-sm) 0 0; min-height: 2px; transition: height 0.3s; position: relative; cursor: pointer; }
    .chart-bar:hover { opacity: 0.8; }
    .chart-bar .tooltip { display: none; position: absolute; top: -28px; left: 50%; transform: translateX(-50%); background: var(--color-bg-card); border: 1px solid var(--color-border); color: var(--color-text-primary); padding: var(--space-1) var(--space-3); border-radius: var(--radius-sm); font-size: var(--text-xs); white-space: nowrap; box-shadow: var(--shadow-md); z-index: 10; }
    .chart-bar:hover .tooltip { display: block; }

    /* Activity */
    .activity-list { max-height: 260px; overflow-y: auto; }
    .activity-item { display: flex; justify-content: space-between; align-items: center; padding: var(--space-3) 0; border-bottom: 1px solid var(--color-border); font-size: var(--text-sm); }
    .activity-item:last-child { border-bottom: none; }
    .activity-name { color: var(--color-text-primary); }

    @media (max-width: 768px) {
      .kpi-grid { grid-template-columns: repeat(2, 1fr); }
      .analytics-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div class="app-layout">
    <aside class="sidebar">
      <a href="/" class="sidebar-logo">MatrixGrow</a>
      <nav class="sidebar-nav">
        <a href="dashboard.html" class="nav-item"><span class="nav-icon">&#x1F4CA;</span>控制台</a>
        <a href="agent.html" class="nav-item"><span class="nav-icon">&#x1F916;</span>AI 助手</a>
        <a href="workflows.html" class="nav-item"><span class="nav-icon">&#x1F4E6;</span>工作流商店</a>
        <a href="workflow-import.html" class="nav-item"><span class="nav-icon">&#x1F4E5;</span>导入工作流</a>
        <a href="webhooks.html" class="nav-item"><span class="nav-icon">&#x1F517;</span>Webhook</a>
        <a href="analytics.html" class="nav-item active"><span class="nav-icon">&#x1F4C8;</span>分析面板</a>
        <a href="subscription.html" class="nav-item"><span class="nav-icon">&#x2B50;</span>订阅</a>
      </nav>
      <div class="sidebar-footer">
        <button class="nav-item" onclick="MatrixGrow.logout()"><span class="nav-icon">&#x2192;</span>退出登录</button>
      </div>
    </aside>

    <main class="main-content">
      <div class="page-header">
        <div>
          <h1>分析面板</h1>
          <p class="subtitle">运营数据一览</p>
        </div>
        <span id="tier-badge" class="tier-badge tier-free">Free</span>
      </div>

      <div id="message-container"></div>

      <div class="kpi-grid">
        <div class="kpi-card">
          <div class="kpi-value" id="kpiPosts">-</div>
          <div class="kpi-label">发布内容</div>
        </div>
        <div class="kpi-card">
          <div class="kpi-value" id="kpiIntercepts">-</div>
          <div class="kpi-label">截流回复</div>
        </div>
        <div class="kpi-card">
          <div class="kpi-value" id="kpiDms">-</div>
          <div class="kpi-label">私信</div>
        </div>
        <div class="kpi-card">
          <div class="kpi-value" id="kpiWorkflows">-</div>
          <div class="kpi-label">工作流执行</div>
        </div>
      </div>

      <div class="analytics-grid">
        <div class="analytics-panel">
          <div class="panel-title">转化漏斗</div>
          <div class="funnel" id="funnelChart">
            <div class="loading-state"><div class="spinner"></div><p>加载中...</p></div>
          </div>
        </div>

        <div class="analytics-panel">
          <div class="panel-title">平台分布</div>
          <div class="platform-list" id="platformBreakdown">
            <div class="loading-state"><div class="spinner"></div><p>加载中...</p></div>
          </div>
        </div>

        <div class="analytics-panel full">
          <div class="panel-title">每日趋势（近30天）</div>
          <div class="chart" id="dailyChart">
            <div class="loading-state"><div class="spinner"></div><p>加载中...</p></div>
          </div>
        </div>

        <div class="analytics-panel">
          <div class="panel-title">最近工作流执行</div>
          <div class="activity-list" id="activityStream">
            <div class="loading-state"><div class="spinner"></div><p>加载中...</p></div>
          </div>
        </div>
      </div>
    </main>
  </div>

  <script src="/js/shared.js"></script>
  <script>
    (function() {
      async function init() {
        if (!await MatrixGrow.checkAuth()) return;
        MatrixGrow.loadTierBadge();
        loadAll();
      }

      function renderFunnel(data) {
        const steps = [
          { label: '内容创建', value: data.total_posts || 0 },
          { label: '截流发现', value: data.total_intercepts || 0 },
          { label: '成功回复', value: Math.round((data.total_intercepts || 0) * 0.7) },
          { label: '转化线索', value: data.total_dms || 0 }
        ];
        const maxVal = Math.max(...steps.map(s => s.value), 1);
        document.getElementById('funnelChart').innerHTML = steps.map(s => `
          <div class="funnel-step">
            <div class="funnel-label">${s.label}</div>
            <div class="funnel-bar-wrap">
              <div class="funnel-bar" style="width:${(s.value / maxVal) * 100}%">${s.value}</div>
            </div>
            <div class="funnel-value">${s.value}</div>
          </div>
        `).join('');
      }

      function renderPlatforms(data) {
        const maxCount = Math.max(...data.map(d => d.count), 1);
        document.getElementById('platformBreakdown').innerHTML = data.map(d => `
          <div class="platform-row">
            <div class="platform-name">${d.platform}</div>
            <div class="platform-bar-wrap">
              <div class="platform-bar" style="width:${(d.count / maxCount) * 100}%"></div>
            </div>
            <div class="platform-count">${d.count}</div>
          </div>
        `).join('') || MatrixGrow.renderEmpty('', '暂无数据', '');
      }

      function renderDailyChart(data) {
        const maxVal = Math.max(...data.map(d => Math.max(d.posts || 0, d.intercepts || 0)), 1);
        document.getElementById('dailyChart').innerHTML = data.map(d => `
          <div class="chart-bar" style="height:${((d.posts || 0) / maxVal) * 160 + 4}px">
            <span class="tooltip">${d.day}: ${d.posts || 0} 发布</span>
          </div>
        `).join('') || '<div class="loading-state"><p>暂无数据</p></div>';
      }

      function renderActivity(data) {
        const items = data.slice(0, 15);
        document.getElementById('activityStream').innerHTML = items.map(d => `
          <div class="activity-item">
            <span class="activity-name">${d.workflow_name}</span>
            <span class="badge badge-${d.status === 'completed' ? 'success' : d.status === 'failed' ? 'error' : 'warning'}">${d.status}</span>
          </div>
        `).join('') || '<div class="loading-state"><p>暂无数据</p></div>';
      }

      async function loadAll() {
        try {
          const [overview, platforms, daily, workflows] = await Promise.all([
            MatrixGrow.fetchJSON('/api/analytics/overview').catch(() => ({ data: {} })),
            MatrixGrow.fetchJSON('/api/analytics/platforms').catch(() => ({ data: [] })),
            MatrixGrow.fetchJSON('/api/analytics/daily?days=30').catch(() => ({ data: [] })),
            MatrixGrow.fetchJSON('/api/workflow/executions?limit=50').catch(() => ({ data: [] }))
          ]);

          const od = overview.data || {};
          document.getElementById('kpiPosts').textContent = od.total_posts || 0;
          document.getElementById('kpiIntercepts').textContent = od.total_intercepts || 0;
          document.getElementById('kpiDms').textContent = od.total_dms || 0;
          document.getElementById('kpiWorkflows').textContent = od.total_workflows || 0;

          renderFunnel(od);
          renderPlatforms(platforms.data || []);
          renderDailyChart(daily.data || []);
          renderActivity(workflows.data || []);
        } catch (e) {
          document.querySelectorAll('.loading-state').forEach(el => {
            el.outerHTML = MatrixGrow.renderError(e.message || '加载失败，请重试', loadAll);
          });
        }
      }

      init();
    })();
  </script>
</body>
</html>
