<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MatrixGrow - 控制台</title>
  <link rel="stylesheet" href="/css/base.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
  <style>
    .quick-actions {
      display: flex;
      gap: var(--space-3);
      flex-wrap: wrap;
    }

    .activity-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: var(--space-3) 0;
      border-bottom: 1px solid var(--color-border);
    }

    .activity-item:last-child {
      border-bottom: none;
    }

    .activity-info {
      display: flex;
      align-items: center;
      gap: var(--space-3);
    }

    .activity-icon {
      width: 32px;
      height: 32px;
      border-radius: var(--radius-md);
      background: var(--color-bg-secondary);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.9rem;
    }

    .activity-name {
      font-size: var(--text-sm);
      font-weight: var(--weight-medium);
    }

    .activity-time {
      font-size: var(--text-xs);
      color: var(--color-text-muted);
    }

    .chart-card {
      grid-column: 1 / -1;
    }

    .chart-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: var(--space-4);
    }

    .chart-header h3 {
      font-size: var(--text-base);
      font-weight: var(--weight-semibold);
    }

    .chart-wrapper {
      height: 240px;
      position: relative;
    }

    .section-card {
      margin-bottom: var(--space-5);
    }

    .sub-section-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: var(--space-4);
    }

    .sub-section-header h2 {
      font-size: var(--text-lg);
      font-weight: var(--weight-semibold);
    }
  </style>
</head>
<body>
  <div class="app-layout">
    <aside class="sidebar">
      <a href="dashboard.html" class="sidebar-logo">MatrixGrow</a>
      <nav class="sidebar-nav">
        <a href="dashboard.html" class="nav-item active"><span class="nav-icon">&#x1F4CA;</span>控制台</a>
        <a href="create.html" class="nav-item"><span class="nav-icon">&#x270D;&#xFE0F;</span>创作中心</a>
        <a href="agent.html" class="nav-item"><span class="nav-icon">&#x1F916;</span>AI 助手</a>
        <a href="workflow-import.html" class="nav-item"><span class="nav-icon">&#x1F4E5;</span>工作流导入</a>
        <a href="workflows.html" class="nav-item"><span class="nav-icon">&#x1F4E6;</span>模板商店</a>
        <a href="webhooks.html" class="nav-item"><span class="nav-icon">&#x1F517;</span>Webhook</a>
        <a href="subscription.html" class="nav-item"><span class="nav-icon">&#x1F4B0;</span>订阅</a>
      </nav>
      <div class="sidebar-footer">
        <button class="nav-item" onclick="handleLogout()"><span class="nav-icon">&#x2192;</span>退出登录</button>
      </div>
    </aside>

    <main class="main-content">
      <div class="page-header">
        <div>
          <h1>控制台</h1>
          <p class="subtitle">你的内容增长全景</p>
        </div>
        <span id="tier-badge" class="tier-badge tier-free">Free</span>
      </div>

      <div id="message-container"></div>

      <!-- Stats -->
      <div class="stats-grid" id="stats-grid">
        <div class="skeleton-card"><div class="skeleton-title"></div><div class="skeleton-line"></div><div class="skeleton-line" style="width:40%;"></div></div>
        <div class="skeleton-card"><div class="skeleton-title"></div><div class="skeleton-line"></div><div class="skeleton-line" style="width:40%;"></div></div>
        <div class="skeleton-card"><div class="skeleton-title"></div><div class="skeleton-line"></div><div class="skeleton-line" style="width:40%;"></div></div>
        <div class="skeleton-card"><div class="skeleton-title"></div><div class="skeleton-line"></div><div class="skeleton-line" style="width:40%;"></div></div>
      </div>

      <!-- Chart + Activity row -->
      <div class="two-col" style="margin-bottom:var(--space-5);">
        <div class="card chart-card" style="grid-column:1;">
          <div class="chart-header">
            <h3>近 7 天发布趋势</h3>
          </div>
          <div id="chart-loading" class="loading-state"><div class="spinner"></div><p>加载图表数据...</p></div>
          <div id="chart-empty" class="empty-state" style="display:none;">
            <div class="empty-icon">&#x1F4CA;</div>
            <h3>暂无数据</h3>
            <p>开始发布内容后将在这里展示趋势图表</p>
            <a href="create.html" class="btn btn-primary btn-sm" style="margin-top:var(--space-3);">去发布</a>
          </div>
          <div id="chart-error" class="error-state" style="display:none;">
            <div class="error-icon">&#x26A0;</div>
            <h3>图表加载失败</h3>
            <p id="chart-error-msg">请稍后重试</p>
            <button class="btn btn-primary btn-sm" onclick="loadDashboard()" style="margin-top:var(--space-3);">重试</button>
          </div>
          <div id="chart-wrapper" class="chart-wrapper" style="display:none;">
            <canvas id="trendChart"></canvas>
          </div>
        </div>

        <div class="card">
          <div class="sub-section-header">
            <h2>最近活动</h2>
          </div>
          <div id="recent-activity" class="loading-state"><div class="spinner"></div><p>加载中...</p></div>
        </div>
      </div>

      <!-- Quick Actions -->
      <div class="card">
        <div class="card-header">
          <h2>快速操作</h2>
        </div>
        <div class="quick-actions">
          <a href="create.html" class="btn btn-primary">&#x270D;&#xFE0F; 发布内容</a>
          <a href="dashboard.html" class="btn btn-secondary" onclick="showAddPlatformModal()">&#x1F517; 绑定平台</a>
          <a href="subscription.html" class="btn btn-secondary">&#x2B06; 升级版本</a>
          <a href="workflow-import.html" class="btn btn-secondary">&#x1F4E5; 导入工作流</a>
        </div>
      </div>

      <!-- Platforms Section -->
      <div id="platforms-section" class="card" style="display:none;">
        <div class="card-header">
          <h2>平台管理</h2>
          <button class="card-action" onclick="showAddPlatformModal()">+ 绑定新平台</button>
        </div>
        <div id="bound-platforms"><div class="loading-state"><div class="spinner"></div><p>加载中...</p></div></div>
        <div id="available-platforms" style="margin-top:var(--space-4);"></div>
      </div>

      <!-- Settings Section -->
      <div id="settings-section" class="card" style="display:none;">
        <div class="card-header"><h2>AI 模型配置</h2></div>
        <div class="input-group">
          <label class="label">模型提供商</label>
          <select class="input" id="llm-provider-select">
            <option value="deepseek">DeepSeek</option>
            <option value="claude">Claude</option>
            <option value="openai">OpenAI</option>
            <option value="qwen">Qwen</option>
          </select>
        </div>
        <div class="input-group">
          <label class="label">API Key</label>
          <input type="password" class="input" id="llm-api-key" placeholder="输入 API Key">
        </div>
        <div class="input-group">
          <label class="label">API URL（可选）</label>
          <input type="text" class="input" id="llm-api-url" placeholder="https://api.example.com">
        </div>
        <div class="input-group">
          <label class="label">模型名称（可选）</label>
          <input type="text" class="input" id="llm-model" placeholder="gpt-4o">
        </div>
        <button class="btn btn-primary" onclick="saveSettings()">保存设置</button>
      </div>
    </main>
  </div>

  <!-- Add Platform Modal -->
  <div class="modal-backdrop" id="add-platform-modal" style="display:none;">
    <div class="modal-panel" style="max-width:540px;">
      <h2>绑定新平台</h2>
      <div class="input-group">
        <label class="label">选择平台</label>
        <select class="input" id="platform-select">
          <option value="">选择平台</option>
        </select>
      </div>
      <div id="credential-fields"></div>
      <div class="modal-footer">
        <button class="btn btn-secondary" onclick="closeModal()">取消</button>
        <button class="btn btn-primary" onclick="addPlatform()">绑定</button>
      </div>
    </div>
  </div>

  <!-- Analytics Section -->
  <div id="analytics-section" class="card" style="display:none;">
    <div class="card-header"><h2>数据分析概览</h2></div>
    <div class="stats-grid" id="analytics-stats">
      <div class="skeleton-card"><div class="skeleton-title"></div><div class="skeleton-line"></div></div>
      <div class="skeleton-card"><div class="skeleton-title"></div><div class="skeleton-line"></div></div>
      <div class="skeleton-card"><div class="skeleton-title"></div><div class="skeleton-line"></div></div>
    </div>
  </div>

  <script src="/js/shared.js"></script>
  <script>
    let trendChart = null;

    // --- Init ---
    async function init() {
      if (!await MatrixGrow.checkAuth()) return;
      await loadDashboard();
    }

    async function loadDashboard() {
      const statsGrid = document.getElementById('stats-grid');
      // Show skeleton
      statsGrid.innerHTML = Array(4).fill(0).map(() => `
        <div class="skeleton-card"><div class="skeleton-title"></div><div class="skeleton-line"></div><div class="skeleton-line" style="width:40%;"></div></div>
      `).join('');

      // Reset chart states
      document.getElementById('chart-loading').style.display = 'flex';
      document.getElementById('chart-empty').style.display = 'none';
      document.getElementById('chart-error').style.display = 'none';
      document.getElementById('chart-wrapper').style.display = 'none';

      document.getElementById('recent-activity').innerHTML = '<div class="loading-state"><div class="spinner"></div><p>加载中...</p></div>';

      try {
        // Load tier badge
        await MatrixGrow.loadTierBadge();

        // Parallel loads
        const [sub, stats, recent, chartData] = await Promise.all([
          safeFetch('/api/subscription'),
          safeFetch('/api/stats'),
          safeFetch('/api/analytics/recent'),
          safeFetch('/api/analytics/daily?days=7')
        ]);

        // Render stats
        const tierNames = { free: 'Free', pro: 'Pro', promax: 'ProMax' };
        const tier = sub.tier || 'free';
        const platformLimit = sub.platformLimit || 3;

        statsGrid.innerHTML = `
          <div class="stat-card">
            <div class="stat-label">已绑定平台</div>
            <div class="stat-value">${sub.platformsUsed || 0}</div>
            <div class="stat-sub">共 ${platformLimit} 个可用</div>
          </div>
          <div class="stat-card">
            <div class="stat-label">本月发布</div>
            <div class="stat-value">${stats.posts?.published || 0}</div>
            <div class="stat-sub">篇文章</div>
          </div>
          <div class="stat-card">
            <div class="stat-label">截流回复</div>
            <div class="stat-value">${stats.intercepts?.replied || 0}</div>
            <div class="stat-sub">条回复</div>
          </div>
          <div class="stat-card">
            <div class="stat-label">当前套餐</div>
            <div class="stat-value" style="font-size:1.5rem;">${tierNames[tier] || tier}</div>
            <div class="stat-sub">${sub.accountsPerPlatform || 1} 账号/平台</div>
          </div>
        `;

        // Render chart
        renderChart(chartData);

        // Render activity
        renderActivity(recent);

      } catch (e) {
        console.error('Dashboard load error:', e);
        // Stats fallback
        statsGrid.innerHTML = `
          <div class="stat-card"><div class="stat-label">已绑定平台</div><div class="stat-value">--</div><div class="stat-sub">加载失败</div></div>
          <div class="stat-card"><div class="stat-label">本月发布</div><div class="stat-value">--</div><div class="stat-sub">加载失败</div></div>
          <div class="stat-card"><div class="stat-label">截流回复</div><div class="stat-value">--</div><div class="stat-sub">加载失败</div></div>
          <div class="stat-card"><div class="stat-label">当前套餐</div><div class="stat-value">--</div><div class="stat-sub">加载失败</div></div>
        `;
        document.getElementById('chart-loading').style.display = 'none';
        document.getElementById('chart-error').style.display = 'flex';
        document.getElementById('chart-error-msg').textContent = e.message;
        document.getElementById('recent-activity').innerHTML =
          MatrixGrow.renderError('加载活动数据失败', () => loadDashboard());
      }
    }

    // --- Chart ---
    function renderChart(data) {
      document.getElementById('chart-loading').style.display = 'none';

      const days = data?.data || [];
      if (!days || days.length === 0) {
        document.getElementById('chart-empty').style.display = 'flex';
        return;
      }

      document.getElementById('chart-wrapper').style.display = 'block';

      const labels = days.map(d => {
        const parts = (d.day || '').split('-');
        return parts.length === 3 ? `${parts[1]}/${parts[2]}` : d.day;
      });
      const posts = days.map(d => d.posts || 0);
      const intercepts = days.map(d => d.intercepts || 0);

      const ctx = document.getElementById('trendChart').getContext('2d');

      if (trendChart) trendChart.destroy();

      trendChart = new Chart(ctx, {
        type: 'line',
        data: {
          labels,
          datasets: [
            {
              label: '发布',
              data: posts,
              borderColor: '#00d4ff',
              backgroundColor: 'rgba(0, 212, 255, 0.08)',
              fill: true,
              tension: 0.4,
              pointRadius: 3,
              pointHoverRadius: 6,
              pointBackgroundColor: '#00d4ff'
            },
            {
              label: '截流',
              data: intercepts,
              borderColor: '#667eea',
              backgroundColor: 'rgba(102, 126, 234, 0.08)',
              fill: true,
              tension: 0.4,
              pointRadius: 3,
              pointHoverRadius: 6,
              pointBackgroundColor: '#667eea'
            }
          ]
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          plugins: {
            legend: {
              labels: {
                color: '#8888aa',
                font: { size: 12 }
              }
            },
            tooltip: {
              backgroundColor: '#1a1a2e',
              borderColor: '#2a2a44',
              borderWidth: 1,
              titleColor: '#fff',
              bodyColor: '#ccc'
            }
          },
          scales: {
            x: {
              grid: { color: 'rgba(255,255,255,0.04)', drawBorder: false },
              ticks: { color: '#555577', font: { size: 11 } }
            },
            y: {
              beginAtZero: true,
              grid: { color: 'rgba(255,255,255,0.04)', drawBorder: false },
              ticks: {
                color: '#555577',
                font: { size: 11 },
                stepSize: 1
              }
            }
          }
        }
      });
    }

    // --- Activity ---
    function renderActivity(data) {
      const container = document.getElementById('recent-activity');
      const activities = data?.data || data?.activities || [];

      if (!activities || activities.length === 0) {
        container.innerHTML = MatrixGrow.renderEmpty(
          '&#x1F4ED;',
          '暂无活动',
          '发布内容或运行工作流后，这里会显示最近的操作记录',
          '<a href="create.html" class="btn btn-primary btn-sm">开始创作</a>'
        );
        return;
      }

      container.innerHTML = activities.slice(0, 8).map(a => {
        const statusClass = a.status === 'completed' || a.status === 'success' ? 'active'
          : a.status === 'failed' || a.status === 'error' ? 'error'
          : 'pending';
        const icon = a.type === 'publish' ? '&#x1F4E4;'
          : a.type === 'intercept' ? '&#x1F3AF;'
          : a.type === 'workflow' ? '&#x2699;&#xFE0F;'
          : '&#x1F4DD;';
        return `
          <div class="activity-item">
            <div class="activity-info">
              <div class="activity-icon">${icon}</div>
              <div>
                <div class="activity-name">${a.name || a.workflow_name || '操作'}</div>
                <div class="activity-time">${MatrixGrow.formatDateTime(a.created_at) || ''}</div>
              </div>
            </div>
            <span class="status-dot ${statusClass}"></span>
          </div>
        `;
      }).join('');
    }

    // --- Sections ---
    function showSection(section) {
      // Hide all sections
      document.getElementById('platforms-section').style.display = 'none';
      document.getElementById('settings-section').style.display = 'none';
      document.getElementById('analytics-section').style.display = 'none';

      // Show the one
      const el = document.getElementById(`${section}-section`);
      if (el) {
        el.style.display = 'block';
        if (section === 'platforms') loadPlatforms();
        if (section === 'settings') loadSettings();
        if (section === 'analytics') loadAnalytics();
      }

      // Nav active
      document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
      event.target.classList.add('active');
    }

    // --- Platforms ---
    async function loadPlatforms() {
      const container = document.getElementById('bound-platforms');
      container.innerHTML = '<div class="loading-state"><div class="spinner"></div><p>加载中...</p></div>';
      try {
        const boundRes = await MatrixGrow.fetchJSON('/api/my-platforms');
        const allRes = await MatrixGrow.fetchJSON('/api/platforms');
        const bound = boundRes.platforms || [];
        const all = allRes.platforms || [];

        if (bound.length === 0) {
          container.innerHTML = MatrixGrow.renderEmpty('&#x1F4F1;', '暂未绑定平台', '绑定平台后才能发布内容到对应渠道');
        } else {
          container.innerHTML = `<div class="card-grid">${bound.map(p => `
            <div class="stat-card" style="cursor:default;">
              <div style="font-size:1.5rem;margin-bottom:var(--space-2);">&#x1F4F1;</div>
              <div style="font-weight:var(--weight-semibold);">${p.platform}</div>
              <div class="stat-sub">${p.account_name || ''}</div>
            </div>
          `).join('')}</div>`;
        }

        const boundNames = new Set(bound.map(p => p.platform));
        const available = all.filter(p => !boundNames.has(p.id));
        document.getElementById('available-platforms').innerHTML = available.length
          ? `<p class="text-muted text-sm" style="margin-bottom:var(--space-3);">可绑定的平台：</p>
             <div style="display:flex;flex-wrap:wrap;gap:var(--space-2);">
               ${available.map(p => `<button class="btn btn-sm btn-ghost" onclick="selectPlatform('${p.id}')">${p.name}</button>`).join('')}
             </div>`
          : '';
      } catch (e) {
        container.innerHTML = MatrixGrow.renderError('加载平台列表失败', () => loadPlatforms());
      }
    }

    function showAddPlatformModal() {
      document.getElementById('add-platform-modal').style.display = 'flex';
      loadPlatformOptions();
    }

    async function loadPlatformOptions() {
      try {
        const data = await MatrixGrow.fetchJSON('/api/platforms');
        const options = (data.platforms || []).map(p => `<option value="${p.id}">${p.name}</option>`).join('');
        document.getElementById('platform-select').innerHTML = `<option value="">选择平台</option>${options}`;
      } catch (e) {
        MatrixGrow.toast.error('加载平台列表失败');
      }
    }

    async function onPlatformSelect() {
      const platformId = document.getElementById('platform-select').value;
      if (!platformId) { document.getElementById('credential-fields').innerHTML = ''; return; }
      try {
        const data = await MatrixGrow.fetchJSON('/api/platforms');
        const platform = (data.platforms || []).find(p => p.id === platformId);
        if (platform && platform.credentialFields) {
          document.getElementById('credential-fields').innerHTML = platform.credentialFields.map(f => `
            <div class="input-group">
              <label class="label">${f.label}</label>
              ${f.type === 'password'
                ? `<input type="password" class="input" id="cred-${f.key}" placeholder="${f.instructions || ''}">`
                : `<input type="text" class="input" id="cred-${f.key}" placeholder="${f.instructions || ''}">`}
            </div>
          `).join('');
        }
      } catch (e) { /* ignore */ }
    }

    async function addPlatform() {
      const platformId = document.getElementById('platform-select').value;
      if (!platformId) { MatrixGrow.toast.warning('请选择平台'); return; }
      const credentials = {};
      document.querySelectorAll('[id^="cred-"]').forEach(f => {
        const key = f.id.replace('cred-', '');
        if (f.value) credentials[key] = f.value;
      });
      try {
        await MatrixGrow.fetchJSON('/api/my-platforms', {
          method: 'POST',
          body: JSON.stringify({ platform: platformId, credentials })
        });
        MatrixGrow.toast.success('平台绑定成功！');
        closeModal();
        loadPlatforms();
      } catch (e) {
        MatrixGrow.toast.error(e.message);
      }
    }

    function closeModal() {
      document.getElementById('add-platform-modal').style.display = 'none';
    }

    function selectPlatform(platformId) {
      document.getElementById('platform-select').value = platformId;
      onPlatformSelect();
      showAddPlatformModal();
    }

    // --- Settings ---
    async function loadSettings() {
      try {
        const data = await MatrixGrow.fetchJSON('/api/settings');
        document.getElementById('llm-provider-select').value = data.llmProvider || 'deepseek';
        document.getElementById('llm-api-url').value = data.llmApiUrl || '';
        document.getElementById('llm-model').value = data.llmModel || '';
      } catch (e) { /* ignore */ }
    }

    async function saveSettings() {
      try {
        await MatrixGrow.fetchJSON('/api/settings', {
          method: 'PUT',
          body: JSON.stringify({
            llm_provider: document.getElementById('llm-provider-select').value,
            llm_api_key: document.getElementById('llm-api-key').value,
            llm_api_url: document.getElementById('llm-api-url').value,
            llm_model: document.getElementById('llm-model').value
          })
        });
        MatrixGrow.toast.success('设置已保存');
      } catch (e) {
        MatrixGrow.toast.error('保存失败: ' + e.message);
      }
    }

    // --- Analytics ---
    async function loadAnalytics() {
      try {
        const data = await MatrixGrow.fetchJSON('/api/analytics/overview');
        const od = data.data || {};
        document.getElementById('analytics-stats').innerHTML = `
          <div class="stat-card"><div class="stat-label">总发布</div><div class="stat-value">${od.total_posts || 0}</div></div>
          <div class="stat-card"><div class="stat-label">总截流</div><div class="stat-value">${od.total_intercepts || 0}</div></div>
          <div class="stat-card"><div class="stat-label">总私信</div><div class="stat-value">${od.total_dms || 0}</div></div>
        `;
      } catch (e) {
        document.getElementById('analytics-stats').innerHTML = MatrixGrow.renderError('加载失败');
      }
    }

    // --- Helpers ---
    async function safeFetch(url) {
      try {
        return await MatrixGrow.fetchJSON(url);
      } catch (e) {
        return {};
      }
    }

    function handleLogout() {
      MatrixGrow.confirm.confirm('退出登录', '确定要退出当前账号吗？', { confirmText: '退出', danger: true })
        .then(ok => { if (ok) MatrixGrow.logout(); });
    }

    // --- Listeners ---
    document.getElementById('platform-select')?.addEventListener('change', onPlatformSelect);

    init();
  </script>
</body>
</html>
