<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MatrixGrow - 订阅与支付</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #0f0f23; color: #fff; }
    .app { display: flex; min-height: 100vh; }
    .sidebar { width: 260px; background: #1a1a2e; padding: 20px; display: flex; flex-direction: column; }
    .logo { font-size: 24px; font-weight: bold; margin-bottom: 40px; color: #00d4ff; }
    .nav-item { padding: 12px 16px; margin: 4px 0; border-radius: 8px; cursor: pointer; transition: background 0.2s; color: #888; }
    .nav-item:hover, .nav-item.active { background: #16213e; color: #fff; }
    .main { flex: 1; padding: 30px; overflow-y: auto; }
    .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; }
    .header h1 { font-size: 28px; }
    .card { background: #1a1a2e; padding: 24px; border-radius: 16px; margin-bottom: 20px; }
    .card h2 { margin-bottom: 20px; font-size: 18px; }
    .btn { padding: 12px 24px; border: none; border-radius: 10px; cursor: pointer; font-size: 14px; font-weight: bold; transition: all 0.2s; }
    .btn-primary { background: #00d4ff; color: #000; }
    .btn-primary:hover { background: #00b8e6; transform: translateY(-1px); }
    .btn-secondary { background: #333; color: #fff; }
    .tier-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; }
    .tier-card { background: #1a1a2e; padding: 30px; border-radius: 16px; border: 2px solid #333; position: relative; }
    .tier-card.popular { border-color: #00d4ff; }
    .tier-card.popular::before {
      content: '推荐';
      position: absolute;
      top: -12px;
      right: 20px;
      background: #00d4ff;
      color: #000;
      padding: 4px 12px;
      border-radius: 12px;
      font-size: 12px;
      font-weight: bold;
    }
    .tier-card h3 { font-size: 24px; margin-bottom: 8px; }
    .tier-price { font-size: 40px; font-weight: bold; margin: 16px 0 8px; }
    .tier-price span { font-size: 16px; color: #888; font-weight: normal; }
    .tier-features { margin: 24px 0; color: #aaa; }
    .tier-features li { padding: 8px 0; list-style: none; display: flex; align-items: center; gap: 8px; }
    .tier-features li::before { content: '✓'; color: #00d4ff; font-size: 16px; }
    .loading { text-align: center; padding: 40px; color: #888; }
    .message { padding: 12px; border-radius: 8px; margin-bottom: 16px; }
    .message.success { background: rgba(0, 212, 255, 0.1); border: 1px solid #00d4ff; color: #00d4ff; }
    .message.error { background: rgba(255, 0, 0, 0.1); border: 1px solid #ff4444; color: #ff4444; }
    .current-tier { display: flex; justify-content: space-between; align-items: center; background: #0f0f23; padding: 20px; border-radius: 12px; margin-bottom: 20px; }
    .current-tier-info h3 { font-size: 20px; margin-bottom: 6px; }
    .current-tier-info p { color: #888; font-size: 14px; }
    .tabs { display: flex; gap: 10px; margin-bottom: 20px; }
    .tab { padding: 10px 20px; background: #0f0f23; border: none; border-radius: 8px; color: #888; cursor: pointer; }
    .tab.active { background: #00d4ff; color: #000; }
    .orders-table { width: 100%; border-collapse: collapse; }
    .orders-table th, .orders-table td { padding: 12px; text-align: left; border-bottom: 1px solid #333; }
    .orders-table th { color: #888; font-size: 12px; }
    .orders-table td { color: #ddd; font-size: 13px; }
    .status-badge { padding: 4px 10px; border-radius: 12px; font-size: 12px; display: inline-block; }
    .status-pending { background: #333; color: #aaa; }
    .status-paid { background: rgba(0, 212, 255, 0.2); color: #00d4ff; }
    .status-failed { background: rgba(255, 68, 68, 0.2); color: #ff4444; }
    .payment-methods { display: flex; gap: 12px; margin-bottom: 20px; }
    .payment-method { padding: 16px; background: #0f0f23; border: 2px solid #333; border-radius: 10px; cursor: pointer; flex: 1; text-align: center; transition: all 0.2s; }
    .payment-method.selected { border-color: #00d4ff; background: rgba(0, 212, 255, 0.1); }
    .payment-method:hover { border-color: #00d4ff; }
    .payment-method-icon { font-size: 32px; margin-bottom: 8px; }
    .payment-method-name { font-weight: bold; }
  </style>
</head>
<body>
  <div class="app">
    <div class="sidebar">
      <div class="logo">MatrixGrow</div>
      <nav>
        <div class="nav-item" onclick="window.location.href='dashboard.html'">控制台</div>
        <div class="nav-item" onclick="window.location.href='agent.html'">AI 助手</div>
        <div class="nav-item" onclick="window.location.href='webhooks.html'">Webhook</div>
        <div class="nav-item active">订阅</div>
        <div class="nav-item" onclick="window.location.href='dashboard.html#settings'">设置</div>
      </nav>
      <div style="margin-top: auto; padding-top: 20px; border-top: 1px solid #333;">
        <div class="nav-item" onclick="logout()">退出登录</div>
      </div>
    </div>

    <div class="main">
      <div class="header">
        <h1>💰 订阅管理</h1>
      </div>

      <div id="message-container"></div>

      <div class="card">
        <h2>当前订阅</h2>
        <div id="current-subscription">
          <div class="loading">加载中...</div>
        </div>
      </div>

      <div class="tabs">
        <button class="tab active" onclick="showTab('plans')">套餐对比</button>
        <button class="tab" onclick="showTab('orders')">订单历史</button>
      </div>

      <div id="plans-tab">
        <div class="tier-grid" id="tier-grid">
          <div class="loading" style="grid-column: 1 / -1;">加载中...</div>
        </div>
      </div>

      <div id="orders-tab" class="hidden">
        <div class="card">
          <h2>订单历史</h2>
          <div id="orders-list">
            <div class="loading">加载中...</div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Payment Modal -->
  <div id="payment-modal" style="display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.8); justify-content: center; align-items: center; z-index: 1000;">
    <div style="background: #1a1a2e; padding: 30px; border-radius: 16px; width: 500px; max-height: 80vh; overflow-y: auto;">
      <h2 style="margin-bottom: 20px;">确认支付</h2>
      <div id="payment-details" style="margin-bottom: 20px;"></div>
      
      <h3 style="margin-bottom: 12px;">选择支付方式</h3>
      <div class="payment-methods">
        <div class="payment-method selected" onclick="selectPayment('alipay')">
          <div class="payment-method-icon">🐜</div>
          <div class="payment-method-name">支付宝</div>
        </div>
        <div class="payment-method" onclick="selectPayment('wechat')">
          <div class="payment-method-icon">💬</div>
          <div class="payment-method-name">微信支付</div>
        </div>
        <div class="payment-method" onclick="selectPayment('paypal')">
          <div class="payment-method-icon">🅿️</div>
          <div class="payment-method-name">PayPal</div>
        </div>
      </div>
      
      <div style="display: flex; gap: 12px;">
        <button class="btn btn-primary" style="flex: 1;" onclick="confirmPayment()">确认支付</button>
        <button class="btn btn-secondary" onclick="closePaymentModal()">取消</button>
      </div>
    </div>
  </div>

  <script>
    const API_BASE = '/api';
    let token = localStorage.getItem('token');
    let currentSubscription = null;
    let selectedPaymentMethod = 'alipay';
    let pendingOrder = null;

    // 检查登录状态
    async function checkAuth() {
      if (!token) {
        window.location.href = '/login.html';
        return false;
      }

      try {
        const res = await fetch(`${API_BASE}/auth/me`, {
          headers: { Authorization: `Bearer ${token}` }
        });

        if (!res.ok) throw new Error('Unauthorized');
        return true;
      } catch {
        localStorage.removeItem('token');
        window.location.href = '/login.html';
        return false;
      }
    }

    // 显示消息
    function showMessage(text, type = 'success') {
      const container = document.getElementById('message-container');
      container.innerHTML = `<div class="message ${type}">${text}</div>`;
      setTimeout(() => container.innerHTML = '', 3000);
    }

    // 切换标签
    function showTab(tab) {
      document.querySelectorAll('#plans-tab, #orders-tab').forEach(el => el.classList.add('hidden'));
      document.getElementById(`${tab}-tab`).classList.remove('hidden');
      
      document.querySelectorAll('.tab').forEach(el => el.classList.remove('active'));
      event.target.classList.add('active');
      
      if (tab === 'orders') loadOrders();
    }

    // 加载订阅信息
    async function loadSubscription() {
      try {
        const subRes = await fetch(`${API_BASE}/subscription`, {
          headers: { Authorization: `Bearer ${token}` }
        });
        const sub = await subRes.json();
        currentSubscription = sub;

        const tierNames = {
          free: '免费版',
          pro: 'Pro 版',
          promax: 'Pro Max 版'
        };

        document.getElementById('current-subscription').innerHTML = `
          <div class="current-tier">
            <div class="current-tier-info">
              <h3>${tierNames[sub.tier]}</h3>
              <p>已绑定 ${sub.platformsUsed} 个平台 / 最多 ${sub.platformLimit} 个</p>
              <p style="margin-top: 4px;">每平台最多 ${sub.accountsPerPlatform} 个账号</p>
            </div>
            ${sub.tier !== 'promax' ? `<button class="btn btn-primary" onclick="showUpgrade('promax')">升级到 Pro Max</button>` : ''}
          </div>
        `;

        const tiersRes = await fetch(`${API_BASE}/subscription/tiers`);
        const tiers = await tiersRes.json();

        const grid = tiers.tiers.map(t => `
          <div class="tier-card ${t.id === 'pro' ? 'popular' : ''}">
            <h3>${t.name}</h3>
            <div style="color: #888; font-size: 14px; margin-bottom: 8px;">${t.description}</div>
            <div class="tier-price">
              ¥${t.price}
              <span>/月</span>
            </div>
            <ul class="tier-features">
              ${t.features.map(f => `<li>${f}</li>`).join('')}
            </ul>
            ${sub.tier === t.id 
              ? `<button class="btn btn-secondary" style="width: 100%;" disabled>当前版本</button>`
              : t.id === 'free'
                ? ''
                : `<button class="btn ${t.id === 'promax' ? 'btn-primary' : 'btn-primary'}" style="width: 100%;" onclick="showUpgrade('${t.id}')">
                    ${sub.tier === 'free' ? '立即购买' : '升级'}
                  </button>`
            }
          </div>
        `).join('');

        document.getElementById('tier-grid').innerHTML = grid;
      } catch (e) {
        console.error('Failed to load subscription:', e);
        showMessage('加载失败', 'error');
      }
    }

    // 显示升级确认
    function showUpgrade(tier) {
      const tierNames = { pro: 'Pro 版', promax: 'Pro Max 版' };
      const tierPrices = { pro: 99, promax: 299 };
      
      pendingOrder = { tier };

      document.getElementById('payment-details').innerHTML = `
        <p style="margin-bottom: 8px; color: #888;">购买套餐</p>
        <h3 style="margin-bottom: 12px;">${tierNames[tier]}</h3>
        <p style="font-size: 32px; font-weight: bold; color: #00d4ff;">¥${tierPrices[tier]} / 月</p>
      `;

      document.getElementById('payment-modal').style.display = 'flex';
    }

    // 选择支付方式
    function selectPayment(method) {
      selectedPaymentMethod = method;
      document.querySelectorAll('.payment-method').forEach(el => el.classList.remove('selected'));
      event.target.closest('.payment-method').classList.add('selected');
    }

    // 确认支付
    async function confirmPayment() {
      if (!pendingOrder) return;

      try {
        const res = await fetch(`${API_BASE}/payment/create`, {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            Authorization: `Bearer ${token}`
          },
          body: JSON.stringify({
            tier: pendingOrder.tier,
            channel: selectedPaymentMethod
          })
        });

        if (res.ok) {
          const data = await res.json();
          showMessage('订单创建成功！即将跳转支付...');
          
          // 获取支付链接
          const urlRes = await fetch(`${API_BASE}/payment/url?order_no=${data.order_no}&channel=${selectedPaymentMethod}`, {
            headers: { Authorization: `Bearer ${token}` }
          });
          
          if (urlRes.ok) {
            const urlData = await urlRes.json();
            if (urlData.url) {
              window.location.href = urlData.url;
            } else if (urlData.codeUrl) {
              alert('请使用手机扫描二维码支付：\n' + urlData.codeUrl);
            }
          }
        } else {
          const err = await res.json();
          showMessage(err.error || '订单创建失败', 'error');
        }
      } catch (e) {
        showMessage('操作失败', 'error');
      }
    }

    // 关闭支付窗口
    function closePaymentModal() {
      document.getElementById('payment-modal').style.display = 'none';
      pendingOrder = null;
    }

    // 加载订单历史
    async function loadOrders() {
      try {
        const res = await fetch(`${API_BASE}/payment/orders`, {
          headers: { Authorization: `Bearer ${token}` }
        });
        const data = await res.json();

        if (!data.orders?.length) {
          document.getElementById('orders-list').innerHTML = '<p style="color: #888; text-align: center; padding: 40px;">暂无订单记录</p>';
          return;
        }

        const statusClasses = {
          pending: 'status-pending',
          paid: 'status-paid',
          failed: 'status-failed'
        };

        const statusNames = {
          pending: '待支付',
          paid: '已支付',
          failed: '支付失败'
        };

        const html = `
          <table class="orders-table">
            <thead>
              <tr>
                <th>订单号</th>
                <th>套餐</th>
                <th>金额</th>
                <th>状态</th>
                <th>时间</th>
              </tr>
            </thead>
            <tbody>
              ${data.orders.map(order => `
                <tr>
                  <td>${order.order_no}</td>
                  <td>${order.tier === 'pro' ? 'Pro' : 'Pro Max'}</td>
                  <td>¥${order.amount}</td>
                  <td><span class="status-badge ${statusClasses[order.status]}">${statusNames[order.status]}</span></td>
                  <td>${new Date(order.created_at).toLocaleString()}</td>
                </tr>
              `).join('')}
            </tbody>
          </table>
        `;

        document.getElementById('orders-list').innerHTML = html;
      } catch (e) {
        console.error('Failed to load orders:', e);
        document.getElementById('orders-list').innerHTML = '<p style="color: #ff4444;">加载失败</p>';
      }
    }

    function logout() {
      localStorage.removeItem('token');
      window.location.href = '/login.html';
    }

    // 初始化
    checkAuth().then(auth => {
      if (auth) loadSubscription();
    });
  </script>
</body>
</html>
