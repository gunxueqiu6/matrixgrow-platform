<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MatrixGrow - Webhook 管理</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #0f0f23; color: #fff; }
    .app { display: flex; min-height: 100vh; }
    .sidebar { width: 260px; background: #1a1a2e; padding: 20px; display: flex; flex-direction: column; }
    .logo { font-size: 24px; font-weight: bold; margin-bottom: 40px; color: #00d4ff; }
    .nav-item { padding: 12px 16px; margin: 4px 0; border-radius: 8px; cursor: pointer; transition: background 0.2s; color: #888; }
    .nav-item:hover, .nav-item.active { background: #16213e; color: #fff; }
    .main { flex: 1; padding: 30px; overflow-y: auto; }
    .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; }
    .header h1 { font-size: 28px; }
    .card { background: #1a1a2e; padding: 24px; border-radius: 16px; margin-bottom: 20px; }
    .card h2 { margin-bottom: 20px; font-size: 18px; }
    .btn { padding: 10px 20px; border: none; border-radius: 8px; cursor: pointer; font-size: 14px; transition: all 0.2s; }
    .btn-primary { background: #00d4ff; color: #000; }
    .btn-primary:hover { background: #00b8e6; }
    .btn-secondary { background: #333; color: #fff; }
    .btn-danger { background: #ff4444; color: #fff; }
    .btn-small { padding: 6px 12px; font-size: 12px; }
    .input { width: 100%; padding: 12px; border: 1px solid #333; border-radius: 8px; background: #0f0f23; color: #fff; margin-bottom: 12px; }
    .input:focus { outline: none; border-color: #00d4ff; }
    .label { display: block; margin-bottom: 6px; color: #888; font-size: 14px; }
    .loading { text-align: center; padding: 40px; color: #888; }
    .hidden { display: none; }
    .message { padding: 12px; border-radius: 8px; margin-bottom: 16px; }
    .message.success { background: rgba(0, 212, 255, 0.1); border: 1px solid #00d4ff; color: #00d4ff; }
    .message.error { background: rgba(255, 0, 0, 0.1); border: 1px solid #ff4444; color: #ff4444; }
    .webhook-item { background: #0f0f23; padding: 20px; border-radius: 12px; margin-bottom: 12px; display: flex; justify-content: space-between; align-items: flex-start; }
    .webhook-info h3 { margin-bottom: 6px; font-size: 16px; }
    .webhook-info .url { color: #888; font-size: 13px; margin-bottom: 8px; word-break: break-all; }
    .webhook-info .events { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 8px; }
    .webhook-info .event-tag { background: #333; padding: 4px 8px; border-radius: 4px; font-size: 12px; color: #aaa; }
    .webhook-info .meta { color: #666; font-size: 12px; }
    .webhook-actions { display: flex; gap: 8px; }
    .status-badge { padding: 4px 10px; border-radius: 12px; font-size: 12px; margin-bottom: 10px; display: inline-block; }
    .status-active { background: rgba(0, 212, 255, 0.2); color: #00d4ff; }
    .status-inactive { background: #333; color: #888; }
    .logs-table { width: 100%; border-collapse: collapse; }
    .logs-table th, .logs-table td { padding: 12px; text-align: left; border-bottom: 1px solid #333; }
    .logs-table th { color: #888; font-size: 12px; }
    .logs-table td { color: #ddd; font-size: 13px; }
    .log-status-success { color: #00d4ff; }
    .log-status-error { color: #ff4444; }
    .checkbox-group { display: flex; flex-wrap: wrap; gap: 12px; margin-bottom: 12px; }
    .checkbox-item { display: flex; align-items: center; gap: 8px; padding: 8px 12px; background: #0f0f23; border-radius: 8px; }
    .checkbox-item input { cursor: pointer; }
    .tabs { display: flex; gap: 10px; margin-bottom: 20px; }
    .tab { padding: 10px 20px; background: #0f0f23; border: none; border-radius: 8px; color: #888; cursor: pointer; }
    .tab.active { background: #00d4ff; color: #000; }
  </style>
</head>
<body>
  <div class="app">
    <div class="sidebar">
      <div class="logo">MatrixGrow</div>
      <nav>
        <div class="nav-item" onclick="window.location.href='dashboard.html'">控制台</div>
        <div class="nav-item" onclick="window.location.href='agent.html'">AI 助手</div>
        <div class="nav-item active">Webhook</div>
        <div class="nav-item" onclick="window.location.href='subscription.html'">订阅</div>
        <div class="nav-item" onclick="window.location.href='dashboard.html#settings'">设置</div>
      </nav>
      <div style="margin-top: auto; padding-top: 20px; border-top: 1px solid #333;">
        <div class="nav-item" onclick="logout()">退出登录</div>
      </div>
    </div>

    <div class="main">
      <div class="header">
        <h1>🔗 Webhook 管理</h1>
        <button class="btn btn-primary" onclick="showAddModal()">添加 Webhook</button>
      </div>

      <div id="message-container"></div>

      <div class="tabs">
        <button class="tab active" onclick="showTab('list')">Webhook 列表</button>
        <button class="tab" onclick="showTab('events')">事件说明</button>
      </div>

      <div id="list-tab">
        <div class="card">
          <h2>已配置的 Webhook</h2>
          <div id="webhook-list">
            <div class="loading">加载中...</div>
          </div>
        </div>
      </div>

      <div id="events-tab" class="hidden">
        <div class="card">
          <h2>支持的事件</h2>
          <div style="display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 16px;">
            <div style="background: #0f0f23; padding: 16px; border-radius: 12px;">
              <h3 style="margin-bottom: 8px;">publish.completed</h3>
              <p style="color: #888; font-size: 13px;">内容发布成功时触发</p>
            </div>
            <div style="background: #0f0f23; padding: 16px; border-radius: 12px;">
              <h3 style="margin-bottom: 8px;">publish.failed</h3>
              <p style="color: #888; font-size: 13px;">内容发布失败时触发</p>
            </div>
            <div style="background: #0f0f23; padding: 16px; border-radius: 12px;">
              <h3 style="margin-bottom: 8px;">intercept.matched</h3>
              <p style="color: #888; font-size: 13px;">截流命中时触发</p>
            </div>
            <div style="background: #0f0f23; padding: 16px; border-radius: 12px;">
              <h3 style="margin-bottom: 8px;">agent.message</h3>
              <p style="color: #888; font-size: 13px;">AI 助手消息时触发</p>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Add Webhook Modal -->
  <div id="add-modal" style="display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.8); justify-content: center; align-items: center; z-index: 1000;">
    <div style="background: #1a1a2e; padding: 30px; border-radius: 16px; width: 500px; max-height: 80vh; overflow-y: auto;">
      <h2 style="margin-bottom: 20px;">添加 Webhook</h2>
      <label class="label">名称</label>
      <input type="text" class="input" id="webhook-name" placeholder="给这个 Webhook 起个名字">
      
      <label class="label">URL</label>
      <input type="text" class="input" id="webhook-url" placeholder="https://example.com/webhook">
      
      <label class="label">监听事件（多选）</label>
      <div class="checkbox-group" id="events-checkboxes">
        <label class="checkbox-item">
          <input type="checkbox" value="publish.completed"> publish.completed
        </label>
        <label class="checkbox-item">
          <input type="checkbox" value="publish.failed"> publish.failed
        </label>
        <label class="checkbox-item">
          <input type="checkbox" value="intercept.matched"> intercept.matched
        </label>
        <label class="checkbox-item">
          <input type="checkbox" value="agent.message"> agent.message
        </label>
      </div>
      
      <label class="label">签名密钥（可选）</label>
      <input type="password" class="input" id="webhook-secret" placeholder="用于验证请求来源">
      
      <div style="display: flex; gap: 12px; margin-top: 20px;">
        <button class="btn btn-primary" onclick="saveWebhook()">保存</button>
        <button class="btn btn-secondary" onclick="closeModal()">取消</button>
      </div>
    </div>
  </div>

  <!-- View Logs Modal -->
  <div id="logs-modal" style="display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.8); justify-content: center; align-items: center; z-index: 1000;">
    <div style="background: #1a1a2e; padding: 30px; border-radius: 16px; width: 800px; max-height: 80vh; overflow-y: auto;">
      <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
        <h2>发送日志</h2>
        <button class="btn btn-secondary" onclick="closeLogsModal()">关闭</button>
      </div>
      <div id="logs-content">
        <div class="loading">加载中...</div>
      </div>
    </div>
  </div>

  <script>
    const API_BASE = '/api';
    let token = localStorage.getItem('token');
    let editingId = null;

    // 检查登录状态
    async function checkAuth() {
      if (!token) {
        window.location.href = '/login.html';
        return false;
      }

      try {
        const res = await fetch(`${API_BASE}/auth/me`, {
          headers: { Authorization: `Bearer ${token}` }
        });

        if (!res.ok) throw new Error('Unauthorized');
        return true;
      } catch {
        localStorage.removeItem('token');
        window.location.href = '/login.html';
        return false;
      }
    }

    // 显示消息
    function showMessage(text, type = 'success') {
      const container = document.getElementById('message-container');
      container.innerHTML = `<div class="message ${type}">${text}</div>`;
      setTimeout(() => container.innerHTML = '', 3000);
    }

    // 切换标签
    function showTab(tab) {
      document.querySelectorAll('#list-tab, #events-tab').forEach(el => el.classList.add('hidden'));
      document.getElementById(`${tab}-tab`).classList.remove('hidden');
      
      document.querySelectorAll('.tab').forEach(el => el.classList.remove('active'));
      event.target.classList.add('active');
    }

    // 加载 webhook 列表
    async function loadWebhooks() {
      try {
        const res = await fetch(`${API_BASE}/webhooks`, {
          headers: { Authorization: `Bearer ${token}` }
        });
        const data = await res.json();

        if (!data.webhooks?.length) {
          document.getElementById('webhook-list').innerHTML = '<p style="color: #888; text-align: center; padding: 40px;">暂未配置任何 Webhook</p>';
          return;
        }

        const html = data.webhooks.map(wh => `
          <div class="webhook-item">
            <div class="webhook-info">
              <span class="status-badge ${wh.is_active ? 'status-active' : 'status-inactive'}">
                ${wh.is_active ? '启用' : '禁用'}
              </span>
              <h3>${wh.name}</h3>
              <div class="url">${wh.url}</div>
              <div class="events">
                ${wh.events.map(e => `<span class="event-tag">${e}</span>`).join('')}
              </div>
              <div class="meta">
                创建于 ${new Date(wh.created_at).toLocaleDateString()} · 
                失败 ${wh.failed_count} 次 · 
                最后发送 ${wh.last_sent_at ? new Date(wh.last_sent_at).toLocaleDateString() : '从未'}
              </div>
            </div>
            <div class="webhook-actions">
              <button class="btn btn-secondary btn-small" onclick="testWebhook(${wh.id})">测试</button>
              <button class="btn btn-secondary btn-small" onclick="viewLogs(${wh.id})">日志</button>
              <button class="btn btn-secondary btn-small" onclick="editWebhook(${wh.id})">编辑</button>
              <button class="btn btn-danger btn-small" onclick="deleteWebhook(${wh.id})">删除</button>
            </div>
          </div>
        `).join('');

        document.getElementById('webhook-list').innerHTML = html;
      } catch (e) {
        console.error('Failed to load webhooks:', e);
        showMessage('加载失败', 'error');
      }
    }

    // 显示添加模态框
    function showAddModal() {
      editingId = null;
      document.getElementById('add-modal').style.display = 'flex';
      document.getElementById('webhook-name').value = '';
      document.getElementById('webhook-url').value = '';
      document.getElementById('webhook-secret').value = '';
      document.querySelectorAll('#events-checkboxes input').forEach(el => el.checked = false);
    }

    // 关闭模态框
    function closeModal() {
      document.getElementById('add-modal').style.display = 'none';
    }

    // 保存 webhook
    async function saveWebhook() {
      const name = document.getElementById('webhook-name').value.trim();
      const url = document.getElementById('webhook-url').value.trim();
      const secret = document.getElementById('webhook-secret').value.trim();
      const events = Array.from(document.querySelectorAll('#events-checkboxes input:checked')).map(el => el.value);

      if (!name || !url || !events.length) {
        showMessage('请填写完整信息', 'error');
        return;
      }

      try {
        let res;
        if (editingId) {
          res = await fetch(`${API_BASE}/webhooks/${editingId}`, {
            method: 'PUT',
            headers: {
              'Content-Type': 'application/json',
              Authorization: `Bearer ${token}`
            },
            body: JSON.stringify({ name, url, events, secret, is_active: true })
          });
        } else {
          res = await fetch(`${API_BASE}/webhooks`, {
            method: 'POST',
            headers: {
              'Content-Type': 'application/json',
              Authorization: `Bearer ${token}`
            },
            body: JSON.stringify({ name, url, events, secret })
          });
        }

        if (res.ok) {
          showMessage(editingId ? '更新成功' : '添加成功');
          closeModal();
          loadWebhooks();
        } else {
          const err = await res.json();
          showMessage(err.error || '操作失败', 'error');
        }
      } catch (e) {
        showMessage('操作失败', 'error');
      }
    }

    // 编辑 webhook
    async function editWebhook(id) {
      try {
        const res = await fetch(`${API_BASE}/webhooks`, {
          headers: { Authorization: `Bearer ${token}` }
        });
        const data = await res.json();
        const wh = data.webhooks.find(w => w.id === id);
        if (!wh) return;

        editingId = id;
        document.getElementById('webhook-name').value = wh.name;
        document.getElementById('webhook-url').value = wh.url;
        document.getElementById('webhook-secret').value = '';
        
        document.querySelectorAll('#events-checkboxes input').forEach(el => {
          el.checked = wh.events.includes(el.value);
        });

        document.getElementById('add-modal').style.display = 'flex';
      } catch (e) {
        showMessage('加载失败', 'error');
      }
    }

    // 删除 webhook
    async function deleteWebhook(id) {
      if (!confirm('确定要删除这个 Webhook 吗？')) return;

      try {
        const res = await fetch(`${API_BASE}/webhooks/${id}`, {
          method: 'DELETE',
          headers: { Authorization: `Bearer ${token}` }
        });

        if (res.ok) {
          showMessage('删除成功');
          loadWebhooks();
        } else {
          showMessage('删除失败', 'error');
        }
      } catch (e) {
        showMessage('删除失败', 'error');
      }
    }

    // 测试 webhook
    async function testWebhook(id) {
      try {
        const res = await fetch(`${API_BASE}/webhooks/${id}/test`, {
          method: 'POST',
          headers: { Authorization: `Bearer ${token}` }
        });

        if (res.ok) {
          showMessage('测试事件已发送');
        } else {
          const err = await res.json();
          showMessage(err.error || '发送失败', 'error');
        }
      } catch (e) {
        showMessage('发送失败', 'error');
      }
    }

    // 查看日志
    async function viewLogs(id) {
      document.getElementById('logs-modal').style.display = 'flex';
      document.getElementById('logs-content').innerHTML = '<div class="loading">加载中...</div>';

      try {
        const res = await fetch(`${API_BASE}/webhooks/${id}/logs`, {
          headers: { Authorization: `Bearer ${token}` }
        });
        const data = await res.json();

        if (!data.logs?.length) {
          document.getElementById('logs-content').innerHTML = '<p style="color: #888; text-align: center; padding: 40px;">暂无发送记录</p>';
          return;
        }

        const html = `
          <table class="logs-table">
            <thead>
              <tr>
                <th>时间</th>
                <th>事件</th>
                <th>状态</th>
                <th>响应</th>
              </tr>
            </thead>
            <tbody>
              ${data.logs.map(log => `
                <tr>
                  <td>${new Date(log.created_at).toLocaleString()}</td>
                  <td>${log.event}</td>
                  <td class="${log.status === 'success' ? 'log-status-success' : 'log-status-error'}">
                    ${log.status}
                  </td>
                  <td>${log.error_message || (log.response_code ? `HTTP ${log.response_code}` : '-')}</td>
                </tr>
              `).join('')}
            </tbody>
          </table>
        `;
        document.getElementById('logs-content').innerHTML = html;
      } catch (e) {
        document.getElementById('logs-content').innerHTML = '<p style="color: #ff4444;">加载失败</p>';
      }
    }

    function closeLogsModal() {
      document.getElementById('logs-modal').style.display = 'none';
    }

    function logout() {
      localStorage.removeItem('token');
      window.location.href = '/login.html';
    }

    // 初始化
    checkAuth().then(auth => {
      if (auth) loadWebhooks();
    });
  </script>
</body>
</html>
