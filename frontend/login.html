<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MatrixGrow - 登录</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
            color: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .login-container {
            width: 100%;
            max-width: 440px;
            padding: 20px;
        }

        .logo {
            text-align: center;
            margin-bottom: 30px;
        }

        .logo h1 {
            font-size: 2rem;
            background: linear-gradient(90deg, #4ECDC4, #44A8D4);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .card {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 24px;
            padding: 40px;
            backdrop-filter: blur(10px);
        }

        .tabs {
            display: flex;
            margin-bottom: 30px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }

        .tab {
            flex: 1;
            text-align: center;
            padding: 12px;
            cursor: pointer;
            color: rgba(255,255,255,0.5);
            border-bottom: 2px solid transparent;
            transition: all 0.3s;
        }

        .tab.active {
            color: #4ECDC4;
            border-bottom-color: #4ECDC4;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            font-size: 0.85rem;
            color: rgba(255,255,255,0.7);
            margin-bottom: 8px;
        }

        input {
            width: 100%;
            padding: 14px;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 12px;
            color: #fff;
            font-size: 1rem;
            transition: all 0.3s;
        }

        input:focus {
            outline: none;
            border-color: #4ECDC4;
            background: rgba(255,255,255,0.08);
        }

        input::placeholder { color: rgba(255,255,255,0.3); }

        .btn {
            width: 100%;
            padding: 16px;
            background: linear-gradient(90deg, #4ECDC4, #44A8D4);
            border: none;
            border-radius: 12px;
            color: #fff;
            font-size: 1.05rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 10px;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(78, 205, 196, 0.3);
        }

        .btn:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }

        .error-msg {
            color: #FF6B6B;
            font-size: 0.85rem;
            margin-top: 12px;
            text-align: center;
            display: none;
        }

        .error-msg.show { display: block; }

        .back-link {
            text-align: center;
            margin-top: 20px;
        }

        .back-link a {
            color: rgba(255,255,255,0.5);
            text-decoration: none;
            font-size: 0.9rem;
        }

        .back-link a:hover { color: #4ECDC4; }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="logo">
            <h1>MatrixGrow</h1>
        </div>

        <div class="card">
            <div class="tabs">
                <div class="tab active" data-tab="login">登录</div>
                <div class="tab" data-tab="register">注册</div>
            </div>

            <form id="loginForm">
                <div class="form-group">
                    <label for="loginEmail">邮箱</label>
                    <input type="email" id="loginEmail" placeholder="your@email.com" required>
                </div>
                <div class="form-group">
                    <label for="loginPassword">密码</label>
                    <input type="password" id="loginPassword" placeholder="至少6位" required>
                </div>
                <div class="error-msg" id="loginError"></div>
                <button type="submit" class="btn" id="loginBtn">登录</button>
            </form>

            <form id="registerForm" style="display:none;">
                <div class="form-group">
                    <label for="regEmail">邮箱</label>
                    <input type="email" id="regEmail" placeholder="your@email.com" required>
                </div>
                <div class="form-group">
                    <label for="regName">昵称（可选）</label>
                    <input type="text" id="regName" placeholder="怎么称呼你">
                </div>
                <div class="form-group">
                    <label for="regPassword">密码</label>
                    <input type="password" id="regPassword" placeholder="至少6位" required>
                </div>
                <div class="error-msg" id="regError"></div>
                <button type="submit" class="btn" id="regBtn">注册</button>
            </form>
        </div>

        <div class="back-link">
            <a href="/">← 返回首页</a>
        </div>
    </div>

    <script src="/js/auth.js"></script>
    <script>
        if (Auth.isLoggedIn()) {
            window.location.href = '/';
        }

        const tabs = document.querySelectorAll('.tab');
        const loginForm = document.getElementById('loginForm');
        const registerForm = document.getElementById('registerForm');

        tabs.forEach(tab => {
            tab.addEventListener('click', () => {
                tabs.forEach(t => t.classList.remove('active'));
                tab.classList.add('active');
                const target = tab.dataset.tab;
                loginForm.style.display = target === 'login' ? 'block' : 'none';
                registerForm.style.display = target === 'register' ? 'block' : 'none';
                document.querySelectorAll('.error-msg').forEach(e => e.classList.remove('show'));
            });
        });

        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('loginBtn');
            const err = document.getElementById('loginError');
            btn.disabled = true;
            btn.textContent = '登录中...';
            err.classList.remove('show');

            try {
                await Auth.login(
                    document.getElementById('loginEmail').value,
                    document.getElementById('loginPassword').value
                );
                window.location.href = '/';
            } catch (ex) {
                err.textContent = ex.message;
                err.classList.add('show');
                btn.disabled = false;
                btn.textContent = '登录';
            }
        });

        registerForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('regBtn');
            const err = document.getElementById('regError');
            btn.disabled = true;
            btn.textContent = '注册中...';
            err.classList.remove('show');

            try {
                await Auth.register(
                    document.getElementById('regEmail').value,
                    document.getElementById('regPassword').value,
                    document.getElementById('regName').value
                );
                window.location.href = '/';
            } catch (ex) {
                err.textContent = ex.message;
                err.classList.add('show');
                btn.disabled = false;
                btn.textContent = '注册';
            }
        });
    </script>
</body>
</html>
